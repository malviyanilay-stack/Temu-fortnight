<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Temu Fortnite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; font-family: sans-serif; }
        #health-ui { position: absolute; top: 20px; left: 20px; width: 200px; background: rgba(0,0,0,0.7); padding: 10px; border: 2px solid #ff4444; color: white; }
        #health-fill { width: 100%; height: 15px; background: #ff4444; }
        .bar-bg { width: 100%; height: 15px; background: #222; margin-top: 5px; }
        #btns { position: absolute; bottom: 30px; right: 20px; display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
        .btn { width: 80px; height: 80px; background: rgba(0,0,0,0.6); color: white; border: 2px solid #0ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        #joystick-ui { position: absolute; bottom: 50px; left: 50px; width: 140px; height: 140px; background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; border: 2px solid #0ff; }
        #joystick-knob { position: absolute; width: 60px; height: 60px; background: #0ff; border-radius: 50%; left: 40px; top: 40px; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="health-ui">HEALTH<div class="bar-bg"><div id="health-fill"></div></div></div>
        <div id="btns"><div id="fire-btn" class="btn" style="background:#ff4444; width:100px; height:100px;">FIRE</div><div id="jump-btn" class="btn">JUMP</div></div>
        <div id="joystick-ui"><div id="joystick-knob"></div></div>
    </div>

    <script>
        const socket = io("https://temu-fortnight2.onrender.com");
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(10, 20, 10);
        scene.add(sun, new THREE.AmbientLight(0x606060));

        // --- ENVIRONMENT (TREES & 3D GRASS) ---
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(400, 400), new THREE.MeshStandardMaterial({ color: 0x2e7d32 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        function createGrass(x, z) {
            const blade = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.7, 0.15), new THREE.MeshStandardMaterial({color: 0x3a9d42}));
            blade.position.set(x, 0, z); // Sits slightly in ground
            scene.add(blade);
        }
        for(let i=0; i<150; i++) createGrass(Math.random()*100-50, Math.random()*100-50);

        function createTree(x, z) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 4), new THREE.MeshStandardMaterial({color: 0x5d4037}));
            trunk.position.y = 2;
            const leaves = new THREE.Mesh(new THREE.SphereGeometry(2.2), new THREE.MeshStandardMaterial({color: 0x1a5d1a}));
            leaves.position.y = 5;
            tree.add(trunk, leaves); tree.position.set(x, 0, z); scene.add(tree);
        }
        for(let i=0; i<12; i++) createTree(Math.random()*140-70, Math.random()*140-70);

        // --- CHARACTER BUILDER (HEAD, TORSO, ARMS, LEGS) ---
        function createCharacter(color) {
            const group = new THREE.Group();
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.0, 0.4), new THREE.MeshStandardMaterial({color}));
            torso.position.y = 1.3;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 2.1;
            const lArm = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.8, 0.25), new THREE.MeshStandardMaterial({color}));
            lArm.position.set(-0.55, 1.3, 0);
            const rArm = lArm.clone(); rArm.position.x = 0.55;
            const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.9, 0.3), new THREE.MeshStandardMaterial({color: 0x222222}));
            lLeg.position.set(-0.2, 0.45, 0);
            const rLeg = lLeg.clone(); rLeg.position.x = 0.2;
            group.add(torso, head, lArm, rArm, lLeg, rLeg);
            group.userData = { lArm, rArm, lLeg, rLeg, originalColor: color };
            return group;
        }

        const player = createCharacter(0x00ff00);
        scene.add(player);
        const enemies = {};

        // --- SHIFT LOCK CONTROLS ---
        let joyPos = { x: 0, y: 0 };
        let cameraAngle = 0;
        
        window.addEventListener('touchmove', (e) => {
            if(e.touches[0].clientX > window.innerWidth / 2) {
                cameraAngle -= e.movementX * 0.007 || 0;
            }
        });

        const joyKnob = document.getElementById('joystick-knob');
        document.getElementById('joystick-ui').addEventListener('touchmove', (e) => {
            const t = e.touches[0]; const r = e.currentTarget.getBoundingClientRect();
            joyPos.x = (t.clientX - (r.left + r.width/2))/70; 
            joyPos.y = (t.clientY - (r.top + r.height/2))/70;
            const d = Math.sqrt(joyPos.x**2 + joyPos.y**2);
            if(d > 1) { joyPos.x /= d; joyPos.y /= d; }
            joyKnob.style.transform = `translate(${joyPos.x*40}px, ${joyPos.y*40}px)`;
        });
        document.getElementById('joystick-ui').addEventListener('touchend', () => {
            joyPos = {x:0, y:0}; joyKnob.style.transform = `translate(0,0)`;
        });

        // --- DAMAGE EFFECT (GSAP) ---
        function flashRed(target) {
            target.children.forEach(c => {
                if(c.material) {
                    gsap.to(c.material.color, { r:1, g:0, b:0, duration:0.1, yoyo:true, repeat:1 });
                }
            });
        }

        document.getElementById('fire-btn').addEventListener('touchstart', () => {
            Object.keys(enemies).forEach(id => {
                if(player.position.distanceTo(enemies[id].position) < 8) {
                    flashRed(enemies[id]);
                    socket.emit('enemyDied', id);
                }
            });
        });

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.006;

            // SHIFT LOCK: Player faces where the camera looks
            player.rotation.y = cameraAngle;

            // CORRECTED MOVEMENT: Moves forward relative to camera view
            const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), cameraAngle);
            const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), cameraAngle);
            player.position.add(forward.multiplyScalar(-joyPos.y * 0.2));
            player.position.add(right.multiplyScalar(joyPos.x * 0.2));

            // LIMB ANIMATIONS
            if(Math.abs(joyPos.x) > 0.1 || Math.abs(joyPos.y) > 0.1) {
                player.userData.lLeg.rotation.x = Math.sin(time) * 0.7;
                player.userData.rLeg.rotation.x = -Math.sin(time) * 0.7;
                player.userData.lArm.rotation.x = -Math.sin(time) * 0.5;
                player.userData.rArm.rotation.x = Math.sin(time) * 0.5;
            } else {
                player.userData.lLeg.rotation.x = 0; player.userData.rLeg.rotation.x = 0;
                player.userData.lArm.rotation.x = 0; player.userData.rArm.rotation.x = 0;
            }

            // Camera Follow
            camera.position.set(player.position.x - Math.sin(cameraAngle)*12, 7, player.position.z - Math.cos(cameraAngle)*12);
            camera.lookAt(player.position);
            
            socket.emit('playerMovement', { x: player.position.x, y: 0, z: player.position.z, yaw: player.rotation.y });
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
