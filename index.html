<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Temu Fortnite - Online Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * { touch-action: none; user-select: none; outline: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; }
        
        #boot-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #0f0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { border: 4px solid #111; border-top: 4px solid #0f0; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; color: #fff; display: none; }
        
        #minimap { position: absolute; top: 15px; left: 15px; width: 140px; height: 140px; background: rgba(0,20,20,0.85); border: 2px solid #0ff; border-radius: 8px; pointer-events: auto; overflow: hidden; box-shadow: 0 0 10px rgba(0,255,255,0.2); }
        .map-dot { position: absolute; width: 6px; height: 6px; border-radius: 50%; transform: translate(-50%, -50%); transition: left 0.1s, top 0.1s; }
        #p-dot { background: #0ff; left: 70px; top: 70px; z-index: 5; box-shadow: 0 0 5px #0ff; }

        #stat-chart { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.9); padding: 15px; border: 1px solid #0ff; min-width: 180px; pointer-events: auto; text-transform: uppercase; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; letter-spacing: 1px; }
        .stat-val { color: #0ff; font-weight: bold; }

        #health-ui { position: absolute; top: 170px; left: 15px; width: 220px; background: rgba(0,0,0,0.85); padding: 10px; border-left: 5px solid #0f0; transition: border-color 0.3s; }
        .bar-label { font-size: 12px; font-weight: bold; letter-spacing: 2px; margin-bottom: 5px; color: #fff; }
        .bar-bg { width: 100%; height: 16px; background: #222; border-radius: 2px; overflow: hidden; }
        #h-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #0f0, #5aff5a); transition: width 0.2s, background 0.3s; }

        #btns { position: absolute; bottom: 40px; right: 20px; display: flex; flex-direction: column; gap: 20px; pointer-events: auto; }
        .btn { width: 90px; height: 90px; background: rgba(0,0,0,0.8); color: white; border: 3px solid #0ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 10px rgba(0,255,255,0.3); transition: transform 0.05s; }
        .btn:active { transform: scale(0.9); background: rgba(0,255,255,0.2); }
        #fire-btn { width: 120px; height: 120px; font-size: 24px; border-color: #ff4444; color: #ff4444; }
        #fire-btn:active { background: rgba(255,68,68,0.2); }
        
        #joy-bound { position: absolute; bottom: 50px; left: 50px; width: 160px; height: 160px; background: rgba(0,255,255,0.05); border: 2px solid rgba(0,255,255,0.3); border-radius: 50%; pointer-events: auto; }
        #joy-k { position: absolute; width: 60px; height: 60px; background: #0ff; border-radius: 50%; left: 50px; top: 50px; box-shadow: 0 0 15px #0ff; pointer-events: none; }
        
        #dmg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0); pointer-events: none; transition: background 0.1s; z-index: 100; }
    </style>
</head>
<body>
    <div id="boot-screen">
        <div class="spinner"></div>
        <div id="boot-text">Connecting to Server...</div>
    </div>
    
    <div id="dmg-overlay"></div>
    <div id="ui">
        <div id="minimap"><div id="p-dot" class="map-dot"></div></div>
        <div id="stat-chart">
            <div class="stat-row">ALIVE: <span id="alive-val" class="stat-val">1</span></div>
            <div class="stat-row">ELIMS: <span id="kill-val" class="stat-val">0</span></div>
            <div class="stat-row">WAVE: <span id="wave-val" class="stat-val">1</span></div>
        </div>
        <div id="health-ui">
            <div class="bar-label">HEALTH</div>
            <div class="bar-bg"><div id="h-fill"></div></div>
        </div>
        <div id="btns">
            <div id="fire-btn" class="btn">FIRE</div>
            <div id="jump-btn" class="btn">JUMP</div>
        </div>
        <div id="joy-bound"><div id="joy-k"></div></div>
    </div>

    <script>
        /**
         * TEMU FORTNITE - ONLINE REFINEMENT EDITION
         * Extensively built OOP Architecture.
         */

        // ==========================================
        // UTILITY & TEXTURE GENERATION
        // ==========================================
        class TextureFactory {
            static generateGrassTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 512; canvas.height = 512;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#1e4d2b'; 
                ctx.fillRect(0, 0, 512, 512);
                for(let i=0; i<3000; i++) {
                    ctx.fillStyle = Math.random() > 0.5 ? '#228b22' : '#006400';
                    ctx.fillRect(Math.random()*512, Math.random()*512, 2 + Math.random()*3, 10 + Math.random()*20);
                }
                const tex = new THREE.CanvasTexture(canvas);
                tex.wrapS = THREE.RepeatWrapping;
                tex.wrapT = THREE.RepeatWrapping;
                tex.repeat.set(20, 20);
                return tex;
            }
        }

        // ==========================================
        // GAME ENGINE CORE
        // ==========================================
        class GameEngine {
            constructor() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x87ceeb);
                this.scene.fog = new THREE.FogExp2(0x87ceeb, 0.005);

                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                document.body.appendChild(this.renderer.domElement);

                this.setupLights();
                this.buildEnvironment();

                this.entities = [];
                this.bullets = [];
                this.obstacles = [];
                
                this.stats = { hp: 100, kills: 0, wave: 1 };
                this.spawnTimer = Date.now() + 3000;
                this.spawnInterval = 8000;

                this.input = new InputManager(this);
                this.player = new Player(this, 0x0055ff);
                this.scene.add(this.player.mesh);
                
                this.minimap = document.getElementById('minimap');
                this.lastTime = Date.now();

                window.addEventListener('resize', () => this.onWindowResize(), false);
                
                // Simulate Online Boot
                setTimeout(() => {
                    document.getElementById('boot-text').innerText = "Joining Match...";
                    setTimeout(() => {
                        document.getElementById('boot-screen').style.display = 'none';
                        document.getElementById('ui').style.display = 'block';
                        this.animate();
                    }, 1000);
                }, 1500);
            }

            setupLights() {
                const ambLight = new THREE.AmbientLight(0xffffff, 0.6);
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
                dirLight.position.set(50, 100, 50);
                this.scene.add(ambLight, dirLight);
            }

            buildEnvironment() {
                const floorMat = new THREE.MeshStandardMaterial({ 
                    map: TextureFactory.generateGrassTexture(),
                    roughness: 0.9 
                });
                const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), floorMat);
                floor.rotation.x = -Math.PI / 2;
                this.scene.add(floor);

                // Trees
                for(let i=0; i<80; i++) {
                    const x = (Math.random() - 0.5) * 600;
                    const z = (Math.random() - 0.5) * 600;
                    if(Math.abs(x) < 20 && Math.abs(z) < 20) continue; // Clear spawn

                    const tree = new THREE.Group();
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1.2, 8), new THREE.MeshStandardMaterial({color: 0x3d2817}));
                    const leaves = new THREE.Mesh(new THREE.ConeGeometry(5, 12, 7), new THREE.MeshStandardMaterial({color: 0x1e4d2b}));
                    leaves.position.y = 8;
                    tree.add(trunk, leaves);
                    tree.position.set(x, 4, z);
                    this.scene.add(tree);
                    this.obstacles.push({ x, z, radius: 1.5 });
                }

                // Tall Grass (Instanced)
                const grassGeo = new THREE.PlaneGeometry(1, 3);
                const grassMat = new THREE.MeshBasicMaterial({color: 0x228b22, side: THREE.DoubleSide, transparent: true, opacity: 0.8});
                this.grassInstanced = new THREE.InstancedMesh(grassGeo, grassMat, 2000);
                const dummy = new THREE.Object3D();
                for(let i=0; i<2000; i++) {
                    dummy.position.set((Math.random()-0.5)*500, 1.5, (Math.random()-0.5)*500);
                    dummy.rotation.y = Math.random() * Math.PI;
                    dummy.updateMatrix();
                    this.grassInstanced.setMatrixAt(i, dummy.matrix);
                }
                this.scene.add(this.grassInstanced);
            }

            spawnEnemies() {
                // Spawns 2 enemies at a time as requested
                for(let i=0; i<2; i++) {
                    const enemy = new Enemy(this, 0xff0000);
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 60 + Math.random() * 20;
                    enemy.mesh.position.set(this.player.mesh.position.x + Math.cos(angle)*dist, 0, this.player.mesh.position.z + Math.sin(angle)*dist);
                    this.scene.add(enemy.mesh);
                    this.entities.push(enemy);
                    this.minimap.appendChild(enemy.dot);
                }
            }

            takeDamage(amount) {
                this.stats.hp -= amount;
                
                // Update UI visually
                const hFill = document.getElementById('h-fill');
                const hUI = document.getElementById('health-ui');
                hFill.style.width = Math.max(0, this.stats.hp) + "%";
                
                // Color shifts based on HP
                if(this.stats.hp <= 30) {
                    hFill.style.background = "linear-gradient(90deg, #ff0000, #ff5a5a)";
                    hUI.style.borderColor = "#ff0000";
                } else if(this.stats.hp <= 60) {
                    hFill.style.background = "linear-gradient(90deg, #ffaa00, #ffff5a)";
                    hUI.style.borderColor = "#ffaa00";
                }

                // Damage Flash
                const overlay = document.getElementById('dmg-overlay');
                overlay.style.background = "rgba(255,0,0,0.4)";
                setTimeout(() => { overlay.style.background = "rgba(255,0,0,0)"; }, 150);

                if(this.stats.hp <= 0) {
                    this.stats.hp = 100;
                    this.stats.kills = 0;
                    hFill.style.background = "linear-gradient(90deg, #0f0, #5aff5a)";
                    hUI.style.borderColor = "#0f0";
                    hFill.style.width = "100%";
                }
                this.updateUI();
            }

            updateUI() {
                document.getElementById('kill-val').innerText = this.stats.kills;
                document.getElementById('alive-val').innerText = this.entities.length + 1;
                document.getElementById('wave-val').innerText = this.stats.wave;
            }

            onWindowResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                const now = Date.now();
                const delta = (now - this.lastTime) / 1000;
                this.lastTime = now;

                // Spawn Logic: 2 enemies, interval decreases
                if(now > this.spawnTimer) {
                    this.spawnEnemies();
                    this.stats.wave++;
                    // Decrease interval over time (min 3 seconds)
                    this.spawnInterval = Math.max(3000, this.spawnInterval - 400); 
                    this.spawnTimer = now + this.spawnInterval;
                    this.updateUI();
                }

                this.input.update(delta);
                this.player.update(delta);

                // Update Entities
                for(let i = this.entities.length - 1; i >= 0; i--) {
                    const ent = this.entities[i];
                    ent.update(delta);
                    if(ent.dead) {
                        this.scene.remove(ent.mesh);
                        ent.dot.remove();
                        this.entities.splice(i, 1);
                        this.stats.kills++;
                        this.updateUI();
                    }
                }

                // Update Bullets
                for(let i = this.bullets.length - 1; i >= 0; i--) {
                    const b = this.bullets[i];
                    b.mesh.position.add(b.velocity);
                    b.life -= delta;

                    // Tree Collision
                    let hitTree = false;
                    for(let obs of this.obstacles) {
                        const dx = b.mesh.position.x - obs.x;
                        const dz = b.mesh.position.z - obs.z;
                        if(Math.sqrt(dx*dx + dz*dz) < obs.radius) { hitTree = true; break; }
                    }

                    if(hitTree || b.life <= 0) {
                        this.scene.remove(b.mesh);
                        this.bullets.splice(i, 1);
                        continue;
                    }

                    // Entity Collision
                    if(b.isPlayer) {
                        for(let ent of this.entities) {
                            if(b.mesh.position.distanceTo(ent.mesh.position) < 2.5) {
                                ent.dead = true;
                                this.scene.remove(b.mesh);
                                this.bullets.splice(i, 1);
                                break;
                            }
                        }
                    } else {
                        if(b.mesh.position.distanceTo(this.player.mesh.position) < 2.0) {
                            this.takeDamage(10); // Exactly 10 damage. 10 hits = 100 HP.
                            this.scene.remove(b.mesh);
                            this.bullets.splice(i, 1);
                        }
                    }
                }

                // Camera follow
                const camRadius = 16;
                this.camera.position.x = this.player.mesh.position.x - Math.sin(this.input.camAngle) * camRadius;
                this.camera.position.z = this.player.mesh.position.z - Math.cos(this.input.camAngle) * camRadius;
                this.camera.position.y = this.player.mesh.position.y + 8;
                this.camera.lookAt(this.player.mesh.position.x, this.player.mesh.position.y + 2, this.player.mesh.position.z);

                this.renderer.render(this.scene, this.camera);
            }
        }

        // ==========================================
        // INPUT MANAGEMENT
        // ==========================================
        class InputManager {
            constructor(engine) {
                this.engine = engine;
                this.joy = { x: 0, y: 0 };
                this.camAngle = 0;
                this.targetCamAngle = 0;
                this.lastTouchX = 0;
                
                this.bindEvents();
            }

            bindEvents() {
                window.addEventListener('touchstart', e => {
                    const t = Array.from(e.touches).find(t => t.clientX > window.innerWidth / 2);
                    if(t) this.lastTouchX = t.clientX;
                }, {passive: false});

                window.addEventListener('touchmove', e => {
                    const t = Array.from(e.touches).find(tx => tx.clientX > window.innerWidth / 2);
                    if(t) {
                        this.targetCamAngle -= (t.clientX - this.lastTouchX) * 0.006;
                        this.lastTouchX = t.clientX;
                    }
                }, {passive: false});

                const bound = document.getElementById('joy-bound');
                const knob = document.getElementById('joy-k');
                
                bound.addEventListener('touchmove', e => {
                    const t = e.touches[0];
                    const rect = bound.getBoundingClientRect();
                    const cx = rect.left + rect.width/2;
                    const cy = rect.top + rect.height/2;
                    this.joy.x = (t.clientX - cx) / 80;
                    this.joy.y = (t.clientY - cy) / 80;
                    const dist = Math.sqrt(this.joy.x**2 + this.joy.y**2);
                    if(dist > 1) { this.joy.x /= dist; this.joy.y /= dist; }
                    knob.style.transform = `translate(${this.joy.x*50}px, ${this.joy.y*50}px)`;
                });

                bound.addEventListener('touchend', () => {
                    this.joy = { x: 0, y: 0 };
                    knob.style.transform = `translate(0px, 0px)`;
                });

                document.getElementById('fire-btn').addEventListener('touchstart', () => {
                    this.engine.player.shoot();
                });
                
                document.getElementById('jump-btn').addEventListener('touchstart', () => {
                    this.engine.player.jump();
                });
            }

            update(delta) {
                // Smooth camera rotation
                this.camAngle += (this.targetCamAngle - this.camAngle) * 15 * delta;
            }
        }

        // ==========================================
        // ENTITIES
        // ==========================================
        class Entity {
            constructor(engine, color) {
                this.engine = engine;
                this.mesh = new THREE.Group();
                this.dead = false;
                this.buildRig(color);
                this.animTimer = 0;
            }

            buildRig(color) {
                const mat = new THREE.MeshStandardMaterial({color: color});
                const skin = new THREE.MeshStandardMaterial({color: 0xffdbac});
                const dark = new THREE.MeshStandardMaterial({color: 0x111111});

                this.body = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.4, 0.5), mat);
                this.body.position.y = 1.5;
                
                this.head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), skin);
                this.head.position.y = 2.5;

                this.armR = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.0, 0.3), mat);
                this.armR.position.set(0.65, 1.8, 0);
                
                this.gun = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.2, 1.2), dark);
                this.gun.position.set(0, -0.4, -0.5);
                this.armR.add(this.gun);

                this.armL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.0, 0.3), mat);
                this.armL.position.set(-0.65, 1.8, 0);

                this.legR = new THREE.Mesh(new THREE.BoxGeometry(0.35, 1.1, 0.35), mat);
                this.legR.position.set(0.25, 0.55, 0);

                this.legL = new THREE.Mesh(new THREE.BoxGeometry(0.35, 1.1, 0.35), mat);
                this.legL.position.set(-0.25, 0.55, 0);

                this.mesh.add(this.body, this.head, this.armR, this.armL, this.legR, this.legL);
            }

            checkCollision(nextX, nextZ) {
                for(let obs of this.engine.obstacles) {
                    const dx = nextX - obs.x;
                    const dz = nextZ - obs.z;
                    if(Math.sqrt(dx*dx + dz*dz) < obs.radius + 0.6) return true;
                }
                return false;
            }
        }

        class Player extends Entity {
            constructor(engine, color) {
                super(engine, color);
            }

            jump() {
                if(this.mesh.position.y <= 0) {
                    gsap.to(this.mesh.position, { y: 6, duration: 0.4, ease: "power2.out", yoyo: true, repeat: 1 });
                }
            }

            shoot() {
                const bGeo = new THREE.SphereGeometry(0.25, 6, 6);
                const bMat = new THREE.MeshBasicMaterial({color: 0x00ffff});
                const bMesh = new THREE.Mesh(bGeo, bMat);
                
                bMesh.position.copy(this.mesh.position).add(new THREE.Vector3(0, 2.0, 0));
                
                const dir = new THREE.Vector3(Math.sin(this.engine.input.camAngle), 0, Math.cos(this.engine.input.camAngle));
                const vel = dir.clone().multiplyScalar(2.5); // Bullet speed
                
                this.engine.bullets.push({ mesh: bMesh, velocity: vel, life: 3.0, isPlayer: true });
                this.engine.scene.add(bMesh);

                // Gun Recoil Animation
                gsap.killTweensOf(this.armR.rotation);
                this.armR.rotation.x = 0;
                gsap.to(this.armR.rotation, { x: -0.8, duration: 0.08, yoyo: true, repeat: 1 });
            }

            update(delta) {
                this.animTimer += delta * 15;
                const joy = this.engine.input.joy;
                const speed = 15 * delta;

                // Move based on camera angle
                const fwd = new THREE.Vector3(Math.sin(this.engine.input.camAngle), 0, Math.cos(this.engine.input.camAngle));
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), fwd);

                let nx = this.mesh.position.x + (fwd.x * -joy.y * speed) + (side.x * -joy.x * speed);
                let nz = this.mesh.position.z + (fwd.z * -joy.y * speed) + (side.z * -joy.x * speed);

                if(!this.checkCollision(nx, nz)) {
                    this.mesh.position.x = nx;
                    this.mesh.position.z = nz;
                }

                // Sync Player Rotation to Camera
                this.mesh.rotation.y = this.engine.input.camAngle + Math.PI;

                // Walk Animation
                if(Math.abs(joy.x) > 0.1 || Math.abs(joy.y) > 0.1) {
                    this.legL.rotation.x = Math.sin(this.animTimer) * 0.7;
                    this.legR.rotation.x = -Math.sin(this.animTimer) * 0.7;
                    this.armL.rotation.x = -Math.sin(this.animTimer) * 0.5;
                } else {
                    this.legL.rotation.x = 0;
                    this.legR.rotation.x = 0;
                    this.armL.rotation.x = 0;
                }

                // Update Minimap Dot
                const pDot = document.getElementById('p-dot');
                pDot.style.left = '70px'; pDot.style.top = '70px';
            }
        }

        class Enemy extends Entity {
            constructor(engine, color) {
                super(engine, color);
                this.lastShot = Date.now() + Math.random() * 1000;
                
                this.dot = document.createElement('div');
                this.dot.className = 'map-dot';
                this.dot.style.background = '#ff0000';
            }

            update(delta) {
                this.animTimer += delta * 12;
                const playerPos = this.engine.player.mesh.position;
                const dist = this.mesh.position.distanceTo(playerPos);
                
                // Proper Facing Direction Fix (lookAt with Z offset)
                // Entities are modeled facing +Z. ThreeJS lookAt assumes -Z. 
                // We point the mesh, then rotate Math.PI so it faces perfectly.
                this.mesh.lookAt(playerPos.x, this.mesh.position.y, playerPos.z);
                this.mesh.rotateY(Math.PI); 

                const dir = new THREE.Vector3().subVectors(playerPos, this.mesh.position).normalize();

                // Move towards player
                if(dist > 15) {
                    let nx = this.mesh.position.x + dir.x * 6 * delta;
                    let nz = this.mesh.position.z + dir.z * 6 * delta;
                    if(!this.checkCollision(nx, nz)) {
                        this.mesh.position.x = nx;
                        this.mesh.position.z = nz;
                    }
                    // Walk Anim
                    this.legL.rotation.x = Math.sin(this.animTimer) * 0.6;
                    this.legR.rotation.x = -Math.sin(this.animTimer) * 0.6;
                    this.armL.rotation.x = -Math.sin(this.animTimer) * 0.4;
                } else {
                    this.legL.rotation.x = 0; this.legR.rotation.x = 0; this.armL.rotation.x = 0;
                }

                // Shoot Logic
                if(Date.now() - this.lastShot > 2000 && dist < 50) {
                    const bGeo = new THREE.SphereGeometry(0.25, 6, 6);
                    const bMat = new THREE.MeshBasicMaterial({color: 0xff0000});
                    const bMesh = new THREE.Mesh(bGeo, bMat);
                    bMesh.position.copy(this.mesh.position).add(new THREE.Vector3(0, 2.0, 0));
                    
                    const vel = dir.clone().multiplyScalar(1.5);
                    this.engine.bullets.push({ mesh: bMesh, velocity: vel, life: 4.0, isPlayer: false });
                    this.engine.scene.add(bMesh);
                    
                    this.lastShot = Date.now();
                    
                    // Enemy Recoil
                    gsap.killTweensOf(this.armR.rotation);
                    this.armR.rotation.x = 0;
                    gsap.to(this.armR.rotation, { x: -0.8, duration: 0.1, yoyo: true, repeat: 1 });
                }

                // Minimap Update
                const mapScale = 1.0;
                const rx = (this.mesh.position.x - playerPos.x) * mapScale + 70;
                const rz = (this.mesh.position.z - playerPos.z) * mapScale + 70;
                this.dot.style.left = rx + 'px';
                this.dot.style.top = rz + 'px';
                this.dot.style.display = (rx<0||rx>140||rz<0||rz>140) ? 'none' : 'block';
            }
        }

        // Initialize Game
        const game = new GameEngine();

    </script>
