<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Temu Fortnite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; font-family: sans-serif; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .hud { position: absolute; background: rgba(0,0,0,0.8); color: #fff; padding: 10px; border: 2px solid #ff4444; }
        #health-ui { top: 10px; left: 10px; width: 160px; }
        #health-fill { width: 100%; height: 12px; background: #ff4444; }
        .bar-bg { width: 100%; height: 12px; background: #222; margin-top: 5px; }
        #btns { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .btn { width: 70px; height: 70px; background: rgba(0,0,0,0.6); color: white; border: 2px solid #0ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; }
        #fire-btn { background: #ff4444; width: 100px; height: 100px; font-size: 16px; border-color: #fff; }
        #joystick-ui { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; border: 2px solid #0ff; }
        #joystick-knob { position: absolute; width: 50px; height: 50px; background: #0ff; border-radius: 50%; left: 35px; top: 35px; }
        #zoom-ui { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; pointer-events: auto; }
        .zoom-btn { width: 50px; height: 50px; background: rgba(0,0,0,0.6); color: white; border: 1px solid #0ff; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="health-ui" class="hud">HEALTH<div class="bar-bg"><div id="health-fill"></div></div></div>
        <div id="zoom-ui">
            <div class="zoom-btn" id="zoom-in">+</div>
            <div class="zoom-btn" id="zoom-out">-</div>
        </div>
        <div id="btns">
            <div id="fire-btn" class="btn">FIRE</div>
            <div id="jump-btn" class="btn">JUMP</div>
        </div>
        <div id="joystick-ui"><div id="joystick-knob"></div></div>
    </div>

    <script>
        const socket = io("https://temu-fortnight2.onrender.com");
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(10, 20, 10);
        scene.add(sun, new THREE.AmbientLight(0x606060));

        // --- Environment ---
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({ color: 0x2e7d32 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        function createGrass(x, z) {
            const blade = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.6, 0.1), new THREE.MeshStandardMaterial({color: 0x3a9d42}));
            blade.position.set(x, 0.3, z);
            scene.add(blade);
        }
        for(let i=0; i<150; i++) createGrass(Math.random()*100-50, Math.random()*100-50);

        // --- Character with Gun ---
        function createPlayer() {
            const group = new THREE.Group();
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1, 0.4), new THREE.MeshStandardMaterial({color: 0x111122}));
            torso.position.y = 1.3;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 2.1;
            const lArm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.8, 0.2), new THREE.MeshStandardMaterial({color: 0x111122}));
            lArm.position.set(-0.5, 1.3, 0);
            const rArm = lArm.clone(); rArm.position.x = 0.5;
            
            const gun = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.2, 0.7), new THREE.MeshStandardMaterial({color: 0x222222}));
            gun.position.set(0, -0.3, -0.4);
            rArm.add(gun);

            const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.8, 0.3), new THREE.MeshStandardMaterial({color: 0x222222}));
            lLeg.position.set(-0.2, 0.4, 0);
            const rLeg = lLeg.clone(); rLeg.position.x = 0.2;

            group.add(torso, head, lArm, rArm, lLeg, rLeg);
            group.userData = { lArm, rArm, lLeg, rLeg, gun };
            return group;
        }

        const player = createPlayer();
        scene.add(player);
        const bullets = [];

        // --- Camera & Zoom ---
        let cameraAngle = 0;
        let cameraDist = 12;
        let lastTouchX = 0;

        document.getElementById('zoom-in').onclick = () => cameraDist = Math.max(5, cameraDist - 2);
        document.getElementById('zoom-out').onclick = () => cameraDist = Math.min(25, cameraDist + 2);

        window.addEventListener('touchstart', (e) => {
            if (e.touches[0].clientX > window.innerWidth / 2) lastTouchX = e.touches[0].clientX;
        });

        window.addEventListener('touchmove', (e) => {
            const touch = Array.from(e.touches).find(t => t.clientX > window.innerWidth / 2);
            if (touch) {
                const deltaX = touch.clientX - lastTouchX;
                cameraAngle -= deltaX * 0.01;
                lastTouchX = touch.clientX;
            }
        });

        // --- Joystick ---
        let joyPos = { x: 0, y: 0 };
        const joyKnob = document.getElementById('joystick-knob');
        document.getElementById('joystick-ui').addEventListener('touchmove', (e) => {
            const t = e.touches[0]; const r = e.currentTarget.getBoundingClientRect();
            joyPos.x = (t.clientX - (r.left + r.width/2))/60; joyPos.y = (t.clientY - (r.top + r.height/2))/60;
            const d = Math.sqrt(joyPos.x**2 + joyPos.y**2);
            if(d > 1) { joyPos.x /= d; joyPos.y /= d; }
            joyKnob.style.transform = `translate(${joyPos.x*40}px, ${joyPos.y*40}px)`;
        });
        document.getElementById('joystick-ui').addEventListener('touchend', () => {
            joyPos = {x:0, y:0}; joyKnob.style.transform = `translate(0,0)`;
        });

        // --- Projectiles ---
        document.getElementById('fire-btn').addEventListener('touchstart', () => {
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({color: 0xffff00}));
            b.position.copy(player.position).add(new THREE.Vector3(0, 1.5, 0));
            const dir = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), cameraAngle);
            b.userData.velocity = dir.multiplyScalar(0.8);
            scene.add(b);
            bullets.push(b);
            
            gsap.to(player.userData.rArm.rotation, { x: -0.5, duration: 0.1, yoyo: true, repeat: 1 });
        });

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.005;

            // SHIFT LOCK: Player faces camera direction
            player.rotation.y = cameraAngle;

            // CORRECTED MOVEMENT: Forward is always away from camera
            const moveSpeed = 0.2;
            player.position.x += (Math.sin(cameraAngle) * -joyPos.y + Math.cos(cameraAngle) * joyPos.x) * moveSpeed;
            player.position.z += (Math.cos(cameraAngle) * -joyPos.y - Math.sin(cameraAngle) * joyPos.x) * moveSpeed;

            // Animation
            if(Math.abs(joyPos.x) > 0.1 || Math.abs(joyPos.y) > 0.1) {
                player.userData.lLeg.rotation.x = Math.sin(time * 2) * 0.5;
                player.userData.rLeg.rotation.x = -Math.sin(time * 2) * 0.5;
            }

            // Projectile Physics
            bullets.forEach((b, i) => {
                b.position.add(b.userData.velocity);
                if(b.position.distanceTo(player.position) > 100) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                }
            });

            camera.position.set(player.position.x - Math.sin(cameraAngle)*cameraDist, 7, player.position.z - Math.cos(cameraAngle)*cameraDist);
            camera.lookAt(player.position.x, player.position.y + 1.5, player.position.z);
            
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
