<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Temu Fortnite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * { touch-action: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        #minimap { position: absolute; top: 15px; left: 15px; width: 110px; height: 110px; background: rgba(0,0,0,0.8); border: 2px solid #0ff; border-radius: 5px; pointer-events: auto; }
        .map-dot { position: absolute; width: 6px; height: 6px; border-radius: 50%; transform: translate(-50%, -50%); }
        #p-dot { background: #0ff; left: 55px; top: 55px; z-index: 2; }

        #stat-chart { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.8); color: #0ff; padding: 10px; border: 1px solid #0ff; font-family: monospace; min-width: 140px; }
        #health-ui { position: absolute; top: 135px; left: 15px; width: 180px; background: rgba(0,0,0,0.8); padding: 5px; border: 1px solid #ff4444; }
        #h-fill { width: 100%; height: 10px; background: #ff4444; }

        #btns { position: absolute; bottom: 30px; right: 20px; display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
        .btn { width: 80px; height: 80px; background: rgba(0,0,0,0.7); color: white; border: 3px solid #0ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        #fire-btn { background: #ff4444; width: 110px; height: 110px; font-size: 20px; }
        
        #joy-ui { position: absolute; bottom: 50px; left: 50px; width: 130px; height: 130px; background: rgba(0,255,255,0.1); border-radius: 50%; border: 2px solid #0ff; pointer-events: auto; }
        #joy-k { position: absolute; width: 50px; height: 50px; background: #0ff; border-radius: 50%; left: 40px; top: 40px; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="minimap"><div id="p-dot" class="map-dot"></div></div>
        <div id="stat-chart">ELIMINATIONS: <span id="p-kills">0</span></div>
        <div id="health-ui">HEALTH<div style="background:#222;height:10px;margin-top:4px;"><div id="h-fill"></div></div></div>
        <div id="btns"><div id="fire-btn" class="btn">FIRE</div><div id="jump-btn" class="btn">JUMP</div></div>
        <div id="joy-ui"><div id="joy-k"></div></div>
    </div>

    <script>
        document.addEventListener('touchstart', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x4a7c44);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6), new THREE.DirectionalLight(0xffffff, 0.8));
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x1a3c1a }));
        floor.rotation.x = -Math.PI/2; scene.add(floor);

        // --- TREES ARE BACK ---
        for(let i=0; i<40; i++) {
            const t = new THREE.Group();
            const tr = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 6), new THREE.MeshStandardMaterial({color:0x4b3621}));
            const lv = new THREE.Mesh(new THREE.ConeGeometry(3, 7, 8), new THREE.MeshStandardMaterial({color:0x0b2b0b}));
            lv.position.y = 5; t.add(tr, lv); t.position.set(Math.random()*300-150, 3, Math.random()*300-150); scene.add(t);
        }

        let kills = 0, hp = 100;
        const B_SPEED = 1.8;

        function createChar(col) {
            const g = new THREE.Group();
            const b = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.3, 0.5), new THREE.MeshStandardMaterial({color:col}));
            b.position.y = 1.45;
            const h = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.55, 0.55), new THREE.MeshStandardMaterial({color:0xeadaba}));
            h.position.y = 2.3;
            const aR = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.9, 0.3), new THREE.MeshStandardMaterial({color:col}));
            aR.position.set(0.6, 1.6, 0);
            const gun = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.25, 1.0), new THREE.MeshStandardMaterial({color:0x111111}));
            gun.position.set(0, -0.3, -0.4); aR.add(gun);
            const aL = aR.clone(); aL.position.x = -0.6; aL.remove(aL.children[0]);
            const lL = new THREE.Mesh(new THREE.BoxGeometry(0.35, 1.1, 0.35), new THREE.MeshStandardMaterial({color:col}));
            lL.position.set(-0.3, 0.55, 0);
            const lR = lL.clone(); lR.position.x = 0.3;
            g.add(b, h, aL, aR, lL, lR);
            return { g, aR, lL, lR };
        }

        const p = createChar(0x0044ff); scene.add(p.g);
        let enemies = [];
        const minimap = document.getElementById('minimap');

        function spawnEnemy() {
            const e = createChar(0xff0000);
            const ang = Math.random()*Math.PI*2; const d = 60;
            e.g.position.set(p.g.position.x + Math.cos(ang)*d, 0, p.g.position.z + Math.sin(ang)*d);
            e.lastS = Date.now();
            e.dot = document.createElement('div');
            e.dot.className = 'map-dot'; e.dot.style.background = 'red';
            minimap.appendChild(e.dot);
            scene.add(e.g); enemies.push(e);
        }
        
        spawnEnemy();
        let spawnTimer = 0;

        let cAng = 0, tAng = 0, lastX = 0, joy = {x:0, y:0};
        const pB = [], eB = [];

        window.addEventListener('touchstart', e => { if(e.touches[0].clientX > window.innerWidth/2) lastX = e.touches[0].clientX; });
        window.addEventListener('touchmove', e => {
            const t = Array.from(e.touches).find(tx => tx.clientX > window.innerWidth/2);
            if(t) { tAng -= (t.clientX - lastX) * 0.01; lastX = t.clientX; }
        });

        document.getElementById('fire-btn').addEventListener('touchstart', () => {
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshBasicMaterial({color:0xffcc00}));
            b.position.copy(p.g.position).add(new THREE.Vector3(0, 1.8, 0));
            // CAMERA FIX: Use camAngle directly, no snapping
            const dir = new THREE.Vector3(Math.sin(cAng), 0, Math.cos(cAng));
            b.userData.v = dir.multiplyScalar(B_SPEED);
            scene.add(b); pB.push(b);
            gsap.to(p.aR.rotation, { x: -0.7, duration: 0.1, yoyo: true, repeat: 1 });
        });

        const knob = document.getElementById('joy-k');
        document.getElementById('joy-ui').addEventListener('touchmove', e => {
            const t = e.touches[0], r = e.currentTarget.getBoundingClientRect();
            joy.x = (t.clientX - (r.left + r.width/2))/65; joy.y = (t.clientY - (r.top + r.height/2))/65;
            const d = Math.sqrt(joy.x**2+joy.y**2); if(d>1){joy.x/=d; joy.y/=d;}
            knob.style.transform = `translate(${joy.x*40}px, ${joy.y*40}px)`;
        });
        document.getElementById('joy-ui').addEventListener('touchend', () => { joy = {x:0, y:0}; knob.style.transform = `translate(0,0)`; });

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now();
            const animTime = time * 0.008;

            cAng += (tAng - cAng) * 0.15;
            p.g.rotation.y = cAng + Math.PI; // Sync player to camera, no snapping back

            const f = new THREE.Vector3(Math.sin(cAng), 0, Math.cos(cAng));
            const s = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), f);
            p.g.position.add(f.multiplyScalar(-joy.y * 0.45));
            p.g.position.add(s.multiplyScalar(-joy.x * 0.45));

            if(Math.abs(joy.x)>0.1 || Math.abs(joy.y)>0.1) {
                p.lL.rotation.x = Math.sin(animTime)*0.7; p.lR.rotation.x = -Math.sin(animTime)*0.7;
            }

            // Spawn Cycle
            if(time > spawnTimer) {
                if(enemies.length < 5) spawnEnemy();
                spawnTimer = time + Math.max(2000, 8000 - (kills * 500));
            }

            enemies.forEach((en, i) => {
                const dist = en.g.position.distanceTo(p.g.position);
                const dir = new THREE.Vector3().subVectors(p.g.position, en.g.position).normalize();
                
                // HYPER AGGRESSIVE MOVEMENT
                if(dist > 10) en.g.position.add(dir.multiplyScalar(0.18));
                en.g.lookAt(p.g.position.x, 0, p.g.position.z);
                en.lL.rotation.x = Math.sin(animTime)*0.6; en.lR.rotation.x = -Math.sin(animTime)*0.6;

                const rx = (en.g.position.x - p.g.position.x) * 1.0 + 55;
                const rz = (en.g.position.z - p.g.position.z) * 1.0 + 55;
                en.dot.style.left = rx+'px'; en.dot.style.top = rz+'px';
                en.dot.style.display = (rx<0||rx>110||rz<0||rz>110)?'none':'block';

                if(time - en.lastS > 1800 && dist < 70) {
                    const eb = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color:0xff0000}));
                    eb.position.copy(en.g.position).add(new THREE.Vector3(0, 1.8, 0));
                    eb.userData.v = dir.clone().multiplyScalar(B_SPEED);
                    scene.add(eb); eB.push(eb); en.lastS = time;
                }
            });

            // Bullet updates
            pB.forEach((b, i) => {
                b.position.add(b.userData.v);
                enemies.forEach((en, ei) => {
                    if(b.position.distanceTo(en.g.position) < 2) {
                        scene.remove(en.g); en.dot.remove(); enemies.splice(ei, 1);
                        scene.remove(b); pB.splice(i, 1);
                        kills++; document.getElementById('p-kills').innerText = kills;
                    }
                });
                if(b.position.distanceTo(p.g.position) > 150) { scene.remove(b); pB.splice(i, 1); }
            });

            eB.forEach((eb, i) => {
                eb.position.add(eb.userData.v);
                if(eb.position.distanceTo(p.g.position) < 1.6) {
                    hp -= 10; scene.remove(eb); eB.splice(i, 1);
                }
                if(eb.position.distanceTo(p.g.position) > 150) { scene.remove(eb); eB.splice(i, 1); }
            });

            document.getElementById('h-fill').style.width = hp + "%";
            if(hp <= 0) { hp = 100; kills = 0; document.getElementById('p-kills').innerText = kills; }

            camera.position.set(p.g.position.x - Math.sin(cAng)*16, 10, p.g.position.z - Math.cos(cAng)*16);
            camera.lookAt(p.g.position.x, p.g.position.y+2, p.g.position.z);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
