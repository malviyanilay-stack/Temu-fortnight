<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Temu Fortnite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; font-family: 'Courier New', Courier, monospace; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .hud { position: absolute; background: rgba(0,0,0,0.8); color: #0ff; padding: 10px; border: 2px solid #0ff; }
        #health-ui { top: 10px; left: 10px; width: 180px; }
        #health-fill { width: 100%; height: 15px; background: #ff4444; box-shadow: 0 0 10px #ff4444; }
        .bar-bg { width: 100%; height: 15px; background: #111; margin-top: 5px; }
        #btns { position: absolute; bottom: 30px; right: 20px; display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
        .btn { width: 80px; height: 80px; background: rgba(0,255,255,0.1); color: #0ff; border: 2px solid #0ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; text-shadow: 0 0 5px #0ff; }
        #fire-btn { background: rgba(255,0,0,0.3); width: 110px; height: 110px; border-color: #ff4444; color: #ff4444; }
        #joystick-ui { position: absolute; bottom: 50px; left: 50px; width: 140px; height: 140px; background: rgba(0,255,255,0.05); border-radius: 50%; pointer-events: auto; border: 2px solid #0ff; }
        #joystick-knob { position: absolute; width: 60px; height: 60px; background: #0ff; border-radius: 50%; left: 40px; top: 40px; box-shadow: 0 0 15px #0ff; }
        #zoom-ui { position: absolute; top: 10px; right: 10px; display: flex; gap: 10px; pointer-events: auto; }
        .zoom-btn { width: 50px; height: 50px; background: rgba(0,0,0,0.8); color: #0ff; border: 1px solid #0ff; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="health-ui" class="hud">MANA STAT<div class="bar-bg"><div id="health-fill"></div></div></div>
        <div id="zoom-ui"><div class="zoom-btn" id="zin">+</div><div class="zoom-btn" id="zout">-</div></div>
        <div id="btns"><div id="fire-btn" class="btn">FIRE</div><div id="jump-btn" class="btn">JUMP</div></div>
        <div id="joystick-ui"><div id="joystick-knob"></div></div>
    </div>

    <script>
        const socket = io("https://temu-fortnight2.onrender.com");
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a); // Darker combat sky
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(5, 10, 7.5);
        scene.add(sun, new THREE.AmbientLight(0x404040));

        // --- THE TREES (Safety First) ---
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x1a3d1a }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        function spawnTree(x, z) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, 4), new THREE.MeshStandardMaterial({color: 0x4d2a1a}));
            trunk.position.y = 2;
            const leaves = new THREE.Mesh(new THREE.IcosahedronGeometry(2, 1), new THREE.MeshStandardMaterial({color: 0x2e5d2e}));
            leaves.position.y = 5;
            tree.add(trunk, leaves);
            tree.position.set(x, 0, z);
            scene.add(tree);
        }
        for(let i=0; i<30; i++) spawnTree(Math.random()*200-100, Math.random()*200-100);

        // --- PLAYER MODEL ---
        function createPlayer() {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({color: 0x2222ff});
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 2.1;
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.1, 0.4), mat);
            torso.position.y = 1.3;
            
            const armL = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.8, 0.25), mat);
            armL.position.set(-0.5, 1.3, 0);
            const armR = armL.clone();
            armR.position.x = 0.5;

            const gun = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.8), new THREE.MeshStandardMaterial({color: 0x111111}));
            gun.position.set(0, -0.2, -0.4);
            armR.add(gun);

            const legL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.9, 0.3), new THREE.MeshStandardMaterial({color: 0x111111}));
            legL.position.set(-0.2, 0.45, 0);
            const legR = legL.clone();
            legR.position.x = 0.2;

            group.add(head, torso, armL, armR, legL, legR);
            group.userData = { armL, armR, legL, legR, gun };
            return group;
        }

        const player = createPlayer();
        scene.add(player);
        const bullets = [];

        // --- CAMERA & ZOOM ---
        let camAngle = 0;
        let camDist = 12;
        let lastX = 0;

        document.getElementById('zin').onclick = () => camDist = Math.max(4, camDist - 2);
        document.getElementById('zout').onclick = () => camDist = Math.min(30, camDist + 2);

        window.addEventListener('touchstart', e => { if(e.touches[0].clientX > window.innerWidth/2) lastX = e.touches[0].clientX; });
        window.addEventListener('touchmove', e => {
            const touch = Array.from(e.touches).find(t => t.clientX > window.innerWidth/2);
            if(touch) {
                camAngle -= (touch.clientX - lastX) * 0.01;
                lastX = touch.clientX;
            }
        });

        // --- JOYSTICK ---
        let joy = { x: 0, y: 0 };
        const knob = document.getElementById('joystick-knob');
        document.getElementById('joystick-ui').addEventListener('touchmove', e => {
            const t = e.touches[0], r = e.currentTarget.getBoundingClientRect();
            joy.x = (t.clientX - (r.left + r.width/2))/70;
            joy.y = (t.clientY - (r.top + r.height/2))/70;
            const d = Math.sqrt(joy.x**2 + joy.y**2);
            if(d > 1) { joy.x/=d; joy.y/=d; }
            knob.style.transform = `translate(${joy.x*45}px, ${joy.y*45}px)`;
        });
        document.getElementById('joystick-ui').addEventListener('touchend', () => { joy = {x:0, y:0}; knob.style.transform = `translate(0,0)`; });

        // --- FIRE PROJECTILES ---
        document.getElementById('fire-btn').addEventListener('touchstart', () => {
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({color: 0x00ffff}));
            b.position.copy(player.position).add(new THREE.Vector3(0, 1.5, 0));
            const dir = new THREE.Vector3(Math.sin(camAngle), 0, Math.cos(camAngle)).normalize();
            b.userData.vel = dir.multiplyScalar(-1.2); // Forward relative to shift lock
            scene.add(b);
            bullets.push(b);
            gsap.to(player.userData.armR.rotation, { x: -0.8, duration: 0.1, yoyo: true, repeat: 1 });
        });

        function animate() {
            requestAnimationFrame(animate);
            const t = Date.now() * 0.006;

            // SHIFT LOCK FIX: Player faces camera direction (rotated 180 to fix "backwards" issue)
            player.rotation.y = camAngle + Math.PI;

            // CORRECTED MOVEMENT
            const speed = 0.25;
            player.position.x += (Math.sin(camAngle) * -joy.y + Math.cos(camAngle) * joy.x) * speed;
            player.position.z += (Math.cos(camAngle) * -joy.y - Math.sin(cameraAngle) * joy.x) * speed;

            // WALK ANIM
            if(Math.abs(joy.x) > 0.1 || Math.abs(joy.y) > 0.1) {
                player.userData.legL.rotation.x = Math.sin(t) * 0.6;
                player.userData.legR.rotation.x = -Math.sin(t) * 0.6;
                player.userData.armL.rotation.x = -Math.sin(t) * 0.4;
            }

            // BULLETS
            bullets.forEach((b, i) => {
                b.position.add(b.userData.vel);
                if(b.position.distanceTo(player.position) > 60) { scene.remove(b); bullets.splice(i,1); }
            });

            camera.position.set(player.position.x - Math.sin(camAngle)*camDist, 8, player.position.z - Math.cos(camAngle)*camDist);
            camera.lookAt(player.position.x, player.position.y + 1.5, player.position.z);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
