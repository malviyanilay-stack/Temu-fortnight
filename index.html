<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Temu Fortnite: Render Online</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* --- SAFARI ANTI-ZOOM & SYSTEM LOCK --- */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            touch-action: none; user-select: none; 
            -webkit-user-select: none; -webkit-tap-highlight-color: transparent; 
        }
        body { background: #000; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        #c { width: 100vw; height: 100vh; display: block; }

        /* UI HUD */
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 100; color: #fff; font-family: 'Arial Black', sans-serif; }
        
        #minimap { 
            position: absolute; top: 20px; left: 20px; width: 140px; height: 140px; 
            background: rgba(0,25,0,0.8); border: 3px solid #00ffff; pointer-events: auto;
        }
        .dot { position: absolute; width: 7px; height: 7px; border-radius: 50%; transform: translate(-50%, -50%); }
        #p-dot { background: #fff; box-shadow: 0 0 10px #fff; z-index: 10; }

        #stats { 
            position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.8); 
            padding: 15px; border-right: 6px solid #00ffff; text-align: right;
        }
        .stat-val { font-size: 26px; color: #00ffff; font-weight: 900; }

        #health-container { 
            position: absolute; top: 180px; left: 20px; width: 220px; 
            background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid #ffaa00;
        }
        #h-bar { width: 100%; height: 16px; background: #ffaa00; transition: width 0.2s; }

        /* JOYSTICK */
        #joy-base { 
            position: absolute; bottom: 60px; left: 60px; width: 150px; height: 150px; 
            background: rgba(255,255,255,0.05); border: 2px solid #00ffff66; border-radius: 50%; pointer-events: auto;
        }
        #joy-knob { 
            position: absolute; width: 75px; height: 75px; background: #00ffff; 
            border-radius: 50%; top: 37px; left: 37px; opacity: 0.9; box-shadow: 0 0 20px #00ffff;
        }

        /* ACTION BUTTONS */
        #action-zone { 
            position: absolute; bottom: 60px; right: 60px; display: flex; flex-direction: column; gap: 20px; pointer-events: auto;
        }
        .btn { 
            width: 110px; height: 110px; border-radius: 50%; border: 4px solid #fff; 
            background: rgba(0,0,0,0.6); color: #fff; display: flex; align-items: center; 
            justify-content: center; font-weight: 900; font-size: 18px;
        }
        #fire-btn { 
            width: 140px; height: 140px; border-color: #ff3333; color: #ff3333; font-size: 26px; 
            box-shadow: 0 0 15px rgba(255,0,0,0.4);
        }

        #aim-catcher { position: absolute; top: 0; right: 0; width: 65%; height: 100%; pointer-events: auto; z-index: 10; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="aim-catcher"></div>
        <div id="minimap"><div id="p-dot" class="dot" style="left:70px; top:70px;"></div></div>
        <div id="stats">
            <div style="font-size: 10px;">ELIMINATIONS</div>
            <div id="k-count" class="stat-val">0</div>
        </div>
        <div id="health-container">
            <div style="font-size: 10px; color:#ffaa00; margin-bottom: 5px;">HEALTH</div>
            <div style="background:#200; height:16px;"><div id="h-bar"></div></div>
        </div>
        <div id="joy-base"><div id="joy-knob"></div></div>
        <div id="action-zone">
            <div id="fire-btn" class="btn">FIRE</div>
            <div id="jump-btn" class="btn">JUMP</div>
        </div>
    </div>
    <canvas id="c"></canvas>

    <script>
        // --- 1. NETWORKING ---
        const socket = io("https://temu-fortnight.onrender.com/");
        let myId = null;
        let remotes = {};
        let enemies = {};
        let bullets = [];

        // --- 2. ENGINE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1500);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // --- 3. CHARACTER MAKER (Anti-Cube Fix) ---
        function createMan(color) {
            const group = new THREE.Group();
            // The Body
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(1.1, 1.8, 0.6), 
                new THREE.MeshStandardMaterial({ color })
            );
            body.position.y = 0.9;
            // The Head (Skin color)
            const head = new THREE.Mesh(
                new THREE.BoxGeometry(0.75, 0.75, 0.75), 
                new THREE.MeshStandardMaterial({ color: 0xffdbac })
            );
            head.position.y = 2.15;
            group.add(body, head);
            return group;
        }

        // --- 4. WORLD BUILDING ---
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(2000, 2000), 
            new THREE.MeshStandardMaterial({ color: 0x5d994d })
        );
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);
        scene.add(new THREE.AmbientLight(0xffffff, 0.85));

        // --- 5. PLAYER ---
        const player = createMan(0x0000ff); // Local player is Blue
        scene.add(player);

        // --- 6. CONTROLS & SAFARI LOCK ---
        let move = {x:0, y:0}, look = {dx:0, id:null, lastX:0}, angle = 0, lastTap = 0;

        const handleJoy = (e) => {
            const r = document.getElementById('joy-base').getBoundingClientRect();
            const t = e.touches[0];
            let dx = (t.clientX - (r.left + r.width/2))/75;
            let dy = (t.clientY - (r.top + r.height/2))/75;
            const d = Math.sqrt(dx*dx+dy*dy);
            if(d > 1) { dx/=d; dy/=d; }
            move = {x:dx, y:dy};
            document.getElementById('joy-knob').style.transform = `translate(${dx*50}px, ${dy*50}px)`;
        };

        document.getElementById('joy-base').addEventListener('touchstart', handleJoy);
        document.getElementById('joy-base').addEventListener('touchmove', handleJoy);
        document.getElementById('joy-base').addEventListener('touchend', () => {
            move = {x:0, y:0};
            document.getElementById('joy-knob').style.transform = `translate(0,0)`;
        });

        document.getElementById('aim-catcher').addEventListener('touchstart', e => {
            const t = e.changedTouches[0];
            if(!look.id) { look.id = t.identifier; look.lastX = t.clientX; }
        });
        document.getElementById('aim-catcher').addEventListener('touchmove', e => {
            for(let t of e.changedTouches) {
                if(t.identifier === look.id) {
                    look.dx = t.clientX - look.lastX;
                    look.lastX = t.clientX;
                }
            }
        });

        // SAFARI LOCK
        document.addEventListener('touchend', e => {
            const now = Date.now();
            if(now - lastTap < 300) e.preventDefault();
            lastTap = now;
        }, { passive: false });

        // --- 7. FIRE LOGIC ---
        function fire() {
            const dir = new THREE.Vector3(Math.sin(angle), 0, Math.cos(angle));
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.22), new THREE.MeshBasicMaterial({color: 0x00ffff}));
            b.position.copy(player.position).add(new THREE.Vector3(0, 1.5, 0));
            bullets.push({ m: b, v: dir.multiplyScalar(2.8), life: 100 });
            scene.add(b);
            socket.emit('shoot', { pos: player.position, dir });
        }
        document.getElementById('fire-btn').addEventListener('touchstart', fire);

        // --- 8. SYNC ---
        socket.on('init', data => {
            myId = data.id;
            Object.keys(data.enemies).forEach(id => spawnEnemyMesh(data.enemies[id]));
        });

        socket.on('state', data => {
            Object.keys(data.players).forEach(id => {
                if(id === socket.id) return;
                if(!remotes[id]) {
                    remotes[id] = createMan(0xeeeeee);
                    scene.add(remotes[id]);
                }
                const p = data.players[id];
                remotes[id].position.set(p.x, 0, p.z);
                remotes[id].rotation.y = p.r + Math.PI;
            });
        });

        function spawnEnemyMesh(data) {
            if(!enemies[data.id]) {
                enemies[data.id] = createMan(0xff0000);
                enemies[data.id].position.set(data.x, 0, data.z);
                scene.add(enemies[data.id]);
            }
        }
        socket.on('spawnEnemy', data => spawnEnemyMesh(data));

        socket.on('playerLeave', id => {
            if(remotes[id]) { scene.remove(remotes[id]); delete remotes[id]; }
        });

        // --- 9. LOOP ---
        function loop() {
            requestAnimationFrame(loop);
            
            angle -= look.dx * 0.008; look.dx = 0;
            player.rotation.y = angle + Math.PI;

            const f = new THREE.Vector3(Math.sin(angle), 0, Math.cos(angle));
            const s = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), f);
            player.position.x += (f.x * -move.y * 0.38) + (s.x * -move.x * 0.38);
            player.position.z += (f.z * -move.y * 0.38) + (s.z * -move.x * 0.38);

            socket.emit('move', { x: player.position.x, z: player.position.z, r: angle });

            bullets.forEach((b, i) => {
                b.m.position.add(b.v);
                if(--b.life <= 0) { scene.remove(b.m); bullets.splice(i,1); }
            });

            camera.position.set(player.position.x - Math.sin(angle)*18, 11, player.position.z - Math.cos(angle)*18);
            camera.lookAt(player.position.x, 2, player.position.z);
            renderer.render(scene, camera);
        }
        loop();
    </script>
</body>
</html>
