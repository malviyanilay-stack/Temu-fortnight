<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Temu Fortnite - Optimized Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * { touch-action: none; user-select: none; outline: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Courier New', monospace; }
        
        #loader { position: absolute; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #0ff; }
        .bar-container { width: 200px; height: 4px; background: #111; margin-top: 10px; border: 1px solid #0ff; }
        #load-progress { width: 0%; height: 100%; background: #0ff; transition: width 0.1s; }

        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; color: #fff; display: none; }
        
        #minimap { position: absolute; top: 20px; left: 20px; width: 150px; height: 150px; background: rgba(0,20,20,0.8); border: 2px solid #0ff; border-radius: 4px; overflow: hidden; pointer-events: auto; }
        .map-dot { position: absolute; width: 6px; height: 6px; border-radius: 50%; transform: translate(-50%, -50%); }
        #p-dot { background: #0ff; left: 75px; top: 75px; z-index: 5; box-shadow: 0 0 8px #0ff; }

        #hud-top { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.85); padding: 15px; border-right: 4px solid #0ff; min-width: 180px; pointer-events: auto; }
        .stat-line { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px; }
        .stat-val { color: #0ff; font-weight: bold; }

        #vitals { position: absolute; top: 190px; left: 20px; width: 220px; background: rgba(0,0,0,0.8); padding: 10px; border-left: 4px solid #0f0; }
        .vital-label { font-size: 12px; letter-spacing: 2px; color: #fff; margin-bottom: 5px; font-weight: bold; }
        .vital-bg { width: 100%; height: 14px; background: #222; border-radius: 2px; overflow: hidden; }
        #health-fill { width: 100%; height: 100%; background: #0f0; transition: width 0.2s, background 0.3s; }

        .ctrl-area { position: absolute; bottom: 0; width: 100%; height: 300px; pointer-events: none; }
        #joy-base { position: absolute; bottom: 50px; left: 50px; width: 150px; height: 150px; background: rgba(0,255,255,0.05); border: 2px solid rgba(0,255,255,0.2); border-radius: 50%; pointer-events: auto; }
        #joy-stick { position: absolute; width: 60px; height: 60px; background: #0ff; border-radius: 50%; left: 45px; top: 45px; box-shadow: 0 0 15px #0ff; pointer-events: none; }

        #action-btns { position: absolute; bottom: 50px; right: 50px; display: flex; flex-direction: column; gap: 20px; pointer-events: auto; }
        .act-btn { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #0ff; background: rgba(0,0,0,0.8); color: #fff; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 16px; box-shadow: 0 0 10px rgba(0,255,255,0.2); }
        #fire-btn { width: 120px; height: 120px; border-color: #ff3333; color: #ff3333; font-size: 22px; }
        
        #damage-flash { position: fixed; inset: 0; background: rgba(255,0,0,0); pointer-events: none; transition: background 0.1s; z-index: 100; }
    </style>
</head>
<body>
    <div id="loader">
        <div id="status">INITIALIZING ONLINE ENVIRONMENT...</div>
        <div class="bar-container"><div id="load-progress"></div></div>
    </div>
    <div id="damage-flash"></div>
    <div id="ui">
        <div id="minimap"><div id="p-dot" class="map-dot"></div></div>
        <div id="hud-top">
            <div class="stat-line">ENEMIES ALIVE: <span id="alive-count" class="stat-val">0</span></div>
            <div class="stat-line">ELIMINATIONS: <span id="kill-count" class="stat-val">0</span></div>
        </div>
        <div id="vitals">
            <div class="vital-label">HEALTH</div>
            <div class="vital-bg"><div id="health-fill"></div></div>
        </div>
        <div class="ctrl-area">
            <div id="joy-base"><div id="joy-stick"></div></div>
            <div id="action-btns">
                <div id="fire-btn" class="act-btn">FIRE</div>
                <div id="jump-btn" class="act-btn">JUMP</div>
            </div>
        </div>
    </div>

    <script>
        /**
         * ENGINE CORE: OPTIMIZED ARCHITECTURE
         * Features: Object Pooling, InstancedMesh, Fixed Animations, Steady Spawn Rate
         */

        // --- 1. OPTIMIZED TEXTURE GENERATOR ---
        class TextureManager {
            static generateGrass() {
                const canvas = document.createElement('canvas');
                canvas.width = 512; canvas.height = 512;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#1e4d2b'; ctx.fillRect(0,0,512,512);
                for(let i=0; i<4000; i++) {
                    ctx.fillStyle = Math.random() > 0.5 ? '#228b22' : '#006400';
                    ctx.fillRect(Math.random()*512, Math.random()*512, 2, 8 + Math.random()*15);
                }
                const tex = new THREE.CanvasTexture(canvas);
                tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                tex.repeat.set(40, 40);
                return tex;
            }
        }

        // --- 2. OBJECT POOLING FOR BULLETS ---
        class BulletPool {
            constructor(scene, maxBullets = 150) {
                this.pool = [];
                const geo = new THREE.SphereGeometry(0.2, 4, 4); // Low poly spheres
                for(let i=0; i<maxBullets; i++) {
                    const mat = new THREE.MeshBasicMaterial({color: 0x00ffff});
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.visible = false;
                    scene.add(mesh);
                    this.pool.push({ mesh, vel: new THREE.Vector3(), active: false, life: 0, isPlayer: false });
                }
            }

            fire(pos, dir, speed, isPlayer) {
                const bullet = this.pool.find(b => !b.active);
                if(bullet) {
                    bullet.mesh.position.copy(pos);
                    bullet.vel.copy(dir).multiplyScalar(speed);
                    bullet.active = true;
                    bullet.mesh.visible = true;
                    bullet.life = 100; // Frames before despawn
                    bullet.isPlayer = isPlayer;
                    bullet.mesh.material.color.setHex(isPlayer ? 0x00ffff : 0xff0000);
                }
            }
        }

        // --- 3. ENTITY SYSTEM ---
        class Entity {
            constructor(color) {
                this.mesh = new THREE.Group();
                this.mat = new THREE.MeshStandardMaterial({color: color});
                this.buildRig();
                this.animTime = 0;
            }

            buildRig() {
                const skin = new THREE.MeshStandardMaterial({color: 0xffdbac});
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.4, 0.5), this.mat);
                body.position.y = 1.5;
                const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), skin);
                head.position.y = 2.5;
                this.armR = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.0, 0.3), this.mat);
                this.armR.position.set(0.65, 1.8, 0);
                const gun = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.2, 1.2), new THREE.MeshBasicMaterial({color: 0x111}));
                gun.position.set(0, -0.4, -0.5);
                this.armR.add(gun);
                this.armL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.0, 0.3), this.mat);
                this.armL.position.set(-0.65, 1.8, 0);
                this.legR = new THREE.Mesh(new THREE.BoxGeometry(0.35, 1.1, 0.35), this.mat);
                this.legR.position.set(0.25, 0.55, 0);
                this.legL = new THREE.Mesh(new THREE.BoxGeometry(0.35, 1.1, 0.35), this.mat);
                this.legL.position.set(-0.25, 0.55, 0);
                this.mesh.add(body, head, this.armR, this.armL, this.legR, this.legL);
            }

            walkAnim(speed) {
                this.animTime += speed;
                this.legL.rotation.x = Math.sin(this.animTime) * 0.7;
                this.legR.rotation.x = -Math.sin(this.animTime) * 0.7;
                this.armL.rotation.x = -Math.sin(this.animTime) * 0.5;
            }

            stopAnim() {
                this.legL.rotation.x = 0;
                this.legR.rotation.x = 0;
                this.armL.rotation.x = 0;
            }

            recoil() {
                gsap.killTweensOf(this.armR.rotation);
                this.armR.rotation.x = 0;
                gsap.to(this.armR.rotation, { x: -0.8, duration: 0.08, yoyo: true, repeat: 1 });
            }
        }

        // --- 4. MAIN ENGINE ---
        class GameEngine {
            constructor() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x87ceeb);
                this.camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: false }); // Anti-alias off for speed
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                document.body.appendChild(this.renderer.domElement);

                this.bullets = new BulletPool(this.scene);
                this.enemies = [];
                this.obstacles = [];
                
                // Static Spawn Rate Logic
                this.spawnTimer = 0;
                this.SPAWN_INTERVAL = 5000; // Exactly 5 seconds, DOES NOT CHANGE.
                
                this.stats = { hp: 100, kills: 0 };
                this.input = { joy: {x:0, y:0}, camAngle: 0, targetCamAngle: 0, lastX: 0 };

                this.initLoad();
            }

            initLoad() {
                let progress = 0;
                const pBar = document.getElementById('load-progress');
                const int = setInterval(() => {
                    progress += 20;
                    pBar.style.width = progress + '%';
                    if(progress >= 100) {
                        clearInterval(int);
                        this.setupWorld();
                        setTimeout(() => {
                            document.getElementById('loader').style.display = 'none';
                            document.getElementById('ui').style.display = 'block';
                            this.bindEvents();
                            this.lastFrame = Date.now();
                            this.animate();
                        }, 500);
                    }
                }, 100);
            }

            setupWorld() {
                // Lights
                this.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
                const dLight = new THREE.DirectionalLight(0xffffff, 0.8);
                dLight.position.set(100, 100, 50);
                this.scene.add(dLight);

                // Floor
                const floorMat = new THREE.MeshStandardMaterial({ map: TextureManager.generateGrass() });
                const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), floorMat);
                floor.rotation.x = -Math.PI/2;
                this.scene.add(floor);

                // Instanced Trees (Massive optimization)
                const tTrunkGeo = new THREE.CylinderGeometry(0.8, 1.2, 8, 6);
                const tLeavesGeo = new THREE.ConeGeometry(5, 12, 6);
                const tTrunkMat = new THREE.MeshStandardMaterial({color: 0x3d2817});
                const tLeavesMat = new THREE.MeshStandardMaterial({color: 0x1e4d2b});

                const treeCount = 100;
                this.instancedTrunks = new THREE.InstancedMesh(tTrunkGeo, tTrunkMat, treeCount);
                this.instancedLeaves = new THREE.InstancedMesh(tLeavesGeo, tLeavesMat, treeCount);
                
                const dummy = new THREE.Object3D();
                for(let i=0; i<treeCount; i++) {
                    const x = (Math.random()-0.5) * 600;
                    const z = (Math.random()-0.5) * 600;
                    if(Math.abs(x) < 30 && Math.abs(z) < 30) continue; // Keep center clear
                    
                    dummy.position.set(x, 4, z);
                    dummy.updateMatrix();
                    this.instancedTrunks.setMatrixAt(i, dummy.matrix);
                    
                    dummy.position.set(x, 12, z);
                    dummy.updateMatrix();
                    this.instancedLeaves.setMatrixAt(i, dummy.matrix);
                    
                    this.obstacles.push({x, z, r: 1.5});
                }
                this.scene.add(this.instancedTrunks, this.instancedLeaves);

                // Instanced Tall Grass
                const gGeo = new THREE.PlaneGeometry(1.2, 4);
                const gMat = new THREE.MeshBasicMaterial({color: 0x228b22, side: THREE.DoubleSide});
                this.instancedGrass = new THREE.InstancedMesh(gGeo, gMat, 3000);
                for(let i=0; i<3000; i++) {
                    dummy.position.set((Math.random()-0.5)*800, 2, (Math.random()-0.5)*800);
                    dummy.rotation.y = Math.random() * Math.PI;
                    dummy.updateMatrix();
                    this.instancedGrass.setMatrixAt(i, dummy.matrix);
                }
                this.scene.add(this.instancedGrass);

                // Player
                this.player = new Entity(0x0055ff);
                this.scene.add(this.player.mesh);
            }

            spawnEnemies() {
                // Always exactly 2 at a normal rate
                for(let i=0; i<2; i++) {
                    const en = new Entity(0xff1100);
                    const ang = Math.random() * Math.PI * 2;
                    en.mesh.position.set(this.player.mesh.position.x + Math.cos(ang)*70, 0, this.player.mesh.position.z + Math.sin(ang)*70);
                    en.lastShot = Date.now();
                    
                    en.dot = document.createElement('div');
                    en.dot.className = 'map-dot';
                    en.dot.style.background = '#f00';
                    document.getElementById('minimap').appendChild(en.dot);
                    
                    this.scene.add(en.mesh);
                    this.enemies.push(en);
                }
                this.updateUI();
            }

            takeDamage() {
                this.stats.hp -= 10; // Exactly 10 damage per hit
                
                const hFill = document.getElementById('health-fill');
                const hUI = document.getElementById('vitals');
                hFill.style.width = Math.max(0, this.stats.hp) + "%";
                
                if(this.stats.hp <= 30) {
                    hFill.style.background = "#ff0000"; hUI.style.borderLeftColor = "#ff0000";
                } else if(this.stats.hp <= 60) {
                    hFill.style.background = "#ffaa00"; hUI.style.borderLeftColor = "#ffaa00";
                }

                const flash = document.getElementById('damage-flash');
                flash.style.background = "rgba(255,0,0,0.5)";
                setTimeout(() => flash.style.background = "rgba(255,0,0,0)", 100);

                if(this.stats.hp <= 0) {
                    this.stats.hp = 100;
                    this.stats.kills = 0;
                    hFill.style.width = "100%";
                    hFill.style.background = "#0f0"; hUI.style.borderLeftColor = "#0f0";
                }
                this.updateUI();
            }

            updateUI() {
                document.getElementById('kill-count').innerText = this.stats.kills;
                document.getElementById('alive-count').innerText = this.enemies.length;
            }

            bindEvents() {
                window.addEventListener('touchstart', e => {
                    const t = Array.from(e.touches).find(tx => tx.clientX > window.innerWidth/2);
                    if(t) this.input.lastX = t.clientX;
                }, {passive: false});

                window.addEventListener('touchmove', e => {
                    const t = Array.from(e.touches).find(tx => tx.clientX > window.innerWidth/2);
                    if(t) {
                        this.input.targetCamAngle -= (t.clientX - this.input.lastX) * 0.008;
                        this.input.lastX = t.clientX;
                    }
                }, {passive: false});

                const bound = document.getElementById('joy-base');
                const knob = document.getElementById('joy-stick');
                bound.addEventListener('touchmove', e => {
                    const r = bound.getBoundingClientRect();
                    this.input.joy.x = (e.touches[0].clientX - (r.left + r.width/2)) / 70;
                    this.input.joy.y = (e.touches[0].clientY - (r.top + r.height/2)) / 70;
                    const d = Math.sqrt(this.input.joy.x**2 + this.input.joy.y**2);
                    if(d > 1) { this.input.joy.x /= d; this.input.joy.y /= d; }
                    knob.style.transform = `translate(${this.input.joy.x*50}px, ${this.input.joy.y*50}px)`;
                });
                bound.addEventListener('touchend', () => { this.input.joy = {x:0, y:0}; knob.style.transform = `translate(0,0)`; });

                document.getElementById('fire-btn').addEventListener('touchstart', () => {
                    const pos = this.player.mesh.position.clone().add(new THREE.Vector3(0, 2.2, 0));
                    const dir = new THREE.Vector3(Math.sin(this.input.camAngle), 0, Math.cos(this.input.camAngle));
                    this.bullets.fire(pos, dir, 2.8, true);
                    this.player.recoil();
                });

                document.getElementById('jump-btn').addEventListener('touchstart', () => {
                    if(this.player.mesh.position.y <= 0) gsap.to(this.player.mesh.position, {y: 6, duration: 0.4, yoyo: true, repeat: 1, ease: "power2.out"});
                });
            }

            checkCollision(nx, nz) {
                for(let obs of this.obstacles) {
                    if(Math.sqrt((nx-obs.x)**2 + (nz-obs.z)**2) < obs.r + 0.8) return true;
                }
                return false;
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                const now = Date.now();
                const delta = (now - this.lastFrame) / 1000;
                this.lastFrame = now;

                // Static Spawn Logic
                if(now - this.spawnTimer > this.SPAWN_INTERVAL) {
                    this.spawnEnemies();
                    this.spawnTimer = now;
                }

                // Camera & Player Rotation (Fixed: No snapping backward)
                this.input.camAngle += (this.input.targetCamAngle - this.input.camAngle) * 15 * delta;
                this.player.mesh.rotation.y = this.input.camAngle + Math.PI;

                // Player Movement
                const speed = 18 * delta;
                const fwd = new THREE.Vector3(Math.sin(this.input.camAngle), 0, Math.cos(this.input.camAngle));
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), fwd);
                
                let nx = this.player.mesh.position.x + (fwd.x * -this.input.joy.y * speed) + (side.x * -this.input.joy.x * speed);
                let nz = this.player.BulletPoolposition = this.player.mesh.position.z + (fwd.z * -this.input.joy.y * speed) + (side.z * -this.input.joy.x * speed);
                
                if(!this.checkCollision(nx, nz)) {
                    this.player.mesh.position.x = nx;
                    this.player.mesh.position.z = nz;
                }

                if(Math.abs(this.input.joy.x) > 0.1 || Math.abs(this.input.joy.y) > 0.1) this.player.walkAnim(15 * delta);
                else this.player.stopAnim();

                // Minimap P-dot
                document.getElementById('p-dot').style.left = '75px';
                document.getElementById('p-dot').style.top = '75px';

                // Enemies
                for(let i = this.enemies.length - 1; i >= 0; i--) {
                    const en = this.enemies[i];
                    const dist = en.mesh.position.distanceTo(this.player.mesh.position);
                    
                    en.mesh.lookAt(this.player.mesh.position.x, 0, this.player.mesh.position.z);
                    en.mesh.rotateY(Math.PI); // Fix facing direction completely

                    if(dist > 15) {
                        const dir = new THREE.Vector3().subVectors(this.player.mesh.position, en.mesh.position).normalize();
                        en.mesh.position.add(dir.multiplyScalar(7 * delta));
                        en.walkAnim(12 * delta);
                    } else en.stopAnim();

                    if(now - en.lastShot > 2000 && dist < 60) {
                        const pos = en.mesh.position.clone().add(new THREE.Vector3(0, 2.2, 0));
                        const dir = new THREE.Vector3().subVectors(this.player.mesh.position, en.mesh.position).normalize();
                        this.bullets.fire(pos, dir, 1.8, false);
                        en.recoil();
                        en.lastShot = now;
                    }

                    const rx = (en.mesh.position.x - this.player.mesh.position.x) * 0.8 + 75;
                    const rz = (en.mesh.position.z - this.player.mesh.position.z) * 0.8 + 75;
                    en.dot.style.left = rx + 'px'; en.dot.style.top = rz + 'px';
                    en.dot.style.display = (rx<0||rx>150||rz<0||rz>150) ? 'none' : 'block';
                }

                // Bullets Update
                this.bullets.pool.forEach(b => {
                    if(!b.active) return;
                    b.mesh.position.add(b.vel);
                    b.life--;
                    if(b.life <= 0 || this.checkCollision(b.mesh.position.x, b.mesh.position.z)) { b.active = false; b.mesh.visible = false; return; }

                    if(b.isPlayer) {
                        for(let i=0; i<this.enemies.length; i++) {
                            if(b.mesh.position.distanceTo(this.enemies[i].mesh.position) < 2.5) {
                                this.scene.remove(this.enemies[i].mesh);
                                this.enemies[i].dot.remove();
                                this.enemies.splice(i, 1);
                                b.active = false; b.mesh.visible = false;
                                this.stats.kills++; this.updateUI();
                                break;
                            }
                        }
                    } else {
                        if(b.mesh.position.distanceTo(this.player.mesh.position) < 2.0) {
                            this.takeDamage();
                            b.active = false; b.mesh.visible = false;
                        }
                    }
                });

                // Camera follow
                const camRad = 16;
                this.camera.position.set(
                    this.player.mesh.position.x - Math.sin(this.input.camAngle) * camRad,
                    this.player.mesh.position.y + 8,
                    this.player.mesh.position.z - Math.cos(this.input.camAngle) * camRad
                );
                this.camera.lookAt(this.player.mesh.position.x, this.player.mesh.position.y + 2, this.player.mesh.position.z);
                this.renderer.render(this.scene, this.camera);
            }
        }

        const game = new GameEngine();
    </script>
</body>
</html>
