<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Temu Fortnite: Pro Edition</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        /* --- MOBILE & SAFARI LOCK --- */
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; -webkit-user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; position: fixed; }
        canvas { display: block; width: 100vw; height: 100vh; }

        /* --- UI OVERLAY --- */
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 100; color: white; font-family: 'Arial Black', sans-serif; }
        
        #minimap { 
            position: absolute; top: 20px; left: 20px; width: 150px; height: 150px; 
            background: rgba(0,20,0,0.85); border: 3px solid #00ffff; pointer-events: auto;
            box-shadow: 0 0 15px rgba(0,255,255,0.3);
        }
        .dot { position: absolute; width: 6px; height: 6px; border-radius: 50%; transform: translate(-50%,-50%); }
        #p-dot { background: #fff; box-shadow: 0 0 10px #fff; z-index: 10; }

        #stats-hud { 
            position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.8); 
            padding: 15px; border-right: 6px solid #00ffff; text-align: right;
        }
        .val { font-size: 30px; color: #00ffff; font-weight: 900; line-height: 1; }

        #hp-ui { 
            position: absolute; top: 190px; left: 20px; width: 220px; 
            background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid #ffaa00;
        }
        #hp-bar { width: 100%; height: 18px; background: #ffaa00; transition: width 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        /* --- ANALOG CONTROLS --- */
        #joy-base { 
            position: absolute; bottom: 60px; left: 60px; width: 160px; height: 160px; 
            background: rgba(255,255,255,0.05); border: 2px solid #00ffff44; border-radius: 50%; pointer-events: auto;
        }
        #joy-knob { 
            position: absolute; width: 80px; height: 80px; background: #00ffff; 
            border-radius: 50%; top: 40px; left: 40px; box-shadow: 0 0 25px #00ffff;
        }

        #action-group { 
            position: absolute; bottom: 60px; right: 60px; display: flex; flex-direction: column; gap: 25px; pointer-events: auto;
        }
        .btn { 
            width: 110px; height: 110px; border-radius: 50%; border: 4px solid #fff; 
            background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 20px; text-shadow: 0 0 10px #000;
        }
        #fire-btn { width: 150px; height: 150px; border-color: #ff3333; color: #ff3333; font-size: 28px; box-shadow: 0 0 20px rgba(255,0,0,0.3); }

        #aim-catcher { position: absolute; top: 0; right: 0; width: 65%; height: 100%; pointer-events: auto; z-index: 5; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="aim-catcher"></div>
        <div id="minimap"><div id="p-dot" class="dot" style="left:75px; top:75px;"></div></div>
        <div id="stats-hud">
            <div style="font-size: 12px; letter-spacing: 1px;">ELIMINATIONS</div>
            <div id="kill-count" class="val">0</div>
        </div>
        <div id="hp-ui">
            <div style="font-size: 10px; color:#ffaa00; margin-bottom: 5px; font-weight: 900;">HEALTH</div>
            <div style="background:#310; height:18px;"><div id="hp-bar"></div></div>
        </div>
        <div id="joy-base"><div id="joy-knob"></div></div>
        <div id="action-group">
            <div id="fire-btn" class="btn">FIRE</div>
            <div id="jump-btn" class="btn">JUMP</div>
        </div>
    </div>
    <canvas id="c"></canvas>

    <script>
        // --- 1. CONFIG & SOCKET ---
        const socket = io("https://temu-fortnight.onrender.com/");
        const CONFIG = {
            WORLD_SIZE: 1200,
            PLAYER_COLOR: 0x0000ff,
            ENEMY_COLOR: 0xff0000,
            SKIN_COLOR: 0xffdbac,
            TREE_COUNT: 85
        };

        // --- 2. ENGINE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 50, 450);
        
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        // --- 3. PRO ASSET BUILDERS ---
        function createCharacterModel(color) {
            const group = new THREE.Group();
            // Torso
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(1.2, 1.8, 0.7), 
                new THREE.MeshStandardMaterial({ color, roughness: 0.7 })
            );
            body.position.y = 0.9;
            // Head
            const head = new THREE.Mesh(
                new THREE.BoxGeometry(0.8, 0.8, 0.8), 
                new THREE.MeshStandardMaterial({ color: CONFIG.SKIN_COLOR })
            );
            head.position.y = 2.2;
            // Visual Weapon
            const weapon = new THREE.Mesh(
                new THREE.BoxGeometry(0.3, 0.3, 1.5),
                new THREE.MeshStandardMaterial({ color: 0x222222 })
            );
            weapon.position.set(0.7, 1.4, -0.4);
            
            group.add(body, head, weapon);
            return group;
        }

        function createEnvironmentTree() {
            const group = new THREE.Group();
            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.5, 0.8, 5, 8), 
                new THREE.MeshStandardMaterial({color: 0x4d2d18})
            );
            trunk.position.y = 2.5;
            const leaves = new THREE.Mesh(
                new THREE.ConeGeometry(3.5, 10, 8), 
                new THREE.MeshStandardMaterial({color: 0x2d4c1e})
            );
            leaves.position.y = 8;
            group.add(trunk, leaves);
            return group;
        }

        // --- 4. WORLD GENERATION ---
        const floorGeo = new THREE.PlaneGeometry(2500, 2500, 20, 20);
        const floorMat = new THREE.MeshStandardMaterial({color: 0x5d994d});
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 0.6);
        sun.position.set(100, 200, 100);
        scene.add(sun);

        // Foliage Populate
        for(let i=0; i < CONFIG.TREE_COUNT; i++) {
            const tree = createEnvironmentTree();
            const dist = 50 + Math.random() * 800;
            const ang = Math.random() * Math.PI * 2;
            tree.position.set(Math.cos(ang)*dist, 0, Math.sin(ang)*dist);
            tree.scale.setScalar(0.8 + Math.random()*0.5);
            scene.add(tree);
        }

        // --- 5. PLAYER & MOVEMENT ---
        const player = createCharacterModel(CONFIG.PLAYER_COLOR);
        scene.add(player);

        let move = {x:0, y:0}, look = {dx:0, id:null, lastX:0}, camRot = 0, isJumping = false, lastTap = 0;

        // Joystick Logic
        const jBase = document.getElementById('joy-base');
        const jKnob = document.getElementById('joy-knob');
        const handleJoy = (e) => {
            const r = jBase.getBoundingClientRect();
            const t = e.touches[0];
            let dx = (t.clientX - (r.left + r.width/2))/80;
            let dy = (t.clientY - (r.top + r.height/2))/80;
            const d = Math.sqrt(dx*dx+dy*dy);
            if(d > 1) { dx/=d; dy/=d; }
            move = {x:dx, y:dy};
            jKnob.style.transform = `translate(${dx*50}px, ${dy*50}px)`;
        };
        jBase.addEventListener('touchstart', handleJoy);
        jBase.addEventListener('touchmove', handleJoy);
        jBase.addEventListener('touchend', () => { move={x:0,y:0}; jKnob.style.transform='translate(0,0)'; });

        // Camera / Aim Logic
        document.getElementById('aim-catcher').addEventListener('touchstart', e => {
            const t = e.changedTouches[0];
            if(!look.id) { look.id = t.identifier; look.lastX = t.clientX; }
        });
        document.getElementById('aim-catcher').addEventListener('touchmove', e => {
            for(let t of e.changedTouches) if(t.identifier === look.id) {
                look.dx = t.clientX - look.lastX;
                look.lastX = t.clientX;
            }
        });
        document.getElementById('aim-catcher').addEventListener('touchend', e => {
            for(let t of e.changedTouches) if(t.identifier === look.id) look.id = null;
        });

        // Fire Action
        let bullets = [];
        function fireWeapon() {
            const dir = new THREE.Vector3(Math.sin(camRot), 0, Math.cos(camRot));
            const bullet = new THREE.Mesh(
                new THREE.SphereGeometry(0.25), 
                new THREE.MeshBasicMaterial({color: 0x00ffff})
            );
            bullet.position.copy(player.position).add(new THREE.Vector3(0, 1.6, 0));
            bullets.push({ mesh: bullet, vel: dir.multiplyScalar(3.2), life: 120 });
            scene.add(bullet);
            socket.emit('shoot', { pos: player.position, dir });
        }
        document.getElementById('fire-btn').addEventListener('touchstart', fireWeapon);

        // --- 6. MULTIPLAYER SYNC ---
        let remotes = {}, enemies = {};
        socket.on('state', data => {
            Object.keys(data.players).forEach(id => {
                if(id === socket.id) return;
                if(!remotes[id]) { 
                    remotes[id] = createCharacterModel(0xeeeeee); 
                    scene.add(remotes[id]); 
                }
                const p = data.players[id];
                remotes[id].position.lerp(new THREE.Vector3(p.x, 0, p.z), 0.3);
                remotes[id].rotation.y = p.r + Math.PI;
            });
        });

        socket.on('spawnEnemy', data => {
            if(!enemies[data.id]) {
                enemies[data.id] = createCharacterModel(CONFIG.ENEMY_COLOR);
                enemies[data.id].position.set(data.x, 0, data.z);
                scene.add(enemies[data.id]);
            }
        });

        socket.on('playerLeave', id => {
            if(remotes[id]) { scene.remove(remotes[id]); delete remotes[id]; }
        });

        // --- 7. GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Camera Rotation
            camRot -= look.dx * 0.007; look.dx = 0;
            player.rotation.y = camRot + Math.PI;

            // Player Physics
            const fwd = new THREE.Vector3(Math.sin(camRot), 0, Math.cos(camRot));
            const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), fwd);
            player.position.x += (fwd.x * -move.y * 0.42) + (side.x * -move.x * 0.42);
            player.position.z += (fwd.z * -move.y * 0.42) + (side.z * -move.x * 0.42);

            // Socket Outbound
            socket.emit('move', { x: player.position.x, z: player.position.z, r: camRot });

            // Bullet Updates
            for(let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].mesh.position.add(bullets[i].vel);
                bullets[i].life--;
                if(bullets[i].life <= 0) {
                    scene.remove(bullets[i].mesh);
                    bullets.splice(i, 1);
                }
            }

            // Camera Tracking (Over-the-shoulder)
            const camDist = 22;
            camera.position.set(
                player.position.x - Math.sin(camRot) * camDist,
                13,
                player.position.z - Math.cos(camRot) * camDist
            );
            camera.lookAt(player.position.x, 2, player.position.z);

            renderer.render(scene, camera);
        }

        // Safari Double-Tap Prevention
        document.addEventListener('touchend', e => {
            const now = Date.now();
            if(now - lastTap < 300) e.preventDefault();
            lastTap = now;
        }, { passive: false });

        animate();
    </script>
</body>
</html>
