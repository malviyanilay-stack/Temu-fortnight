<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Temu Fortnite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * {
            /* ANTI-ZOOM AND SELECTION LOCK */
            touch-action: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            user-select: none;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        body { margin: 0; overflow: hidden; background-color: #1a1a2e; font-family: sans-serif; }
        
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        .hud { position: absolute; background: rgba(0,0,0,0.8); color: #ff4444; padding: 10px; border: 2px solid #ff4444; border-radius: 5px; font-weight: bold; pointer-events: auto; }
        #health-ui { top: 20px; left: 20px; width: 180px; }
        #health-fill { width: 100%; height: 15px; background: #ff4444; box-shadow: 0 0 10px #ff4444; }
        .bar-bg { width: 100%; height: 15px; background: #222; margin-top: 5px; }
        
        #btns { position: absolute; bottom: 30px; right: 20px; display: flex; flex-direction: column; gap: 12px; pointer-events: auto; }
        .btn { width: 75px; height: 75px; background: rgba(0,0,0,0.6); color: white; border: 2px solid #0ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; touch-action: manipulation; }
        #fire-btn { background: #ff4444; width: 100px; height: 100px; border-color: #fff; font-size: 18px; }
        
        #joystick-ui { position: absolute; bottom: 50px; left: 50px; width: 130px; height: 130px; background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; border: 2px solid #0ff; touch-action: manipulation; }
        #joystick-knob { position: absolute; width: 55px; height: 55px; background: #0ff; border-radius: 50%; left: 37px; top: 37px; box-shadow: 0 0 10px #0ff; }
        
        #zoom-ui { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; pointer-events: auto; }
        .zoom-btn { width: 45px; height: 45px; background: rgba(0,0,0,0.8); color: #0ff; border: 1px solid #0ff; display: flex; align-items: center; justify-content: center; font-size: 20px; touch-action: manipulation; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="health-ui" class="hud">HEALTHBAR<div class="bar-bg"><div id="health-fill"></div></div></div>
        <div id="zoom-ui"><div class="zoom-btn" id="zin">+</div><div class="zoom-btn" id="zout">-</div></div>
        <div id="btns">
            <div id="scope-btn" class="btn">SCOPE</div>
            <div id="fire-btn" class="btn">FIRE</div>
            <div id="jump-btn" class="btn">JUMP</div>
        </div>
        <div id="joystick-ui"><div id="joystick-knob"></div></div>
    </div>

    <script>
        // --- ANTI-ZOOM SYSTEM ---
        document.addEventListener('touchstart', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
        document.addEventListener('gesturestart', (e) => e.preventDefault());
        let lastClick = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastClick <= 300) e.preventDefault();
            lastClick = now;
        }, false);

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); 
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(10, 20, 10);
        scene.add(sun, new THREE.AmbientLight(0x707070));

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x2e7d32 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        function spawnTree(x, z) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, 4), new THREE.MeshStandardMaterial({color: 0x5d4037}));
            trunk.position.y = 2;
            const leaves = new THREE.Mesh(new THREE.SphereGeometry(2), new THREE.MeshStandardMaterial({color: 0x1a5d1a}));
            leaves.position.y = 5;
            tree.add(trunk, leaves); tree.position.set(x, 0, z); scene.add(tree);
        }
        for(let i=0; i<40; i++) spawnTree(Math.random()*400-200, Math.random()*400-200);

        // --- PLAYER ---
        function createPlayer() {
            const group = new THREE.Group();
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.1, 0.4), new THREE.MeshStandardMaterial({color: 0x222222}));
            torso.position.y = 1.35;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 2.15;
            const armR = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.8, 0.25), new THREE.MeshStandardMaterial({color: 0x222222}));
            armR.position.set(0.55, 1.35, 0);
            const gun = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.9), new THREE.MeshStandardMaterial({color: 0x111111}));
            gun.position.set(0, -0.2, -0.4);
            armR.add(gun);
            const armL = armR.clone(); armL.position.x = -0.55; armL.remove(armL.children[0]);
            const legL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.9, 0.3), new THREE.MeshStandardMaterial({color: 0x111111}));
            legL.position.set(-0.2, 0.45, 0);
            const legR = legL.clone(); legR.position.x = 0.2;
            group.add(torso, head, armL, armR, legL, legR);
            group.userData = { armR, legL, legR };
            return group;
        }

        const player = createPlayer();
        scene.add(player);
        const bullets = [];

        // --- SMOOTH CAMERA & ZOOM ---
        let camAngle = 0;
        let camDist = 12;
        let lastX = 0;
        let targetCamAngle = 0;

        document.getElementById('zin').onclick = () => camDist = Math.max(5, camDist - 3);
        document.getElementById('zout').onclick = () => camDist = Math.min(30, camDist + 3);

        window.addEventListener('touchstart', e => { 
            if(e.touches[0].clientX > window.innerWidth/2) lastX = e.touches[0].clientX; 
        });
        
        window.addEventListener('touchmove', e => {
            const touch = Array.from(e.touches).find(t => t.clientX > window.innerWidth/2);
            if(touch) {
                const deltaX = (touch.clientX - lastX) * 0.01;
                targetCamAngle -= deltaX; // Smooth targeting
                lastX = touch.clientX;
            }
        });

        // --- JOYSTICK & MOVEMENT ---
        let joy = { x: 0, y: 0 };
        const knob = document.getElementById('joystick-knob');
        document.getElementById('joystick-ui').addEventListener('touchmove', e => {
            const t = e.touches[0], r = e.currentTarget.getBoundingClientRect();
            joy.x = (t.clientX - (r.left + r.width/2))/65;
            joy.y = (t.clientY - (r.top + r.height/2))/65;
            const d = Math.sqrt(joy.x**2 + joy.y**2);
            if(d > 1) { joy.x/=d; joy.y/=d; }
            knob.style.transform = `translate(${joy.x*40}px, ${joy.y*40}px)`;
        });
        document.getElementById('joystick-ui').addEventListener('touchend', () => { joy = {x:0, y:0}; knob.style.transform = `translate(0,0)`; });

        // --- FIRE ---
        document.getElementById('fire-btn').addEventListener('touchstart', () => {
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0xffff00}));
            b.position.copy(player.position).add(new THREE.Vector3(0, 1.5, 0));
            // Corrected Bullet Vector (Matches character's facing direction)
            const dir = new THREE.Vector3(Math.sin(camAngle), 0, Math.cos(camAngle));
            b.userData.vel = dir.multiplyScalar(1.5); 
            scene.add(b);
            bullets.push(b);
            gsap.to(player.userData.armR.rotation, { x: -1, duration: 0.1, yoyo: true, repeat: 1 });
        });

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.006;
            
            // SMOOTH CAMERA INTERPOLATION (GSAP style lerp)
            camAngle += (targetCamAngle - camAngle) * 0.15;
            
            // Player faces AWAY from camera
            player.rotation.y = camAngle + Math.PI; 

            // FIXED MOVEMENT: Left is Left, Right is Right
            const speed = 0.28;
            player.position.x += (Math.sin(camAngle) * -joy.y + Math.cos(camAngle) * joy.x) * speed;
            player.position.z += (Math.cos(camAngle) * -joy.y - Math.sin(camAngle) * joy.x) * speed;

            // ANIMATION
            if(Math.abs(joy.x) > 0.1 || Math.abs(joy.y) > 0.1) {
                player.userData.legL.rotation.x = Math.sin(time) * 0.7;
                player.userData.legR.rotation.x = -Math.sin(time) * 0.7;
            }

            // BULLETS
            bullets.forEach((b, i) => {
                b.position.add(b.userData.vel);
                if(b.position.distanceTo(player.position) > 100) { scene.remove(b); bullets.splice(i, 1); }
            });

            // CAMERA POSITIONING
            camera.position.set(player.position.x - Math.sin(camAngle)*camDist, 8, player.position.z - Math.cos(camAngle)*camDist);
            camera.lookAt(player.position.x, player.position.y + 1.5, player.position.z);
            
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
