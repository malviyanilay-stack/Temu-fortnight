<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Temu Fortnite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * { touch-action: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .hud { position: absolute; background: rgba(0,0,0,0.8); color: #ff4444; padding: 12px; border: 2px solid #ff4444; border-radius: 8px; font-weight: bold; pointer-events: auto; }
        #health-ui { top: 20px; left: 20px; width: 200px; }
        #health-fill { width: 100%; height: 18px; background: #ff4444; transition: width 0.2s; }
        .bar-bg { width: 100%; height: 18px; background: #222; margin-top: 8px; }
        #btns { position: absolute; bottom: 30px; right: 20px; display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
        .btn { width: 80px; height: 80px; background: rgba(0,0,0,0.7); color: white; border: 3px solid #0ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        #fire-btn { background: #ff4444; width: 110px; height: 110px; border-color: #fff; font-size: 20px; }
        #joystick-ui { position: absolute; bottom: 50px; left: 50px; width: 140px; height: 140px; background: rgba(0,255,255,0.1); border-radius: 50%; pointer-events: auto; border: 2px solid #0ff; }
        #joystick-knob { position: absolute; width: 60px; height: 60px; background: #0ff; border-radius: 50%; left: 40px; top: 40px; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="health-ui" class="hud">HEALTHBAR<div class="bar-bg"><div id="health-fill" style="width: 100%;"></div></div></div>
        <div id="btns">
            <div id="fire-btn" class="btn">FIRE</div>
            <div id="jump-btn" class="btn">JUMP</div>
        </div>
        <div id="joystick-ui"><div id="joystick-knob"></div></div>
    </div>

    <script>
        document.addEventListener('touchstart', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7), new THREE.DirectionalLight(0xffffff, 0.8));

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x2e7d32 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- TREES ARE BACK ---
        function spawnTree(x, z) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 5), new THREE.MeshStandardMaterial({color: 0x5d4037}));
            trunk.position.y = 2.5;
            const leaves = new THREE.Mesh(new THREE.SphereGeometry(2.5), new THREE.MeshStandardMaterial({color: 0x1a5d1a}));
            leaves.position.y = 6;
            tree.add(trunk, leaves); tree.position.set(x, 0, z); scene.add(tree);
        }
        for(let i=0; i<30; i++) spawnTree(Math.random()*300-150, Math.random()*300-150);

        // --- CHARACTER CREATOR ---
        function createCharacter(color) {
            const group = new THREE.Group();
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), new THREE.MeshStandardMaterial({color: color}));
            torso.position.y = 1.45;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 2.3;
            const armR = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.8, 0.25), new THREE.MeshStandardMaterial({color: color}));
            armR.position.set(0.55, 1.5, 0);
            const gun = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 1.0), new THREE.MeshStandardMaterial({color: 0x000000}));
            gun.position.set(0, -0.3, -0.4); armR.add(gun);
            const armL = armR.clone(); armL.position.x = -0.55; armL.remove(armL.children[0]);
            const legL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.0, 0.3), new THREE.MeshStandardMaterial({color: color}));
            legL.position.set(-0.25, 0.5, 0);
            const legR = legL.clone(); legR.position.x = 0.25;
            group.add(torso, head, armL, armR, legL, legR);
            return { group, armR, armL, legL, legR };
        }

        const pData = createCharacter(0x222222);
        const player = pData.group; scene.add(player);
        let playerHealth = 100;

        const enemies = [];
        function spawnEnemy() {
            const e = createCharacter(0xff4444);
            const dist = 40 + Math.random()*20; const ang = Math.random()*6.28;
            e.group.position.set(player.position.x + Math.cos(ang)*dist, 0, player.position.z + Math.sin(ang)*dist);
            e.lastShot = 0; scene.add(e.group); enemies.push(e);
        }
        for(let i=0; i<6; i++) spawnEnemy();

        const pBullets = [], eBullets = [];
        let camAngle = 0, targetCamAngle = 0, camDist = 14, lastX = 0, joy = {x:0, y:0};

        // INPUTS
        window.addEventListener('touchstart', e => { if(e.touches[0].clientX > window.innerWidth/2) lastX = e.touches[0].clientX; });
        window.addEventListener('touchmove', e => {
            const touch = Array.from(e.touches).find(t => t.clientX > window.innerWidth/2);
            if(touch) { targetCamAngle -= (touch.clientX - lastX) * 0.01; lastX = touch.clientX; }
        });

        document.getElementById('fire-btn').addEventListener('touchstart', () => {
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshBasicMaterial({color: 0xffff00}));
            b.position.copy(player.position).add(new THREE.Vector3(0, 1.8, 0));
            // Fixed Firing: Shoot forward relative to camAngle
            const dir = new THREE.Vector3(Math.sin(camAngle), 0, Math.cos(camAngle));
            b.userData.vel = dir.multiplyScalar(1.8);
            scene.add(b); pBullets.push(b);
            gsap.to(pData.armR.rotation, { x: -0.7, duration: 0.1, yoyo: true, repeat: 1 });
        });

        document.getElementById('jump-btn').onclick = () => {
            if(player.position.y < 0.1) gsap.to(player.position, { y: 6, duration: 0.4, yoyo: true, repeat: 1 });
        };

        const knob = document.getElementById('joystick-knob');
        document.getElementById('joystick-ui').addEventListener('touchmove', e => {
            const t = e.touches[0], r = e.currentTarget.getBoundingClientRect();
            joy.x = (t.clientX - (r.left + r.width/2))/70; joy.y = (t.clientY - (r.top + r.height/2))/70;
            const d = Math.sqrt(joy.x**2 + joy.y**2); if(d > 1) { joy.x/=d; joy.y/=d; }
            knob.style.transform = `translate(${joy.x*45}px, ${joy.y*45}px)`;
        });
        document.getElementById('joystick-ui').addEventListener('touchend', () => { joy = {x:0, y:0}; knob.style.transform = `translate(0,0)`; });

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.008;
            camAngle += (targetCamAngle - camAngle) * 0.12;
            
            // CAMERA FIX: Never flip backwards when firing
            player.rotation.y = camAngle + Math.PI;

            // Move
            const fwd = new THREE.Vector3(Math.sin(camAngle), 0, Math.cos(camAngle));
            const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), fwd);
            player.position.add(fwd.multiplyScalar(-joy.y * 0.38));
            player.position.add(side.multiplyScalar(-joy.x * 0.38));

            if(Math.abs(joy.x) > 0.1 || Math.abs(joy.y) > 0.1) {
                pData.legL.rotation.x = Math.sin(time) * 0.6; pData.legR.rotation.x = -Math.sin(time) * 0.6;
            }

            // Enemy Loop
            enemies.forEach((en, i) => {
                const dist = en.group.position.distanceTo(player.position);
                const dir = new THREE.Vector3().subVectors(player.position, en.group.position).normalize();
                if(dist > 15) en.group.position.add(dir.multiplyScalar(0.08));
                en.group.lookAt(player.position.x, 0, player.position.z);
                en.legL.rotation.x = Math.sin(time) * 0.5; en.legR.rotation.x = -Math.sin(time) * 0.5;

                if(Date.now() - en.lastShot > 2500 && dist < 40) {
                    const eb = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0xff0000}));
                    eb.position.copy(en.group.position).add(new THREE.Vector3(0, 1.8, 0));
                    // FIXED: Bullet velocity actually moves now
                    eb.userData.vel = dir.clone().multiplyScalar(0.7);
                    scene.add(eb); eBullets.push(eb);
                    en.lastShot = Date.now();
                }
            });

            // Bullet Movement & Collision
            pBullets.forEach((b, i) => {
                b.position.add(b.userData.vel);
                enemies.forEach((en, ei) => {
                    if(b.position.distanceTo(en.group.position) < 2) {
                        scene.remove(en.group); enemies.splice(ei, 1);
                        scene.remove(b); pBullets.splice(i, 1);
                        spawnEnemy();
                    }
                });
            });

            eBullets.forEach((eb, i) => {
                eb.position.add(eb.userData.vel); // THIS FIXES THE STUCK BULLETS
                if(eb.position.distanceTo(player.position) < 1.6) {
                    playerHealth -= 10;
                    document.getElementById('health-fill').style.width = playerHealth + "%";
                    scene.remove(eb); eBullets.splice(i, 1);
                    if(playerHealth <= 0) { playerHealth = 100; document.getElementById('health-fill').style.width = "100%"; }
                }
            });

            camera.position.set(player.position.x - Math.sin(camAngle)*camDist, 8, player.position.z - Math.cos(camAngle)*camDist);
            camera.lookAt(player.position.x, player.position.y + 2, player.position.z);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
