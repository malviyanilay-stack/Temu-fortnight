<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Temu Fortnite</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #B0E2FF; font-family: 'Arial Black', sans-serif; touch-action: none; user-select: none; }
        #game-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        #minimap-container { position: absolute; top: 20px; left: 20px; width: 110px; height: 110px; background: rgba(0,0,0,0.7); border: 2px solid #fff; border-radius: 8px; overflow: hidden; pointer-events: none; }
        #minimap-canvas { width: 100%; height: 100%; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 24px; height: 24px; transform: translate(-50%, -50%); border: 2px solid white; border-radius: 50%; transition: all 0.2s; }
        #crosshair::after { content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #00ff00; transform: translate(-50%, -50%); border-radius: 50%; }
        .hud { position: absolute; background: rgba(0, 0, 0, 0.8); color: white; padding: 10px; border-radius: 8px; font-weight: bold; border: 2px solid #ffaa00; pointer-events: none; }
        #mana-ui { top: 140px; left: 20px; width: 110px; }
        #mana-fill { width: 100%; height: 8px; background: #0055ff; transition: background 0.3s, width 0.1s; }
        #stats-ui { top: 20px; right: 20px; text-align: right; font-size: 14px; line-height: 1.4; }
        #title-card { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-size: 22px; color: white; text-shadow: 2px 2px #000; }
        .touch-zone { position: absolute; bottom: 0; height: 100vh; width: 50vw; pointer-events: auto; }
        #left-zone { left: 0; }
        #right-zone { right: 0; }
        #action-btns { position: absolute; bottom: 40px; right: 20px; display: flex; flex-direction: column; gap: 10px; pointer-events: auto; align-items: flex-end; }
        .btn { width: 75px; height: 75px; border-radius: 50%; border: 3px solid white; background: rgba(0,0,0,0.6); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; transition: transform 0.1s; }
        #shoot-btn { background: rgba(255, 0, 0, 0.8); width: 95px; height: 95px; font-size: 20px; transition: all 0.2s ease-out; }
        #shoot-btn.targeted { transform: scale(1.15); box-shadow: 0 0 20px 5px rgba(255, 0, 0, 0.9); border-color: #ffaa00; }
        #joystick-base { position: absolute; width: 80px; height: 80px; background: rgba(255,255,255,0.2); border-radius: 50%; display: none; pointer-events: none; border: 2px solid rgba(255,255,255,0.4); }
        #joystick-knob { position: absolute; width: 40px; height: 40px; background: white; border-radius: 50%; top: 20px; left: 20px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script> </head>
<body>
    <div id="game-container"></div>
    <div id="ui-layer">
        <div id="title-card">TEMU FORTNITE</div>
        <div id="minimap-container"><canvas id="minimap-canvas"></canvas></div>
        <div id="mana-ui" class="hud">MANA<div style="background:#333; margin-top:4px;"><div id="mana-fill"></div></div></div>
        <div id="stats-ui" class="hud">
            TEAM ELIMS: <span id="score">0</span><br>
            LIVE ENEMIES: <span id="count">0</span><br>
            WEAPON: <span id="weapon-type" style="color:#00ffff">STANDARD</span>
        </div>
        <div id="crosshair"></div>
        <div id="joystick-base"><div id="joystick-knob"></div></div>
        <div id="left-zone" class="touch-zone"></div>
        <div id="right-zone" class="touch-zone"></div>
        <div id="action-btns">
            <div id="scope-btn" class="btn">SCOPE</div>
            <div id="jump-btn" class="btn">JUMP</div>
            <div id="shoot-btn" class="btn">FIRE</div>
        </div>
    </div>

<script>
    const socket = io(); // Connect to Render backend
    let otherPlayers = {}; // Store teammates

    const CONFIG = { speed: 0.12, jump: 0.45, gravity: 0.02, bulletSpeed: 0.6, enemyFireRate: 240, hitBox: 2.2, maxMana: 100, damagePerHit: 5, enemyHP: 3, flashDuration: 300 };
    let STATE = { mana: CONFIG.maxMana, score: 0, yaw: 0, targetYaw: 0, move: {x:0, y:0}, pBullets: [], eBullets: [], enemies: {}, isScoping: false };
    
    let scene, camera, renderer, player, mapCtx, mapCanvas, raycaster, screenCenter;
    const joyBase = document.getElementById('joystick-base'), joyKnob = document.getElementById('joystick-knob'), shootBtn = document.getElementById('shoot-btn');

    function createHumanoid(color, isEnemy = false) {
        const group = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({ color });
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.35), mat); body.position.y = 1.1; group.add(body);
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshStandardMaterial({color: 0xffdbac})); head.position.y = 1.7; group.add(head);
        const limb = new THREE.BoxGeometry(0.2, 0.7, 0.2);
        const lA = new THREE.Mesh(limb, mat); lA.position.set(-0.45, 1.1, 0); group.add(lA);
        const rA = new THREE.Mesh(limb, mat); rA.position.set(0.45, 1.1, 0); group.add(rA);
        const lL = new THREE.Mesh(limb, mat); lL.position.set(-0.2, 0.35, 0); group.add(lL);
        const rL = new THREE.Mesh(limb, mat); rL.position.set(0.2, 0.35, 0); group.add(rL);
        const gun = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.15, 0.8), new THREE.MeshStandardMaterial({color: 0x000000})); gun.position.set(0.45, 1.0, -0.4); group.add(gun);
        group.userData = { parts: {lA, rA, lL, rL, body, head, gun}, velY: 0, hp: isEnemy ? CONFIG.enemyHP : CONFIG.maxMana, fireTimer: Math.random() * 100, isEnemy: isEnemy };
        return group;
    }

    function init() {
        scene = new THREE.Scene(); scene.background = new THREE.Color(0xD0EFFF);
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-container').appendChild(renderer.domElement);
        
        raycaster = new THREE.Raycaster(); screenCenter = new THREE.Vector2(0, 0);
        mapCanvas = document.getElementById('minimap-canvas'); mapCtx = mapCanvas.getContext('2d');
        scene.add(new THREE.AmbientLight(0xffffff, 0.95));
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({color: 0x2E5A1C})); ground.rotation.x = -Math.PI/2; scene.add(ground);

        // You are Blue
        player = createHumanoid(0x0044ff); scene.add(player);

        // --- MULTIPLAYER SOCKET EVENTS ---
        socket.on('currentPlayers', (players) => {
            Object.keys(players).forEach((id) => {
                if (id !== socket.id) addOtherPlayer(id, players[id]);
            });
        });

        socket.on('newPlayer', (data) => {
            addOtherPlayer(data.id, data.playerInfo);
        });

        socket.on('playerMoved', (data) => {
            if (otherPlayers[data.id]) {
                otherPlayers[data.id].position.set(data.playerInfo.x, data.playerInfo.y, data.playerInfo.z);
                otherPlayers[data.id].rotation.y = data.playerInfo.yaw;
            }
        });

        socket.on('playerDisconnected', (id) => {
            if (otherPlayers[id]) { scene.remove(otherPlayers[id]); delete otherPlayers[id]; }
        });

        // Server continuously spawns enemies
        socket.on('spawnEnemy', (enemyData) => {
            const e = createHumanoid(0xdd0000, true); // Red enemies
            e.position.set(enemyData.x, enemyData.y, enemyData.z);
            e.userData.serverId = enemyData.id;
            scene.add(e);
            STATE.enemies[enemyData.id] = e;
        });

        socket.on('removeEnemy', (enemyId) => {
            if (STATE.enemies[enemyId]) {
                scene.remove(STATE.enemies[enemyId]);
                delete STATE.enemies[enemyId];
                STATE.score++; // Team score goes up!
            }
        });
        // ---------------------------------

        setupControls();
        updateHealthUI();
        animate();
    }

    function addOtherPlayer(id, info) {
        // Teammates are Green!
        const teammate = createHumanoid(0x00ff00);
        teammate.position.set(info.x, info.y, info.z);
        scene.add(teammate);
        otherPlayers[id] = teammate;
    }

    function setupControls() {
        let lId = null, rId = null, lO = {x:0, y:0}, lastRx = 0;
        window.addEventListener('touchstart', e => {
            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth/2 && lId === null) {
                    lId = t.identifier; lO = {x:t.clientX, y:t.clientY};
                    joyBase.style.display = 'block'; joyBase.style.left = (lO.x - 40) + 'px'; joyBase.style.top = (lO.y - 40) + 'px';
                } else if (t.clientX >= window.innerWidth/2 && rId === null) { rId = t.identifier; lastRx = t.clientX; }
            } e.preventDefault();
        }, {passive: false});

        window.addEventListener('touchmove', e => {
            for (let t of e.touches) {
                if (t.identifier === lId) {
                    const dx = t.clientX - lO.x, dy = t.clientY - lO.y; const dist = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
                    const ang = Math.atan2(dy, dx); STATE.move = { x: (Math.cos(ang)*dist)/40, y: (Math.sin(ang)*dist)/40 };
                    joyKnob.style.transform = `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist}px)`;
                }
                if (t.identifier === rId) { STATE.targetYaw -= (t.clientX - lastRx) * (STATE.isScoping ? 0.003 : 0.008); lastRx = t.clientX; }
            }
        }, {passive: false});

        window.addEventListener('touchend', e => {
            for (let t of e.changedTouches) {
                if (t.identifier === lId) { lId = null; STATE.move = {x:0, y:0}; joyBase.style.display = 'none'; }
                if (t.identifier === rId) { rId = null; }
            }
        });

        document.getElementById('scope-btn').addEventListener('touchstart', e => { 
            STATE.isScoping = !STATE.isScoping;
            gsap.to(camera, { fov: STATE.isScoping ? 30 : 75, duration: 0.3, onUpdate: () => camera.updateProjectionMatrix() });
            e.preventDefault(); 
        });
        document.getElementById('jump-btn').addEventListener('touchstart', e => { if(player.position.y < 0.1) player.userData.velY = CONFIG.jump; e.preventDefault(); });
        document.getElementById('shoot-btn').addEventListener('touchstart', e => { fire(true); e.preventDefault(); });
    }

    function fire(isPlayer, originGroup = player) {
        const b = new THREE.Mesh(new THREE.SphereGeometry(0.18), new THREE.MeshBasicMaterial({color: isPlayer ? 0x00ffff : 0xff2200}));
        let dir;
        if (isPlayer) dir = new THREE.Vector3(0, 0, -1).applyQuaternion(originGroup.quaternion);
        else {
            const targetPos = player.position.clone().add(new THREE.Vector3(0, 1.2, 0));
            const spawnPos = originGroup.position.clone().add(new THREE.Vector3(0, 1.4, 0));
            dir = new THREE.Vector3().subVectors(targetPos, spawnPos).normalize();
        }
        b.position.copy(originGroup.position).setY(1.4).add(dir.clone().multiplyScalar(0.9));
        b.userData = { vel: dir.multiplyScalar(CONFIG.bulletSpeed), life: 100 };
        scene.add(b);
        if(isPlayer) STATE.pBullets.push(b); else STATE.eBullets.push(b);
    }

    function updateHealthUI() {
        const fill = document.getElementById('mana-fill');
        const percentage = (STATE.mana / CONFIG.maxMana) * 100;
        fill.style.width = percentage + '%';
        fill.style.backgroundColor = `hsl(${(percentage / 100) * 240}, 100%, 50%)`;
    }

    function animate() {
        requestAnimationFrame(animate);
        STATE.yaw += (STATE.targetYaw - STATE.yaw) * 0.15; player.rotation.y = STATE.yaw; 

        const fwd = new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), STATE.yaw);
        const rgt = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), STATE.yaw);
        const moveV = fwd.multiplyScalar(-STATE.move.y).add(rgt.multiplyScalar(STATE.move.x)).multiplyScalar(STATE.isScoping ? CONFIG.speed * 0.5 : CONFIG.speed);
        player.position.add(moveV);

        player.userData.velY -= CONFIG.gravity; player.position.y += player.userData.velY;
        if(player.position.y < 0) { player.position.y = 0; player.userData.velY = 0; }

        camera.position.lerp(player.position.clone().add(new THREE.Vector3(0, 3, 7).applyAxisAngle(new THREE.Vector3(0, 1, 0), STATE.yaw)), 0.1);
        camera.lookAt(player.position.clone().setY(1.5));

        // Sync movement to server
        socket.emit('playerMovement', { x: player.position.x, y: player.position.y, z: player.position.z, yaw: STATE.yaw });

        // Player Bullets (Only check against enemies)
        STATE.pBullets.forEach((b, i) => {
            b.position.add(b.userData.vel);
            Object.values(STATE.enemies).forEach((e) => {
                if(b.position.distanceTo(e.position.clone().add(new THREE.Vector3(0, 1, 0))) < CONFIG.hitBox) {
                    e.userData.hp--; scene.remove(b); STATE.pBullets.splice(i, 1);
                    if(e.userData.hp <= 0) { socket.emit('enemyDied', e.userData.serverId); } // Tell server it died
                }
            });
            if(b.userData.life-- < 0) { scene.remove(b); STATE.pBullets.splice(i, 1); }
        });

        // Enemy Bullets
        STATE.eBullets.forEach((b, i) => {
            b.position.add(b.userData.vel);
            if(b.position.distanceTo(player.position.clone().add(new THREE.Vector3(0,1,0))) < 1.3) {
                STATE.mana -= CONFIG.damagePerHit; scene.remove(b); STATE.eBullets.splice(i, 1); updateHealthUI();
            }
            if(b.userData.life-- < 0) { scene.remove(b); STATE.eBullets.splice(i, 1); }
        });

        // Make enemies face and shoot the nearest player
        Object.values(STATE.enemies).forEach(e => {
            let closestTarget = player;
            let closestDist = player.position.distanceTo(e.position);
            
            Object.values(otherPlayers).forEach(teammate => {
                let dist = teammate.position.distanceTo(e.position);
                if (dist < closestDist) { closestDist = dist; closestTarget = teammate; }
            });

            const dir = new THREE.Vector3().subVectors(closestTarget.position, e.position).normalize();
            e.rotation.y = Math.atan2(dir.x, dir.z) + Math.PI;
            e.position.x += dir.x * 0.06; e.position.z += dir.z * 0.06; e.position.y = 0; 
            
            e.userData.fireTimer++;
            if(e.userData.fireTimer > CONFIG.enemyFireRate) { fire(false, e); e.userData.fireTimer = 0; }
        });

        document.getElementById('score').innerText = STATE.score;
        document.getElementById('count').innerText = Object.keys(STATE.enemies).length;

        if(STATE.mana <= 0) { STATE.mana = CONFIG.maxMana; player.position.set(0,0,0); updateHealthUI(); } // Basic respawn
        renderer.render(scene, camera);
    }
    init();
</script>
</body>
</html>
