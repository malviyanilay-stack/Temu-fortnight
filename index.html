<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fortnite Lite - Touch Edition</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; /* Sky blue */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* Prevents scrolling on iOS */
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Let touches pass through to controls */
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.2);
        }
        
        #crosshair::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: red;
            transform: translate(-50%, -50%);
            border-radius: 50%;
        }

        /* HUD */
        .hud-panel {
            position: absolute;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
        }

        #health-bar {
            top: 20px;
            left: 20px;
            width: 200px;
            height: 20px;
            background: #333;
            border: 2px solid white;
        }

        #health-fill {
            width: 100%;
            height: 100%;
            background: #00ff00;
            transition: width 0.2s;
        }

        #stats {
            top: 20px;
            right: 20px;
            text-align: right;
        }

        #message-area {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffff00;
            font-size: 24px;
            text-shadow: 2px 2px 0 #000;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s;
        }

        /* Touch Controls */
        .touch-zone {
            position: absolute;
            bottom: 0;
            height: 50vh;
            width: 40vw;
            pointer-events: auto;
            /* background: rgba(255, 0, 0, 0.1); Debugging */
        }

        #left-zone { left: 0; }
        #right-zone { right: 0; width: 40vw; }

        .joystick-knob {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: none;
            pointer-events: none;
            border: 2px solid white;
        }

        /* Action Buttons */
        #action-buttons {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: auto;
            z-index: 20;
        }

        .game-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.8);
            background: rgba(0, 0, 0, 0.4);
            color: white;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }

        .game-btn:active {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0.95);
        }

        #btn-shoot { background: rgba(255, 50, 50, 0.6); width: 90px; height: 90px; font-size: 18px; }
        #btn-build { background: rgba(50, 100, 255, 0.6); }
        #btn-jump { background: rgba(50, 255, 50, 0.6); }

        /* Mobile specific adjustments */
        @media (min-width: 1024px) {
            /* Adjust for larger iPad screens if needed */
            .game-btn { width: 80px; height: 80px; }
            #btn-shoot { width: 100px; height: 100px; }
        }
    </style>
    <!-- Import Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="game-container"></div>

    <div id="ui-layer">
        <div id="crosshair"></div>
        
        <div id="health-bar" class="hud-panel">
            <div id="health-fill"></div>
        </div>

        <div id="stats" class="hud-panel">
            <div>Enemies: <span id="enemy-count">0</span></div>
            <div>Elims: <span id="score-count">0</span></div>
            <div>Mats: <span id="wood-count">∞</span></div>
        </div>

        <div id="message-area">VICTORY ROYALE!</div>

        <!-- Touch Controls -->
        <div id="left-zone" class="touch-zone"></div>
        <div id="right-zone" class="touch-zone"></div>
        <div id="left-knob" class="joystick-knob"></div>
        
        <div id="action-buttons">
            <div id="btn-jump" class="game-btn">Jump</div>
            <div id="btn-build" class="game-btn">Build</div>
            <div id="btn-shoot" class="game-btn">Fire</div>
        </div>
    </div>

<script>
    // --- Game Configuration & State ---
    const CONFIG = {
        // --- MOVEMENT/SENSITIVITY ---
        playerSpeed: 0.15,    
        rotationSpeed: 0.03, 
        jumpForce: 0.4,
        gravity: 0.02,        

        // --- ENEMY DIFFICULTY ---
        bulletSpeed: 0.7,     
        enemySpeed: 0.1,      
        enemySpawnRate: 150,  
        
        enemyDamagePerTouch: 5,   
        enemyFireRate: 180,       
        enemyBulletSpeed: 0.4,    
        enemyBulletDamage: 10,    
        
        // --- CAMERA CONFIG ---
        cameraDistance: 5,
        cameraHeight: 2.5,
        cameraSmoothness: 0.1, // NEW: Factor for smooth camera movement (LERP)
    };

    const STATE = {
        health: 100,
        score: 0,
        isGameOver: false,
        bullets: [],
        enemies: [],
        builds: [],
        input: {
            move: { x: 0, y: 0 }, // Left Stick
            look: { x: 0, y: 0 }, // Right Stick (delta)
        },
        // Camera/Player rotational state
        playerYaw: 0, // Rotation around Y-axis (for player direction)
    };

    // --- Three.js Setup ---
    let scene, camera, renderer;
    let playerMesh; // The visible player body
    let playerPosition = new THREE.Vector3(0, 0, 0); // Player's position vector
    let playerVelocity = new THREE.Vector3();
    
    // Smooth camera tracking variables
    let smoothCameraPosition = new THREE.Vector3();
    let smoothCameraTarget = new THREE.Vector3();
    
    // Joystick logic variables
    let leftTouchId = null;
    let rightTouchId = null;
    let leftOrigin = { x: 0, y: 0 };
    let rightOrigin = { x: 0, y: 0 };

    function init() {
        // 1. Scene
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 10, 60);

        // 2. Camera
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // 3. Renderer
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('game-container').appendChild(renderer.domElement);

        // 4. Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(50, 100, 50);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -50;
        dirLight.shadow.camera.right = 50;
        dirLight.shadow.camera.top = 50;
        dirLight.shadow.camera.bottom = -50;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // 5. World Generation
        createEnvironment();
        createPlayer();

        // Initialize smooth camera vectors to starting position
        smoothCameraPosition.copy(playerPosition);
        smoothCameraPosition.y += CONFIG.cameraHeight;
        smoothCameraTarget.copy(playerPosition);
        smoothCameraTarget.y += 1.5;
        camera.position.copy(smoothCameraPosition);
        camera.lookAt(smoothCameraTarget);


        // 6. Listeners
        setupTouchControls();
        window.addEventListener('resize', onWindowResize, false);

        // 7. Start Loop
        animate();
        showMessage("SMOOTH CAMERA ENABLED!", 2000);
    }

    function createEnvironment() {
        // Ground
        const groundGeo = new THREE.PlaneGeometry(200, 200);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Trees
        const trunkGeo = new THREE.CylinderGeometry(0.5, 0.5, 2, 8);
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
        const leavesGeo = new THREE.ConeGeometry(2, 4, 8);
        const leavesMat = new THREE.MeshStandardMaterial({ color: 0x228B22 });

        for(let i=0; i<30; i++) {
            const x = (Math.random() - 0.5) * 100;
            const z = (Math.random() - 0.5) * 100;
            
            if(Math.abs(x) < 5 && Math.abs(z) < 5) continue;

            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.set(x, 1, z);
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            scene.add(trunk);

            const leaves = new THREE.Mesh(leavesGeo, leavesMat);
            leaves.position.set(x, 4, z);
            leaves.castShadow = true;
            scene.add(leaves);
        }
    }

    function createPlayer() {
        // Player is only the visible mesh now
        const geometry = new THREE.BoxGeometry(1, 1.8, 1);
        const material = new THREE.MeshStandardMaterial({ color: 0x0000FF }); // Blue player
        playerMesh = new THREE.Mesh(geometry, material);
        playerMesh.position.y = 0.9;
        playerMesh.castShadow = true;
        
        // Start player at the center
        playerPosition.y = 0;
        scene.add(playerMesh);
    }

    // --- Input Handling (Touch) ---
    function setupTouchControls() {
        const leftZone = document.getElementById('left-zone');
        const rightZone = document.getElementById('right-zone');
        const leftKnob = document.getElementById('left-knob');
        
        // --- Left Stick (Movement) ---
        leftZone.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.changedTouches[0];
            leftTouchId = touch.identifier;
            leftOrigin = { x: touch.clientX, y: touch.clientY };
            
            leftKnob.style.display = 'block';
            leftKnob.style.left = touch.clientX + 'px';
            leftKnob.style.top = touch.clientY + 'px';
        }, { passive: false });

        leftZone.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === leftTouchId) {
                    const touch = e.changedTouches[i];
                    const deltaX = touch.clientX - leftOrigin.x;
                    const deltaY = touch.clientY - leftOrigin.y;
                    
                    const distance = Math.min(Math.sqrt(deltaX*deltaX + deltaY*deltaY), 50);
                    const angle = Math.atan2(deltaY, deltaX);
                    
                    const knobX = leftOrigin.x + Math.cos(angle) * distance;
                    const knobY = leftOrigin.y + Math.sin(angle) * distance;
                    leftKnob.style.left = knobX + 'px';
                    leftKnob.style.top = knobY + 'px';

                    // Update Game Input (-1 to 1)
                    STATE.input.move.x = (Math.cos(angle) * distance) / 50;
                    STATE.input.move.y = (Math.sin(angle) * distance) / 50;
                }
            }
        }, { passive: false });

        leftZone.addEventListener('touchend', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === leftTouchId) {
                    leftTouchId = null;
                    STATE.input.move.x = 0;
                    STATE.input.move.y = 0;
                    leftKnob.style.display = 'none';
                }
            }
        }, { passive: false });

        // --- Right Stick (Looking/Aiming) ---
        let lastRightX = 0;

        rightZone.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.changedTouches[0];
            rightTouchId = touch.identifier;
            lastRightX = touch.clientX;
        }, { passive: false });

        rightZone.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === rightTouchId) {
                    const touch = e.changedTouches[i];
                    const deltaX = touch.clientX - lastRightX;
                    
                    // Horizontal rotation sensitivity
                    STATE.input.look.x = deltaX * 0.01; 
                    
                    lastRightX = touch.clientX;
                }
            }
        }, { passive: false });

        rightZone.addEventListener('touchend', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === rightTouchId) {
                    rightTouchId = null;
                    STATE.input.look.x = 0;
                }
            }
        }, { passive: false });

        // --- Buttons ---
        document.getElementById('btn-jump').addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        }, {passive: false});

        document.getElementById('btn-shoot').addEventListener('touchstart', (e) => {
            e.preventDefault();
            shoot();
        }, {passive: false});

        document.getElementById('btn-build').addEventListener('touchstart', (e) => {
            e.preventDefault();
            buildStructure();
        }, {passive: false});
    }

    // --- Utility Functions ---
    function takeDamage(amount) {
        STATE.health -= amount;
        document.getElementById('health-fill').style.width = STATE.health + '%';
        
        // Flash red for damage feedback
        playerMesh.material.color.setHex(0xFF6666);
        setTimeout(() => playerMesh.material.color.setHex(0x0000FF), 50);

        if (STATE.health <= 0) {
            gameOver();
        }
    }

    // --- Game Actions ---
    function jump() {
        if (playerPosition.y <= 0.1) {
            playerVelocity.y = CONFIG.jumpForce;
        }
    }

    function shoot() {
        // Calculate the shooting direction based on the current camera/playerYaw
        const direction = new THREE.Vector3(0, 0, -1);
        direction.applyAxisAngle(new THREE.Vector3(0, 1, 0), STATE.playerYaw);
        
        // Create player bullet
        const geometry = new THREE.SphereGeometry(0.2, 8, 8);
        const material = new THREE.MeshBasicMaterial({ color: 0xFFFF00 }); // Yellow bullet
        const bullet = new THREE.Mesh(geometry, material);
        
        // Start at player position (slightly raised and forward)
        bullet.position.copy(playerPosition);
        bullet.position.y += 1.5; // Eye level
        
        // Offset slightly forward to not clip player
        bullet.position.add(direction.clone().multiplyScalar(1));

        // Add velocity and type property to mesh
        bullet.userData = { 
            velocity: direction.multiplyScalar(CONFIG.bulletSpeed),
            life: 60, // frames
            type: 'player'
        };

        scene.add(bullet);
        STATE.bullets.push(bullet);
    }

    function enemyShoot(enemy) {
        // Calculate the shooting direction from enemy to player
        const direction = new THREE.Vector3().subVectors(playerPosition, enemy.position).normalize();
        
        // Create enemy bullet
        const geometry = new THREE.SphereGeometry(0.2, 8, 8);
        const material = new THREE.MeshBasicMaterial({ color: 0x9900FF }); // Purple bullet
        const bullet = new THREE.Mesh(geometry, material);
        
        // Start at enemy's position (slightly raised)
        bullet.position.copy(enemy.position);
        bullet.position.y += 1;
        
        // Add velocity and type property to mesh
        bullet.userData = { 
            velocity: direction.multiplyScalar(CONFIG.enemyBulletSpeed),
            life: 90, // Longer life since travel distance is greater
            type: 'enemy'
        };

        scene.add(bullet);
        STATE.bullets.push(bullet);
    }

    function buildStructure() {
        // This is simplified as we don't track resources dynamically
        if(document.getElementById('wood-count').innerText === '0') return;

        // Calculate the building direction based on the current camera/playerYaw
        const direction = new THREE.Vector3(0, 0, -1);
        direction.applyAxisAngle(new THREE.Vector3(0, 1, 0), STATE.playerYaw);

        // Build a ramp in front of player
        const geometry = new THREE.BoxGeometry(3, 0.2, 3);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0xA0522D, // Wood brown
            transparent: false
        });
        const ramp = new THREE.Mesh(geometry, material);

        // Position in front of player
        const buildPos = playerPosition.clone().add(direction.multiplyScalar(3));
        
        // Snap to grid-ish
        buildPos.x = Math.round(buildPos.x / 2) * 2;
        buildPos.z = Math.round(buildPos.z / 2) * 2;
        buildPos.y = 1; // Half height

        ramp.position.copy(buildPos);
        ramp.rotation.x = -Math.PI / 4; // 45 degree ramp
        // Rotate to match player yaw
        ramp.rotation.y = STATE.playerYaw; 

        scene.add(ramp);
        STATE.builds.push(ramp);
    }

    function spawnEnemy() {
        if (STATE.isGameOver) return;
        
        const geometry = new THREE.BoxGeometry(1, 1.8, 1);
        const material = new THREE.MeshStandardMaterial({ color: 0xFF0000 });
        const enemy = new THREE.Mesh(geometry, material);

        // Spawn somewhere far away
        const angle = Math.random() * Math.PI * 2;
        const radius = 30 + Math.random() * 20;
        enemy.position.set(
            playerPosition.x + Math.cos(angle) * radius,
            1, // y
            playerPosition.z + Math.sin(angle) * radius
        );
        
        enemy.castShadow = true;
        enemy.userData = { health: 3 };
        
        scene.add(enemy);
        STATE.enemies.push(enemy);
        
        document.getElementById('enemy-count').innerText = STATE.enemies.length;
    }

    // --- Physics & Logic Loop ---
    let frameCount = 0;

    function animate() {
        requestAnimationFrame(animate);

        if (STATE.isGameOver) return;

        frameCount++;
        if(frameCount % CONFIG.enemySpawnRate === 0) {
            spawnEnemy();
        }

        // 1. Camera Rotation (Right Stick)
        // Update the global player Yaw based on touch input
        STATE.playerYaw -= STATE.input.look.x * 5; 
        STATE.input.look.x = 0; // Reset look delta

        // 2. Player Movement (Left Stick)
        if (STATE.input.move.x !== 0 || STATE.input.move.y !== 0) {
            
            // Calculate movement direction relative to the Camera's current facing (STATE.playerYaw)
            const forwardVector = new THREE.Vector3(0, 0, -1);
            forwardVector.applyAxisAngle(new THREE.Vector3(0, 1, 0), STATE.playerYaw); // Apply current camera rotation
            
            const rightVector = new THREE.Vector3(1, 0, 0);
            rightVector.applyAxisAngle(new THREE.Vector3(0, 1, 0), STATE.playerYaw); // Apply current camera rotation
            
            // Calculate total movement vector
            // Joystick Y is typically inverted (positive Y on screen is down)
            const moveVec = forwardVector.clone().multiplyScalar(-STATE.input.move.y).add(rightVector.clone().multiplyScalar(STATE.input.move.x));
            moveVec.normalize().multiplyScalar(CONFIG.playerSpeed);
            
            playerPosition.add(moveVec);

            // Rotate the visual player mesh to face the direction of movement (if moving)
            const angle = Math.atan2(moveVec.x, moveVec.z);
            playerMesh.rotation.y = angle; 
        }

        // 3. Apply Gravity & Grounding
        playerVelocity.y -= CONFIG.gravity;
        playerPosition.y += playerVelocity.y;

        // Simple Ground collision
        if (playerPosition.y < 0) {
            playerPosition.y = 0;
            playerVelocity.y = 0;
        }

        // Update the visual mesh position
        playerMesh.position.copy(playerPosition);
        playerMesh.position.y += 0.9; // Adjust for half height

        // 4. Update Camera Position (Third Person Orbit with SMOOTHING)
        
        // Calculate DESIRED look target (Player's head height)
        const desiredTargetPos = playerPosition.clone();
        const desiredLookTarget = desiredTargetPos.clone().setY(desiredTargetPos.y + 1.5);
        
        // Calculate DESIRED camera position offset based on playerYaw
        const offset = new THREE.Vector3(0, 0, CONFIG.cameraDistance);
        offset.applyAxisAngle(new THREE.Vector3(0, 1, 0), STATE.playerYaw);
        
        const desiredCamPos = new THREE.Vector3(
            desiredTargetPos.x + offset.x,
            desiredTargetPos.y + CONFIG.cameraHeight,
            desiredTargetPos.z + offset.z
        );

        // Apply smoothing (Linear Interpolation - LERP)
        smoothCameraPosition.lerp(desiredCamPos, CONFIG.cameraSmoothness);
        smoothCameraTarget.lerp(desiredLookTarget, CONFIG.cameraSmoothness);

        // Set camera position and look at the smoothed target
        camera.position.copy(smoothCameraPosition);
        camera.lookAt(smoothCameraTarget);


        // 5. Update Bullets (Physics & Collision)
        for (let i = STATE.bullets.length - 1; i >= 0; i--) {
            const b = STATE.bullets[i];
            b.position.add(b.userData.velocity);
            b.userData.life--;
            
            let hit = false;
            
            if (b.userData.type === 'player') {
                // Player bullet collision with Enemies
                for (let j = STATE.enemies.length - 1; j >= 0; j--) {
                    const e = STATE.enemies[j];
                    // Check collision distance
                    if (b.position.distanceTo(e.position) < 1.5) {
                        scene.remove(b);
                        STATE.bullets.splice(i, 1);
                        hit = true;
                        
                        // Damage Enemy
                        e.userData.health--;
                        if(e.userData.health <= 0) {
                            scene.remove(e);
                            STATE.enemies.splice(j, 1);
                            STATE.score++;
                            document.getElementById('score-count').innerText = STATE.score;
                            document.getElementById('enemy-count').innerText = STATE.enemies.length;
                        } else {
                            // Flash red for damage feedback
                            e.material.color.setHex(0xFF6666);
                            setTimeout(() => e.material.color.setHex(0xFF0000), 100);
                        }
                        break;
                    }
                }
            } else if (b.userData.type === 'enemy') {
                // Enemy bullet collision with Player
                // A simplified collision check based on distance to player center
                if (b.position.distanceTo(playerPosition) < 1.0) {
                    scene.remove(b);
                    STATE.bullets.splice(i, 1);
                    hit = true;
                    
                    takeDamage(CONFIG.enemyBulletDamage);
                    break;
                }
            }

            // Cleanup old bullets
            if (!hit && b.userData.life <= 0) {
                scene.remove(b);
                STATE.bullets.splice(i, 1);
            }
        }

        // 6. Update Enemies (AI)
        for (const enemy of STATE.enemies) {
            const dir = new THREE.Vector3().subVectors(playerPosition, enemy.position);
            dir.y = 0;
            dir.normalize();
            enemy.position.add(dir.multiplyScalar(CONFIG.enemySpeed));
            enemy.lookAt(playerPosition.x, enemy.position.y, playerPosition.z); // Only rotate yaw

            // Enemy Shooting Logic
            if (frameCount % CONFIG.enemyFireRate === 0) {
                enemyShoot(enemy);
            }

            // Hit Player (Melee damage)?
            if (enemy.position.distanceTo(playerPosition) < 1.0) {
                takeDamage(CONFIG.enemyDamagePerTouch);
            }
        }

        renderer.render(scene, camera);
    }

    function gameOver() {
        STATE.isGameOver = true;
        const msg = document.getElementById('message-area');
        msg.innerText = "ELIMINATED";
        msg.style.color = "red";
        msg.style.opacity = 1;
    }

    function showMessage(text, duration) {
        const msg = document.getElementById('message-area');
        msg.innerText = text;
        msg.style.opacity = 1;
        setTimeout(() => {
            msg.style.opacity = 0;
        }, duration);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // Initialize Game
    window.onload = function() {
        init();
    };

</script>
</body>
</html>
