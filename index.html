<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Temu Fortnite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; touch-action: none; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .hud { position: absolute; background: rgba(0,0,0,0.8); color: #fff; padding: 12px; border: 2px solid #ff4444; }
        #health-ui { top: 20px; left: 20px; width: 200px; }
        #health-bar { width: 100%; height: 20px; background: #ff4444; transition: width 0.1s; }
        .bar-bg { width: 100%; height: 20px; background: #222; margin-top: 5px; border: 1px solid #555; }
        #stats { top: 20px; right: 20px; text-align: right; border-color: #0ff; color: #0ff; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 24px; height: 24px; border: 2px solid #f0f; border-radius: 50%; transform: translate(-50%, -50%); }
        #btns { position: absolute; bottom: 30px; right: 20px; display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
        .btn { width: 80px; height: 80px; background: rgba(20,20,20,0.8); color: white; border: 3px solid #0ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        #fire-btn { background: #ff4444; width: 100px; height: 100px; border-color: #fff; }
        #joystick-ui { position: absolute; bottom: 50px; left: 50px; width: 140px; height: 140px; background: rgba(0,255,255,0.1); border: 2px solid #0ff; border-radius: 50%; pointer-events: auto; }
        #joystick-knob { position: absolute; width: 60px; height: 60px; background: #0ff; border-radius: 50%; left: 40px; top: 40px; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="health-ui" class="hud">HEALTH<div class="bar-bg"><div id="health-bar"></div></div></div>
        <div id="stats" class="hud">ELIMS: <span id="elim-count">0</span><br>ENEMIES: <span id="enemy-count">0</span></div>
        <div id="crosshair"></div>
        <div id="joystick-ui"><div id="joystick-knob"></div></div>
        <div id="btns"><div id="scope-btn" class="btn">SCOPE</div><div id="jump-btn" class="btn">JUMP</div><div id="fire-btn" class="btn">FIRE</div></div>
    </div>

    <script>
        const socket = io("https://temu-fortnight2.onrender.com");
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0x404040));

        // --- Grass & Trees ---
        const loader = new THREE.TextureLoader();
        const grassTex = loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/terrain/grasslight-big.jpg');
        grassTex.wrapS = grassTex.wrapT = THREE.RepeatWrapping;
        grassTex.repeat.set(20, 20);
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ map: grassTex }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        function createTree(x, z) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 3), new THREE.MeshStandardMaterial({color: 0x5d4037}));
            trunk.position.y = 1.5;
            const leaves = new THREE.Mesh(new THREE.SphereGeometry(1.5), new THREE.MeshStandardMaterial({color: 0x2e7d32}));
            leaves.position.y = 3.5;
            tree.add(trunk, leaves);
            tree.position.set(x, 0, z);
            scene.add(tree);
        }
        for(let i=0; i<15; i++) createTree(Math.random()*100-50, Math.random()*100-50);

        // --- Body Parts System ---
        function createPlayerModel(color) {
            const group = new THREE.Group();
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), new THREE.MeshStandardMaterial({color}));
            torso.position.y = 1.2;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 2.1;
            const lArm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.8, 0.2), new THREE.MeshStandardMaterial({color}));
            lArm.position.set(-0.55, 1.2, 0);
            const rArm = lArm.clone(); rArm.position.x = 0.55;
            const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.8, 0.3), new THREE.MeshStandardMaterial({color: 0x222222}));
            lLeg.position.set(-0.2, 0.4, 0);
            const rLeg = lLeg.clone(); rLeg.position.x = 0.2;
            group.add(torso, head, lArm, rArm, lLeg, rLeg);
            return group;
        }

        const localPlayer = createPlayerModel(0x00ff00);
        scene.add(localPlayer);
        const enemies = {};
        let elims = 0;

        // --- Controls ---
        let joyPos = { x: 0, y: 0 };
        const joyKnob = document.getElementById('joystick-knob');
        document.getElementById('joystick-ui').addEventListener('touchmove', (e) => {
            const t = e.touches[0]; const r = e.currentTarget.getBoundingClientRect();
            joyPos.x = (t.clientX - (r.left + r.width/2))/70; joyPos.y = (t.clientY - (r.top + r.height/2))/70;
            const d = Math.sqrt(joyPos.x**2 + joyPos.y**2);
            if(d > 1) { joyPos.x /= d; joyPos.y /= d; }
            joyKnob.style.transform = `translate(${joyPos.x*45}px, ${joyPos.y*45}px)`;
        });
        document.getElementById('joystick-ui').addEventListener('touchend', () => {
            joyPos = {x:0, y:0}; joyKnob.style.transform = `translate(0,0)`;
        });

        document.getElementById('fire-btn').addEventListener('touchstart', () => {
            Object.keys(enemies).forEach(id => {
                if(localPlayer.position.distanceTo(enemies[id].position) < 8) {
                    socket.emit('enemyDied', id);
                    elims++;
                    document.getElementById('elim-count').innerText = elims;
                }
            });
        });

        // --- Online Sync ---
        socket.on('spawnEnemy', (data) => {
            const enemy = createPlayerModel(0xff0000);
            enemy.position.set(data.x, 0, data.z);
            scene.add(enemy);
            enemies[data.id] = enemy;
            document.getElementById('enemy-count').innerText = Object.keys(enemies).length;
        });

        socket.on('removeEnemy', (id) => {
            if(enemies[id]) { scene.remove(enemies[id]); delete enemies[id]; }
        });

        function animate() {
            requestAnimationFrame(animate);
            localPlayer.position.x += joyPos.x * 0.15;
            localPlayer.position.z += joyPos.y * 0.15;
            if(Math.abs(joyPos.x) > 0.1 || Math.abs(joyPos.y) > 0.1) localPlayer.rotation.y = Math.atan2(joyPos.x, joyPos.y);

            camera.position.set(localPlayer.position.x, 6, localPlayer.position.z + 10);
            camera.lookAt(localPlayer.position);

            socket.emit('playerMovement', { x: localPlayer.position.x, y: 0, z: localPlayer.position.z, yaw: localPlayer.rotation.y });
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
