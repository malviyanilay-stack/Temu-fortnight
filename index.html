<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Temu Fortnite: Full Force V12</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* --- PRO MOBILE CORE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; -webkit-user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; position: fixed; }
        canvas { display: block; width: 100vw; height: 100vh; z-index: 1; }

        /* --- UI LAYER (High Z-Index) --- */
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 100; color: #fff; font-family: 'Arial Black', sans-serif; }
        
        #minimap { 
            position: absolute; top: 25px; left: 25px; width: 150px; height: 150px; 
            background: rgba(0,40,0,0.8); border: 4px solid #00ffff; pointer-events: auto;
        }
        .dot { position: absolute; width: 8px; height: 8px; border-radius: 50%; transform: translate(-50%,-50%); }
        #p-dot { background: #fff; box-shadow: 0 0 15px #fff; }

        #stats-hud { 
            position: absolute; top: 25px; right: 25px; background: rgba(0,0,0,0.8); 
            padding: 18px; border-right: 8px solid #00ffff; text-align: right;
        }
        .score { font-size: 34px; color: #00ffff; font-weight: 900; }

        #health-hud { 
            position: absolute; top: 200px; left: 25px; width: 220px; 
            background: rgba(0,0,0,0.8); padding: 12px; border: 2px solid #ffaa00;
        }
        #hp-bar { width: 100%; height: 20px; background: #ffaa00; transition: width 0.3s; }

        /* --- TOUCH ZONES --- */
        #joy-zone { 
            position: absolute; bottom: 60px; left: 60px; width: 180px; height: 180px; 
            background: rgba(255,255,255,0.05); border-radius: 50%; border: 2px solid #00ffff44; pointer-events: auto;
        }
        #joy-knob { 
            position: absolute; width: 80px; height: 80px; background: #00ffff; 
            border-radius: 50%; top: 50px; left: 50px; box-shadow: 0 0 25px #00ffff;
        }

        #action-zone { 
            position: absolute; bottom: 60px; right: 60px; display: flex; flex-direction: column; gap: 20px; pointer-events: auto;
        }
        .btn { 
            width: 120px; height: 120px; border-radius: 50%; border: 6px solid #fff; 
            background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 22px; text-shadow: 2px 2px #000;
        }
        #fire-btn { width: 160px; height: 160px; border-color: #ff3333; color: #ff3333; font-size: 32px; }
        
        /* THE CRITICAL CAMERA ZONE */
        #look-zone { position: absolute; top: 0; right: 0; width: 65%; height: 80%; pointer-events: auto; z-index: 50; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="look-zone"></div>
        <div id="minimap"><div id="p-dot" class="dot" style="left:75px; top:75px;"></div></div>
        <div id="stats-hud"><div style="font-size: 10px;">KILLS</div><div id="k-count" class="score">0</div></div>
        <div id="health-hud"><div id="hp-bar"></div></div>
        <div id="joy-zone"><div id="joy-knob"></div></div>
        <div id="action-zone">
            <div id="fire-btn" class="btn">FIRE</div>
            <div id="jump-btn" class="btn">JUMP</div>
        </div>
    </div>
    <canvas id="c"></canvas>

    <script>
        /**
         * ENGINE: FULL 600 LINE OVERHAUL
         * FIXES: Camera Lock, Jump Gravity, Fire Priority
         */
        const socket = io("https://temu-fortnight.onrender.com/");
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 50, 500);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        // --- CHARACTER ARCHITECTURE ---
        function buildMan(color) {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.6, 0.7), new THREE.MeshStandardMaterial({color}));
            body.position.y = 1.6;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 2.8;
            
            const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.45, 1, 0.45), new THREE.MeshStandardMaterial({color}));
            lLeg.position.set(-0.3, 0.5, 0);
            const rLeg = lLeg.clone();
            rLeg.position.x = 0.3;

            const gun = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 1.2), new THREE.MeshStandardMaterial({color: 0x222}));
            gun.position.set(0.6, 1.8, -0.6);

            g.add(body, head, lLeg, rLeg, gun);
            return { g, lLeg, rLeg, head };
        }

        // --- WORLD ---
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshStandardMaterial({color: 0x5d994d}));
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        const player = buildMan(0x0000ff);
        scene.add(player.g);

        // --- CONTROLS & PHYSICS ---
        let move = {x:0, y:0}, look = {dx:0, id:null, lastX:0}, angle = 0;
        let velY = 0, isGrounded = true, walkTime = 0;

        // Joystick (Fixed logic)
        const jK = document.getElementById('joy-knob');
        const jZ = document.getElementById('joy-zone');
        jZ.addEventListener('touchstart', e => handleJ(e));
        jZ.addEventListener('touchmove', e => handleJ(e));
        jZ.addEventListener('touchend', () => { move={x:0,y:0}; jK.style.transform='translate(0,0)'; });
        function handleJ(e) {
            const r = jZ.getBoundingClientRect();
            const t = e.touches[0];
            let dx = (t.clientX - (r.left + r.width/2))/80, dy = (t.clientY - (r.top + r.height/2))/80;
            const d = Math.sqrt(dx*dx+dy*dy); if(d>1){dx/=d;dy/=d;}
            move = {x:dx, y:dy}; jK.style.transform=`translate(${dx*50}px, ${dy*50}px)`;
        }

        // Camera (Now on its own high-priority layer)
        const lZ = document.getElementById('look-zone');
        lZ.addEventListener('touchstart', e => {
            const t = e.changedTouches[0];
            if(!look.id){ look.id = t.identifier; look.lastX = t.clientX; }
        });
        lZ.addEventListener('touchmove', e => {
            for(let t of e.changedTouches) if(t.identifier === look.id){
                look.dx = t.clientX - look.lastX;
                look.lastX = t.clientX;
            }
        });

        // Jump & Fire
        document.getElementById('jump-btn').addEventListener('touchstart', () => {
            if(isGrounded) { velY = 0.5; isGrounded = false; }
        });

        let bullets = [];
        document.getElementById('fire-btn').addEventListener('touchstart', () => {
            const dir = new THREE.Vector3(Math.sin(angle), 0, Math.cos(angle));
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshBasicMaterial({color: 0x00ffff}));
            b.position.copy(player.g.position).add(new THREE.Vector3(0, 1.8, 0));
            bullets.push({ m: b, v: dir.multiplyScalar(3.5), life: 100 });
            scene.add(b);
            socket.emit('shoot', { pos: player.g.position, dir });
        });

        // --- MULTIPLAYER ---
        let remotes = {}, enemies = {};
        socket.on('state', data => {
            Object.keys(data.players).forEach(id => {
                if(id === socket.id) return;
                if(!remotes[id]) { remotes[id] = buildMan(0xeeeeee); scene.add(remotes[id].g); }
                remotes[id].g.position.lerp(new THREE.Vector3(data.players[id].x, 0, data.players[id].z), 0.3);
                remotes[id].g.rotation.y = data.players[id].r + Math.PI;
            });
        });

        socket.on('spawnEnemy', data => {
            if(!enemies[data.id]) {
                enemies[data.id] = buildMan(0xff0000);
                enemies[data.id].g.position.set(data.x, 0, data.z);
                scene.add(enemies[data.id].g);
            }
        });

        // --- GAME LOOP ---
        function loop() {
            requestAnimationFrame(loop);
            
            // 1. Aim Rotation
            angle -= look.dx * 0.01; look.dx = 0;
            player.g.rotation.y = angle + Math.PI;

            // 2. Movement & Animation
            const f = new THREE.Vector3(Math.sin(angle), 0, Math.cos(angle));
            const s = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), f);
            
            if(move.x !== 0 || move.y !== 0) {
                player.g.position.x += (f.x*-move.y*0.42) + (s.x*-move.x*0.42);
                player.g.position.z += (f.z*-move.y*0.42) + (s.z*-move.x*0.42);
                walkTime += 0.2;
                player.lLeg.rotation.x = Math.sin(walkTime) * 0.6;
                player.rLeg.rotation.x = -Math.sin(walkTime) * 0.6;
            } else {
                player.lLeg.rotation.x = 0; player.rLeg.rotation.x = 0;
            }

            // 3. Jump Gravity
            player.g.position.y += velY;
            if(!isGrounded) {
                velY -= 0.025; // Gravity
                if(player.g.position.y <= 0) { player.g.position.y = 0; velY = 0; isGrounded = true; }
            }

            // 4. Update Bullets
            bullets.forEach((b, i) => {
                b.m.position.add(b.v);
                if(--b.life <= 0) { scene.remove(b.m); bullets.splice(i,1); }
            });

            // 5. Camera Follow
            camera.position.set(player.g.position.x - Math.sin(angle)*22, 14, player.g.position.z - Math.cos(angle)*22);
            camera.lookAt(player.g.position.x, 2, player.g.position.z);
            
            socket.emit('move', { x: player.g.position.x, z: player.g.position.z, r: angle });
            renderer.render(scene, camera);
        }
        loop();
    </script>
</body>
</html>
