<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Temu Fortnite: Full Force Edition</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* --- MOBILE LOCK & SAFARI FIX --- */
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; -webkit-user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #87ceeb; position: fixed; }
        canvas { display: block; width: 100vw; height: 100vh; z-index: 1; }

        /* --- UI OVERLAY LAYER --- */
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 100; color: #fff; font-family: 'Arial Black', sans-serif; }
        
        #minimap { 
            position: absolute; top: 25px; left: 25px; width: 140px; height: 140px; 
            background: rgba(0,35,0,0.85); border: 4px solid #00ffff; pointer-events: auto;
            box-shadow: 0 0 15px rgba(0,255,255,0.3);
        }
        .dot { position: absolute; width: 8px; height: 8px; border-radius: 50%; transform: translate(-50%,-50%); }
        #p-dot { background: #fff; box-shadow: 0 0 10px #fff; }

        #stats-hud { 
            position: absolute; top: 25px; right: 25px; background: rgba(0,0,0,0.8); 
            padding: 15px; border-right: 8px solid #00ffff; text-align: right;
        }
        .score-val { font-size: 30px; color: #00ffff; font-weight: 900; }

        #health-hud { 
            position: absolute; top: 185px; left: 25px; width: 210px; 
            background: rgba(0,0,0,0.7); padding: 10px; border: 2px solid #ffaa00;
        }
        #hp-bar { width: 100%; height: 18px; background: #ffaa00; box-shadow: 0 0 8px #ffaa00; }

        /* --- INPUT ZONES --- */
        #joy-base { 
            position: absolute; bottom: 65px; left: 65px; width: 165px; height: 165px; 
            background: rgba(255,255,255,0.1); border: 2px solid #00ffff44; border-radius: 50%; pointer-events: auto;
        }
        #joy-knob { 
            position: absolute; width: 80px; height: 80px; background: #00ffff; 
            border-radius: 50%; top: 42.5px; left: 42.5px; box-shadow: 0 0 25px #00ffff;
        }

        #action-zone { 
            position: absolute; bottom: 65px; right: 65px; display: flex; flex-direction: column; gap: 20px; pointer-events: auto;
        }
        .btn { 
            width: 120px; height: 120px; border-radius: 50%; border: 6px solid #fff; 
            background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 22px; text-shadow: 2px 2px #000;
        }
        #fire-btn { width: 160px; height: 160px; border-color: #ff3333; color: #ff3333; font-size: 30px; }

        #look-catcher { position: absolute; top: 0; right: 0; width: 70%; height: 75%; pointer-events: auto; z-index: 50; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="look-catcher"></div>
        <div id="minimap"><div id="p-dot" class="dot" style="left:70px; top:70px;"></div></div>
        <div id="stats-hud"><div style="font-size: 10px;">ELIMINATIONS</div><div id="kill-count" class="score-val">0</div></div>
        <div id="health-hud"><div id="hp-bar"></div></div>
        <div id="joy-base"><div id="joy-knob"></div></div>
        <div id="action-zone">
            <div id="fire-btn" class="btn">FIRE</div>
            <div id="jump-btn" class="btn">JUMP</div>
        </div>
    </div>
    <canvas id="c"></canvas>

    <script>
        /**
         * TEMU FORTNITE: HIGH-DENSITY 500+ LINE BUILD
         */
        const socket = io("https://temu-fortnight.onrender.com/");
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 20, 600);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // --- 1. ASSET ARCHITECTURE ---
        function createCharacter(bodyColor) {
            const group = new THREE.Group();
            
            // Torso
            const torso = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.5, 0.7), new THREE.MeshStandardMaterial({color: bodyColor}));
            torso.position.y = 1.75;
            
            // Head (Skin Tone)
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.85, 0.85), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 2.95;

            // Limbs for Animation
            const limbGeo = new THREE.BoxGeometry(0.45, 1.2, 0.45);
            const lLeg = new THREE.Mesh(limbGeo, new THREE.MeshStandardMaterial({color: bodyColor}));
            lLeg.position.set(-0.35, 0.6, 0);
            const rLeg = lLeg.clone();
            rLeg.position.x = 0.35;

            // Gun Model
            const gun = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.3, 1.4), new THREE.MeshStandardMaterial({color: 0x222}));
            gun.position.set(0.65, 2.0, -0.6);

            group.add(torso, head, lLeg, rLeg, gun);
            return { group, lLeg, rLeg, head };
        }

        function createTree() {
            const t = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 6), new THREE.MeshStandardMaterial({color: 0x4d2d18}));
            trunk.position.y = 3;
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(4, 12, 8), new THREE.MeshStandardMaterial({color: 0x2d4c1e}));
            leaves.position.y = 10;
            t.add(trunk, leaves);
            return t;
        }

        // --- 2. WORLD BUILDER ---
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(3000, 3000), new THREE.MeshStandardMaterial({color: 0x5d994d}));
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 0.6);
        sun.position.set(100, 200, 100);
        scene.add(sun);

        // Dense Forest Loop
        for(let i=0; i<110; i++) {
            const tree = createTree();
            tree.position.set((Math.random()-0.5)*1500, 0, (Math.random()-0.5)*1500);
            scene.add(tree);
        }

        // --- 3. PLAYER & PHYSICS ---
        const player = createCharacter(0x0000ff);
        scene.add(player.group);

        let move = {x:0, y:0}, look = {dx:0, id:null, lastX:0}, angle = 0;
        let vY = 0, isGrounded = true, walkCycle = 0;

        // Joystick
        const jB = document.getElementById('joy-base');
        const jK = document.getElementById('joy-knob');
        jB.addEventListener('touchstart', e => handleJ(e));
        jB.addEventListener('touchmove', e => handleJ(e));
        jB.addEventListener('touchend', () => { move={x:0,y:0}; jK.style.transform='translate(0,0)'; });
        function handleJ(e) {
            const r = jB.getBoundingClientRect();
            const t = e.touches[0];
            let dx = (t.clientX - (r.left + r.width/2))/82, dy = (t.clientY - (r.top + r.height/2))/82;
            const d = Math.sqrt(dx*dx+dy*dy); if(d>1){dx/=d; dy/=d;}
            move = {x:dx, y:dy}; jK.style.transform=`translate(${dx*50}px, ${dy*50}px)`;
        }

        // Aim Zone
        document.getElementById('look-catcher').addEventListener('touchstart', e => {
            const t = e.changedTouches[0];
            if(!look.id){ look.id = t.identifier; look.lastX = t.clientX; }
        });
        document.getElementById('look-catcher').addEventListener('touchmove', e => {
            for(let t of e.changedTouches) if(t.identifier === look.id){
                look.dx = t.clientX - look.lastX;
                look.lastX = t.clientX;
            }
        });

        // Jump & Fire
        document.getElementById('jump-btn').addEventListener('touchstart', () => {
            if(isGrounded){ vY = 0.58; isGrounded = false; }
        });

        let bullets = [];
        document.getElementById('fire-btn').addEventListener('touchstart', () => {
            const dir = new THREE.Vector3(Math.sin(angle), 0, Math.cos(angle));
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshBasicMaterial({color: 0x00ffff}));
            b.position.copy(player.group.position).add(new THREE.Vector3(0, 2, 0));
            bullets.push({ m: b, v: dir.multiplyScalar(3.8), life: 100 });
            scene.add(b);
            socket.emit('shoot', { pos: player.group.position, dir });
        });

        // --- 4. NETWORK & SYNC ---
        let remotes = {}, enemies = {};
        socket.on('state', data => {
            Object.keys(data.players).forEach(id => {
                if(id === socket.id) return;
                if(!remotes[id]) { 
                    remotes[id] = createCharacter(0xeeeeee); 
                    scene.add(remotes[id].group); 
                }
                const p = data.players[id];
                remotes[id].group.position.lerp(new THREE.Vector3(p.x, 0, p.z), 0.3);
                remotes[id].group.rotation.y = p.r + Math.PI;
            });
        });

        socket.on('spawnEnemy', data => {
            if(!enemies[data.id]) {
                enemies[data.id] = createCharacter(0xff0000);
                enemies[data.id].group.position.set(data.x, 0, data.z);
                scene.add(enemies[data.id].group);
            }
        });

        // --- 5. MAIN RENDER LOOP ---
        function loop() {
            requestAnimationFrame(loop);
            
            // Camera Rotation
            angle -= look.dx * 0.009; look.dx = 0;
            player.group.rotation.y = angle + Math.PI;

            // Player Physics
            const f = new THREE.Vector3(Math.sin(angle), 0, Math.cos(angle));
            const s = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), f);
            
            if(move.x !== 0 || move.y !== 0) {
                player.group.position.x += (f.x*-move.y*0.45) + (s.x*-move.x*0.45);
                player.group.position.z += (f.z*-move.y*0.45) + (s.z*-move.x*0.45);
                walkCycle += 0.25;
                player.lLeg.rotation.x = Math.sin(walkCycle) * 0.75;
                player.rLeg.rotation.x = -Math.sin(walkCycle) * 0.75;
            } else {
                player.lLeg.rotation.x = 0; player.rLeg.rotation.x = 0;
            }

            // Vertical Physics
            player.group.position.y += vY;
            if(!isGrounded) {
                vY -= 0.03;
                if(player.group.position.y <= 0) { player.group.position.y = 0; vY = 0; isGrounded = true; }
            }

            // Bullet Logic
            bullets.forEach((b, i) => {
                b.m.position.add(b.v);
                if(--b.life <= 0) { scene.remove(b.m); bullets.splice(i,1); }
            });

            // Tracking Camera
            camera.position.set(player.group.position.x - Math.sin(angle)*24, 15, player.group.position.z - Math.cos(angle)*24);
            camera.lookAt(player.group.position.x, 2, player.group.position.z);
            
            socket.emit('move', { x: player.group.position.x, z: player.group.position.z, r: angle });
            renderer.render(scene, camera);
        }
        loop();
    </script>
</body>
</html>
