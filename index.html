<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Temu Fortnite: Battle Royale</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        /* --- HIGH-PERFORMANCE INTERFACE CSS --- */
        :root { 
            --neon-blue: #00ffff; 
            --danger-red: #ff3333; 
            --health-green: #00ff66;
            --ui-bg: rgba(10, 15, 25, 0.85);
            --gold: #ffd700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; -webkit-user-select: none; outline: none; }
        
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            background: #050505; position: fixed; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }

        /* --- THE HUD OVERLAY --- */
        #game-ui { 
            position: absolute; inset: 0; pointer-events: none; z-index: 100; color: white;
            display: flex; flex-direction: column; justify-content: space-between; padding: 25px;
        }

        .top-shelf { display: flex; justify-content: space-between; align-items: flex-start; }

        /* Minimap with Scanlines */
        #radar-container {
            width: 180px; height: 180px; background: var(--ui-bg); 
            border: 2px solid var(--neon-blue); border-radius: 4px;
            position: relative; overflow: hidden; pointer-events: auto;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.15);
        }
        #radar-container::after {
            content: ""; position: absolute; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 255, 255, 0.03) 3px);
            pointer-events: none;
        }
        .blip { position: absolute; width: 8px; height: 8px; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; }
        #player-blip { background: #fff; box-shadow: 0 0 10px #fff; }
        .enemy-blip { background: var(--danger-red); box-shadow: 0 0 8px var(--danger-red); }

        /* Stats & Killfeed */
        #score-board { text-align: right; }
        .hud-box { 
            background: var(--ui-bg); padding: 10px 20px; 
            border-right: 6px solid var(--neon-blue); margin-bottom: 10px;
            backdrop-filter: blur(5px);
        }
        .stat-label { font-size: 10px; font-weight: 900; letter-spacing: 2px; opacity: 0.6; }
        .stat-value { font-size: 38px; font-weight: 900; color: var(--neon-blue); line-height: 1; }

        #kill-feed {
            height: 120px; width: 250px; overflow: hidden;
            display: flex; flex-direction: column-reverse; gap: 5px;
        }
        .feed-item { 
            background: rgba(0,0,0,0.5); padding: 5px 10px; font-size: 12px;
            border-left: 3px solid var(--gold); animation: slideIn 0.3s ease;
        }

        /* Health System (200% Max) */
        #health-section { width: 300px; pointer-events: auto; }
        #health-header { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; font-weight: bold; color: var(--health-green); }
        #health-frame { width: 100%; height: 26px; background: #1a1a1a; border: 1px solid #333; position: relative; overflow: hidden; }
        #health-bar { width: 50%; height: 100%; background: var(--health-green); transition: width 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        #health-num { position: absolute; inset: 0; text-align: center; line-height: 26px; font-size: 15px; font-weight: 900; color: #000; text-shadow: 0 0 2px #fff; }

        /* --- MOBILE CONTROLS --- */
        #controls-layer { position: absolute; inset: 0; pointer-events: none; z-index: 200; }
        
        #move-zone {
            position: absolute; bottom: 60px; left: 60px; width: 200px; height: 200px;
            background: rgba(255,255,255,0.05); border-radius: 50%; border: 2px solid rgba(0,255,255,0.1);
            pointer-events: auto;
        }
        #move-knob {
            position: absolute; width: 90px; height: 90px; background: var(--neon-blue);
            border-radius: 50%; top: 55px; left: 55px; box-shadow: 0 0 35px var(--neon-blue);
        }

        #action-shelf {
            position: absolute; bottom: 60px; right: 60px; display: flex; flex-direction: column; gap: 30px; pointer-events: auto;
        }
        .btn-circle {
            width: 130px; height: 130px; border-radius: 50%; border: 6px solid #fff;
            background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 24px; color: white; transition: 0.1s;
        }
        .btn-circle:active { transform: scale(0.9); background: var(--neon-blue); color: black; }
        #fire-btn { width: 190px; height: 190px; border-color: var(--danger-red); color: var(--danger-red); font-size: 38px; }

        /* AIMING PAD (Prevents interaction overlap) */
        #aim-pad { position: absolute; top: 0; right: 0; width: 70%; height: 75%; pointer-events: auto; z-index: 50; }

        /* OVERLAYS */
        #death-screen {
            position: fixed; inset: 0; background: rgba(50,0,0,0.95); z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>
    <div id="death-screen">
        <h1 style="font-size: 80px; color: white; letter-spacing: 10px; margin-bottom: 40px;">ELIMINATED</h1>
        <button onclick="location.reload()" style="padding: 25px 60px; font-size: 24px; font-weight: 900; background: var(--neon-blue); border: none; cursor: pointer;">REDEPLOY</button>
    </div>

    <div id="game-ui">
        <div id="aim-pad"></div>
        <div class="top-shelf">
            <div id="radar-container"><div id="player-blip" class="blip" style="left:90px; top:90px;"></div></div>
            <div id="score-board">
                <div class="hud-box"><div class="stat-label">ELIMINATIONS</div><div id="kill-count" class="stat-value">0</div></div>
                <div id="kill-feed"></div>
            </div>
        </div>

        <div id="bottom-shelf">
            <div id="health-section">
                <div id="health-header"><span>CONDITION MONITOR</span><span id="health-label">HEALTH: 100/200</span></div>
                <div id="health-frame">
                    <div id="health-bar"></div>
                    <div id="health-num">100%</div>
                </div>
            </div>
        </div>
    </div>

    <div id="controls-layer">
        <div id="move-zone"><div id="move-knob"></div></div>
        <div id="action-shelf">
            <div id="fire-btn" class="btn-circle">FIRE</div>
            <div id="jump-btn" class="btn-circle">JUMP</div>
        </div>
    </div>

    <canvas id="stage"></canvas>

    <script>
        /**
         * TEMU FORTNITE ENGINE V7.0 - HEAVY PRODUCTION BUILD
         * LINE COUNT TARGET: 600+ 
         */

        // --- 1. ENGINE CONSTANTS & NETWORK ---
        const socket = io("https://temu-fortnight.onrender.com/");
        const SETTINGS = {
            WORLD_SIZE: 3000,
            GRAVITY: -0.045,
            WALK_SPEED: 0.55,
            JUMP_FORCE: 0.72,
            MAX_HP: 200,
            ENEMY_COUNT: 12,
            FOG_COLOR: 0x87ceeb
        };

        const state = {
            hp: 100,
            kills: 0,
            dead: false,
            vY: 0,
            grounded: true,
            angle: 0,
            walkTime: 0,
            bullets: [],
            enemies: [],
            vfx: []
        };

        // --- 2. THREE.JS INITIALIZATION ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(SETTINGS.FOG_COLOR);
        scene.fog = new THREE.Fog(SETTINGS.FOG_COLOR, 50, 850);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 4000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('stage'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        // --- 3. ADVANCED ASSET ENGINE ---
        function createCharacter(color) {
            const master = new THREE.Group();
            
            // Core Body (Group allows us to bob the torso without moving the 'feet' position)
            const torsoGroup = new THREE.Group();
            
            const bodyMesh = new THREE.Mesh(
                new THREE.BoxGeometry(1.3, 1.7, 0.75),
                new THREE.MeshStandardMaterial({ color, roughness: 0.6 })
            );
            bodyMesh.position.y = 1.85;
            bodyMesh.castShadow = true;
            torsoGroup.add(bodyMesh);

            const headMesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.9, 0.9, 0.9),
                new THREE.MeshStandardMaterial({ color: 0xffdbac })
            );
            headMesh.position.y = 3.2;
            headMesh.castShadow = true;
            torsoGroup.add(headMesh);

            // Limb Rigs
            const limbGeo = new THREE.BoxGeometry(0.48, 1.25, 0.48);
            const limbMat = new THREE.MeshStandardMaterial({ color });

            const lLeg = new THREE.Mesh(limbGeo, limbMat);
            lLeg.position.set(-0.35, 0.62, 0);
            master.add(lLeg);

            const rLeg = lLeg.clone();
            rLeg.position.x = 0.35;
            master.add(rLeg);

            const lArm = new THREE.Mesh(limbGeo, limbMat);
            lArm.position.set(-0.9, 2.0, 0);
            torsoGroup.add(lArm);

            const rArm = lArm.clone();
            rArm.position.x = 0.9;
            torsoGroup.add(rArm);

            // Detailed Firearm
            const gun = new THREE.Group();
            const barrel = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 1.8), new THREE.MeshStandardMaterial({color: 0x1a1a1a}));
            const stock = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.7, 0.5), new THREE.MeshStandardMaterial({color: 0x1a1a1a}));
            stock.position.z = 0.8;
            gun.add(barrel, stock);
            gun.position.set(0.8, 2.1, -0.7);
            torsoGroup.add(gun);

            master.add(torsoGroup);
            return { master, torsoGroup, lLeg, rLeg, lArm, rArm, headMesh, gun };
        }

        // --- 4. WORLD CONSTRUCTION ---
        const groundGeo = new THREE.PlaneGeometry(5000, 5000);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x4a7a3a, roughness: 0.9 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        function spawnTree() {
            const t = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.9, 7), new THREE.MeshStandardMaterial({color: 0x4d2d18}));
            trunk.position.y = 3.5;
            const foliage = new THREE.Mesh(new THREE.ConeGeometry(4.5, 14, 8), new THREE.MeshStandardMaterial({color: 0x243e1b}));
            foliage.position.y = 11;
            t.add(trunk, foliage);
            t.position.set((Math.random()-0.5)*2000, 0, (Math.random()-0.5)*2000);
            scene.add(t);
        }
        for(let i=0; i<150; i++) spawnTree();

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.75));
        const sun = new THREE.DirectionalLight(0xffffff, 0.9);
        sun.position.set(150, 300, 100);
        sun.castShadow = true;
        sun.shadow.camera.left = -500; sun.shadow.camera.right = 500;
        sun.shadow.camera.top = 500; sun.shadow.camera.bottom = -500;
        scene.add(sun);

        // --- 5. PLAYER INITIALIZATION ---
        const player = createCharacter(0x0055ff);
        scene.add(player.master);

        let input = { joyX: 0, joyY: 0, lookDX: 0, lookID: null, lastX: 0 };

        // MOBILE CONTROLLER LOGIC
        const knob = document.getElementById('move-knob');
        const base = document.getElementById('move-zone');
        
        const handleMove = (e) => {
            const r = base.getBoundingClientRect();
            const t = e.touches[0];
            let x = (t.clientX - (r.left + r.width/2)) / 100;
            let y = (t.clientY - (r.top + r.height/2)) / 100;
            const dist = Math.sqrt(x*x + y*y);
            if(dist > 1) { x /= dist; y /= dist; }
            input.joyX = x; input.joyY = y;
            knob.style.transform = `translate(${x*60}px, ${y*60}px)`;
        };

        base.addEventListener('touchstart', handleMove);
        base.addEventListener('touchmove', handleMove);
        base.addEventListener('touchend', () => { 
            input.joyX = 0; input.joyY = 0; knob.style.transform = 'translate(0,0)'; 
        });

        // AIM PAD LOGIC
        const aimArea = document.getElementById('aim-pad');
        aimArea.addEventListener('touchstart', e => {
            const t = e.changedTouches[0];
            if(!input.lookID) { input.lookID = t.identifier; input.lastX = t.clientX; }
        });
        aimArea.addEventListener('touchmove', e => {
            for(let t of e.changedTouches) if(t.identifier === input.lookID) {
                input.lookDX = (t.clientX - input.lastX) * 0.012;
                input.lastX = t.clientX;
            }
        });
        aimArea.addEventListener('touchend', e => {
            for(let t of e.changedTouches) if(t.identifier === input.lookID) input.lookID = null;
        });

        // --- 6. ARMED AI STATE MACHINE ---
        function createArmedAI() {
            const ai = createCharacter(0xff2200);
            ai.master.position.set((Math.random()-0.5)*1500, 0, (Math.random()-0.5)*1500);
            ai.hp = 100;
            ai.lastFire = 0;
            ai.state = 'PATROL'; // PATROL, CHASE, ATTACK
            ai.targetPos = ai.master.position.clone();
            ai.shootDelay = 2500 + Math.random() * 2000;
            state.enemies.push(ai);
            scene.add(ai.master);
            return ai;
        }

        for(let i=0; i<SETTINGS.ENEMY_COUNT; i++) createArmedAI();

        // --- 7. WEAPONRY & VFX ENGINE ---
        function spawnBullet(pos, dir, isPlayer) {
            const bGeo = new THREE.SphereGeometry(0.28);
            const bMat = new THREE.MeshBasicMaterial({ color: isPlayer ? 0x00ffff : 0xffaa00 });
            const mesh = new THREE.Mesh(bGeo, bMat);
            mesh.position.copy(pos).add(new THREE.Vector3(0, 2.2, 0));
            state.bullets.push({ mesh, vel: dir.multiplyScalar(4.5), life: 130, isPlayer });
            scene.add(mesh);
            
            // Muzzle Flash VFX
            const flash = new THREE.PointLight(isPlayer ? 0x00ffff : 0xffaa00, 5, 10);
            flash.position.copy(mesh.position);
            scene.add(flash);
            setTimeout(() => scene.remove(flash), 50);
        }

        document.getElementById('fire-btn').addEventListener('touchstart', (e) => {
            if(state.dead) return;
            const dir = new THREE.Vector3(Math.sin(state.angle), 0, Math.cos(state.angle));
            spawnBullet(player.master.position, dir, true);
        });

        document.getElementById('jump-btn').addEventListener('touchstart', (e) => {
            if(state.grounded && !state.dead) { state.vY = SETTINGS.JUMP_FORCE; state.grounded = false; }
        });

        // --- 8. THE MASTER GAME LOOP ---
        function update() {
            requestAnimationFrame(update);
            if(state.dead) return;

            // 8.1 CAMERA & PLAYER ROTATION
            state.angle -= input.lookDX; input.lookDX = 0;
            player.master.rotation.y = state.angle + Math.PI;

            // 8.2 PHYSICS & MOVEMENT (THE "ANTI-FLYING" FIX)
            const fwd = new THREE.Vector3(Math.sin(state.angle), 0, Math.cos(state.angle));
            const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), fwd);
            
            const isMoving = (input.joyX !== 0 || input.joyY !== 0);
            if(isMoving) {
                // Ground position changes
                player.master.position.x += (fwd.x * -input.joyY * SETTINGS.WALK_SPEED) + (side.x * -input.joyX * SETTINGS.WALK_SPEED);
                player.master.position.z += (fwd.z * -input.joyY * SETTINGS.WALK_SPEED) + (side.z * -input.joyX * SETTINGS.WALK_SPEED);
                
                // Procedural Walk (Animation bobs the mesh, NOT the container)
                state.walkTime += 0.28;
                const swing = Math.sin(state.walkTime) * 0.8;
                player.lLeg.rotation.x = swing;
                player.rLeg.rotation.x = -swing;
                player.lArm.rotation.x = -swing * 0.5;
                player.rArm.rotation.x = swing * 0.5;
                
                // Bob the torso relative to the master group
                player.torsoGroup.position.y = Math.abs(Math.sin(state.walkTime * 2)) * 0.18;
            } else {
                // Return to idle stance
                player.lLeg.rotation.x = 0; player.rLeg.rotation.x = 0;
                player.lArm.rotation.x = 0; player.rArm.rotation.x = 0;
                player.torsoGroup.position.y = 0;
            }

            // Vertical Physics (Gravity)
            player.master.position.y += state.vY;
            if(!state.grounded) {
                state.vY += SETTINGS.GRAVITY;
                if(player.master.position.y <= 0) {
                    player.master.position.y = 0; state.vY = 0; state.grounded = true;
                }
            }

            // 8.3 BULLET PHYSICS & COLLISION
            for(let i = state.bullets.length - 1; i >= 0; i--) {
                const b = state.bullets[i];
                b.mesh.position.add(b.vel);
                b.life--;

                if(b.isPlayer) {
                    // Check against Enemies
                    state.enemies.forEach((en, ei) => {
                        if(b.mesh.position.distanceTo(en.master.position) < 3.2) {
                            scene.remove(en.master);
                            state.enemies.splice(ei, 1);
                            state.kills++;
                            document.getElementById('kill-count').innerText = state.kills;
                            addToFeed("You eliminated EnemyPlayer");
                            b.life = 0;
                            setTimeout(createArmedAI, 6000);
                        }
                    });
                } else {
                    // Check against Player
                    if(b.mesh.position.distanceTo(player.master.position) < 2.8) {
                        takeDamage(20);
                        b.life = 0;
                    }
                }

                if(b.life <= 0) { scene.remove(b.mesh); state.bullets.splice(i, 1); }
            }

            // 8.4 ARMED AI STATE MACHINE LOGIC
            state.enemies.forEach(en => {
                const distToPlayer = en.master.position.distanceTo(player.master.position);
                en.master.lookAt(player.master.position.x, 0, player.master.position.z);

                if(distToPlayer > 40) {
                    // CHASE MODE
                    en.master.translateZ(0.24);
                    const t = Date.now() * 0.01;
                    en.lLeg.rotation.x = Math.sin(t) * 0.6;
                    en.rLeg.rotation.x = -Math.sin(t) * 0.6;
                    en.torsoGroup.position.y = Math.abs(Math.sin(t*2)) * 0.15;
                } else if (distToPlayer < 65) {
                    // ATTACK MODE
                    const now = Date.now();
                    if(now - en.lastFire > en.shootDelay) {
                        const dir = new THREE.Vector3().subVectors(player.master.position, en.master.position).normalize();
                        spawnBullet(en.master.position, dir, false);
                        en.lastFire = now;
                    }
                }
            });

            // 8.5 CAMERA ELASTIC FOLLOW
            const targetCam = new THREE.Vector3(
                player.master.position.x - Math.sin(state.angle) * 28,
                player.master.position.y + 17,
                player.master.position.z - Math.cos(state.angle) * 28
            );
            camera.position.lerp(targetCam, 0.12);
            camera.lookAt(player.master.position.x, 3, player.master.position.z);

            // NETWORK SYNC
            socket.emit('playerUpdate', { x: player.master.position.x, z: player.master.position.z, r: state.angle });

            renderer.render(scene, camera);
        }

        // --- 9. HELPER FUNCTIONS ---
        function takeDamage(val) {
            state.hp -= val;
            const bar = document.getElementById('health-bar');
            const txt = document.getElementById('health-num');
            const pct = Math.max(0, state.hp);
            bar.style.width = (pct / 2) + "%"; // Scaled for 200 max
            txt.innerText = pct + "%";
            document.getElementById('health-label').innerText = `HEALTH: ${Math.floor(pct)}/200`;
            
            if(pct <= 0) {
                state.dead = true;
                document.getElementById('death-screen').style.display = 'flex';
            }
        }

        function addToFeed(msg) {
            const feed = document.getElementById('kill-feed');
            const item = document.createElement('div');
            item.className = 'feed-item';
            item.innerText = msg;
            feed.appendChild(item);
            setTimeout(() => item.remove(), 4000);
        }

        // --- 10. BOOT ENGINE ---
        update();

        // Prevent iOS Multi-tap Zooming
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

    </script>
</body>
</html>
