<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Temu Fortnite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * { touch-action: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* TOP LEFT: MINI-MAP */
        #minimap { position: absolute; top: 15px; left: 15px; width: 120px; height: 120px; background: rgba(0,0,0,0.7); border: 2px solid #0ff; border-radius: 5px; pointer-events: auto; overflow: hidden; }
        .map-dot { position: absolute; width: 6px; height: 6px; border-radius: 50%; transform: translate(-50%, -50%); }
        #player-dot { background: #0ff; z-index: 2; }

        /* TOP RIGHT: STAT CHART */
        #stat-chart { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.8); color: #0ff; padding: 10px; border: 1px solid #0ff; font-family: monospace; font-size: 12px; pointer-events: auto; min-width: 140px; }
        .stat-line { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .stat-val { color: #fff; font-weight: bold; }

        /* HEALTH/MANA BAR */
        #health-ui { position: absolute; top: 145px; left: 15px; width: 180px; background: rgba(0,0,0,0.8); padding: 8px; border: 1px solid #ff4444; border-radius: 4px; }
        #health-fill { width: 100%; height: 12px; background: #ff4444; transition: width 0.2s; }
        .bar-bg { width: 100%; height: 12px; background: #222; margin-top: 5px; }

        #btns { position: absolute; bottom: 30px; right: 20px; display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
        .btn { width: 80px; height: 80px; background: rgba(0,0,0,0.7); color: white; border: 3px solid #0ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        #fire-btn { background: #ff4444; width: 110px; height: 110px; border-color: #fff; font-size: 20px; }
        #joystick-ui { position: absolute; bottom: 50px; left: 50px; width: 140px; height: 140px; background: rgba(0,255,255,0.1); border-radius: 50%; pointer-events: auto; border: 2px solid #0ff; }
        #joystick-knob { position: absolute; width: 60px; height: 60px; background: #0ff; border-radius: 50%; left: 40px; top: 40px; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="minimap"><div id="player-dot" class="map-dot"></div></div>
        <div id="stat-chart">
            <div class="stat-line">ENEMIES: <span id="count-e" class="stat-val">0</span></div>
            <div class="stat-line">MY KILLS: <span id="count-pk" class="stat-val">0</span></div>
            <div class="stat-line">SERVER TOTAL: <span id="count-sk" class="stat-val">0</span></div>
        </div>
        <div id="health-ui">MANA<div class="bar-bg"><div id="health-fill"></div></div></div>
        <div id="btns">
            <div id="fire-btn" class="btn">FIRE</div>
            <div id="jump-btn" class="btn">JUMP</div>
        </div>
        <div id="joystick-ui"><div id="joystick-knob"></div></div>
    </div>

    <script>
        // ANTI-ZOOM
        document.addEventListener('touchstart', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7), new THREE.DirectionalLight(0xffffff, 0.8));

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x2e7d32 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Stats
        let myKills = 0, serverKills = 0;
        const BULLET_SPEED = 1.2; // Standardized for everyone

        function createChar(color) {
            const g = new THREE.Group();
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), new THREE.MeshStandardMaterial({color}));
            torso.position.y = 1.45;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 2.3;
            const armR = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.8, 0.25), new THREE.MeshStandardMaterial({color}));
            armR.position.set(0.55, 1.5, 0);
            const gun = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 1.0), new THREE.MeshStandardMaterial({color: 0x000000}));
            gun.position.set(0, -0.3, -0.4); armR.add(gun);
            const armL = armR.clone(); armL.position.x = -0.55; armL.remove(armL.children[0]);
            const legL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.0, 0.3), new THREE.MeshStandardMaterial({color}));
            legL.position.set(-0.25, 0.5, 0);
            const legR = legL.clone(); legR.position.x = 0.25;
            g.add(torso, head, armL, armR, legL, legR);
            return { group: g, armR, legL, legR };
        }

        const pData = createChar(0x222222);
        const player = pData.group; scene.add(player);
        let playerHealth = 100;

        const enemies = [];
        const minimapDiv = document.getElementById('minimap');

        function spawnEnemy() {
            const e = createChar(0xff4444);
            const a = Math.random()*6.28; const d = 30+Math.random()*30;
            e.group.position.set(player.position.x + Math.cos(a)*d, 0, player.position.z + Math.sin(a)*d);
            e.lastShot = 0;
            e.dot = document.createElement('div');
            e.dot.className = 'map-dot';
            e.dot.style.background = 'red';
            minimapDiv.appendChild(e.dot);
            scene.add(e.group); enemies.push(e);
            updateChart();
        }
        for(let i=0; i<8; i++) spawnEnemy();

        function updateChart() {
            document.getElementById('count-e').innerText = enemies.length;
            document.getElementById('count-pk').innerText = myKills;
            document.getElementById('count-sk').innerText = serverKills;
        }

        const pBullets = [], eBullets = [];
        let camAngle = 0, targetCamAngle = 0, camDist = 14, lastX = 0, joy = {x:0, y:0};

        window.addEventListener('touchstart', e => { if(e.touches[0].clientX > window.innerWidth/2) lastX = e.touches[0].clientX; });
        window.addEventListener('touchmove', e => {
            const touch = Array.from(e.touches).find(t => t.clientX > window.innerWidth/2);
            if(touch) { targetCamAngle -= (touch.clientX - lastX) * 0.01; lastX = touch.clientX; }
        });

        document.getElementById('fire-btn').addEventListener('touchstart', () => {
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshBasicMaterial({color: 0xffff00}));
            b.position.copy(player.position).add(new THREE.Vector3(0, 1.8, 0));
            const dir = new THREE.Vector3(Math.sin(camAngle), 0, Math.cos(camAngle));
            b.userData.vel = dir.multiplyScalar(BULLET_SPEED);
            scene.add(b); pBullets.push(b);
            gsap.to(pData.armR.rotation, { x: -0.7, duration: 0.1, yoyo: true, repeat: 1 });
        });

        document.getElementById('jump-btn').onclick = () => { if(player.position.y < 0.1) gsap.to(player.position, {y:6, duration:0.4, yoyo:true, repeat:1}); };

        const knob = document.getElementById('joystick-knob');
        document.getElementById('joystick-ui').addEventListener('touchmove', e => {
            const t = e.touches[0], r = e.currentTarget.getBoundingClientRect();
            joy.x = (t.clientX - (r.left + r.width/2))/70; joy.y = (t.clientY - (r.top + r.height/2))/70;
            const d = Math.sqrt(joy.x**2+joy.y**2); if(d>1){joy.x/=d; joy.y/=d;}
            knob.style.transform = `translate(${joy.x*45}px, ${joy.y*45}px)`;
        });
        document.getElementById('joystick-ui').addEventListener('touchend', () => { joy = {x:0, y:0}; knob.style.transform = `translate(0,0)`; });

        function animate() {
            requestAnimationFrame(animate);
            const t = Date.now() * 0.008;
            camAngle += (targetCamAngle - camAngle) * 0.12;
            player.rotation.y = camAngle + Math.PI;

            const fwd = new THREE.Vector3(Math.sin(camAngle), 0, Math.cos(camAngle));
            const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), fwd);
            player.position.add(fwd.multiplyScalar(-joy.y * 0.4));
            player.position.add(side.multiplyScalar(-joy.x * 0.4));

            // Minimap Player
            const pDot = document.getElementById('player-dot');
            pDot.style.left = '60px'; pDot.style.top = '60px';

            enemies.forEach((en, i) => {
                const dist = en.group.position.distanceTo(player.position);
                const dir = new THREE.Vector3().subVectors(player.position, en.group.position).normalize();
                
                // Minimap update
                const relX = (en.group.position.x - player.position.x) * 1.5 + 60;
                const relZ = (en.group.position.z - player.position.z) * 1.5 + 60;
                en.dot.style.left = relX + 'px'; en.dot.style.top = relZ + 'px';
                en.dot.style.display = (relX < 0 || relX > 120 || relZ < 0 || relZ > 120) ? 'none' : 'block';

                if(dist < 1.8) {
                    playerHealth -= 20;
                    scene.remove(en.group); en.dot.remove(); enemies.splice(i, 1);
                    spawnEnemy();
                } else if(dist > 14) {
                    en.group.position.add(dir.multiplyScalar(0.09));
                }
                en.group.lookAt(player.position.x, 0, player.position.z);

                if(Date.now() - en.lastShot > 2200 && dist < 45) {
                    const eb = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0xff0000}));
                    eb.position.copy(en.group.position).add(new THREE.Vector3(0, 1.8, 0));
                    eb.userData.vel = dir.clone().multiplyScalar(BULLET_SPEED);
                    scene.add(eb); eBullets.push(eb);
                    en.lastShot = Date.now();
                }
            });

            // Bullets logic
            [pBullets, eBullets].forEach((list, type) => {
                list.forEach((b, i) => {
                    b.position.add(b.userData.vel);
                    if(type === 0) { // Player bullets hit enemies
                        enemies.forEach((en, ei) => {
                            if(b.position.distanceTo(en.group.position) < 2) {
                                scene.remove(en.group); en.dot.remove(); enemies.splice(ei, 1);
                                scene.remove(b); list.splice(i, 1);
                                myKills++; serverKills++; spawnEnemy(); updateChart();
                            }
                        });
                    } else { // Enemy bullets hit player
                        if(b.position.distanceTo(player.position) < 1.6) {
                            playerHealth -= 10;
                            scene.remove(b); list.splice(i, 1);
                        }
                    }
                    if(b.position.y < -1 || b.position.distanceTo(player.position) > 150) { scene.remove(b); list.splice(i, 1); }
                });
            });

            document.getElementById('health-fill').style.width = playerHealth + "%";
            if(playerHealth <= 0) { playerHealth = 100; serverKills++; updateChart(); }

            camera.position.set(player.position.x - Math.sin(camAngle)*camDist, 8, player.position.z - Math.cos(camAngle)*camDist);
            camera.lookAt(player.position.x, player.position.y + 2, player.position.z);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
