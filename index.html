<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Temu Fortnite</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Arial Black', sans-serif; touch-action: none; user-select: none; }
        #game-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        #minimap-container { position: absolute; top: 20px; left: 20px; width: 110px; height: 110px; background: rgba(0,0,0,0.7); border: 2px solid #fff; border-radius: 8px; overflow: hidden; pointer-events: none; }
        #minimap-canvas { width: 100%; height: 100%; }

        #crosshair { position: absolute; top: 50%; left: 50%; width: 24px; height: 24px; transform: translate(-50%, -50%); border: 2px solid white; border-radius: 50%; }
        #crosshair::after { content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #00ff00; transform: translate(-50%, -50%); border-radius: 50%; }
        
        .hud { position: absolute; background: rgba(0, 0, 0, 0.8); color: white; padding: 10px; border-radius: 8px; font-weight: bold; border: 2px solid #ffaa00; pointer-events: none; }
        #hp-ui { top: 140px; left: 20px; width: 110px; }
        #hp-fill { width: 100%; height: 8px; background: #00ff00; transition: background 0.3s, width 0.1s; }
        
        #stats-ui { top: 20px; right: 20px; text-align: right; font-size: 14px; line-height: 1.4; }
        #title-card { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-size: 22px; color: white; text-shadow: 2px 2px #000; }

        .touch-zone { position: absolute; bottom: 0; height: 100vh; width: 50vw; pointer-events: auto; }
        #left-zone { left: 0; }
        #right-zone { right: 0; }
        
        #action-btns { position: absolute; bottom: 40px; right: 20px; display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
        .btn { width: 85px; height: 85px; border-radius: 50%; border: 3px solid white; background: rgba(0,0,0,0.6); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        #shoot-btn { background: rgba(255, 0, 0, 0.8); width: 105px; height: 105px; font-size: 20px; }

        #joystick-base { position: absolute; width: 80px; height: 80px; background: rgba(255,255,255,0.2); border-radius: 50%; display: none; pointer-events: none; border: 2px solid rgba(255,255,255,0.4); }
        #joystick-knob { position: absolute; width: 40px; height: 40px; background: white; border-radius: 50%; top: 20px; left: 20px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="game-container"></div>
    <div id="ui-layer">
        <div id="title-card">TEMU FORTNITE</div>
        <div id="minimap-container"><canvas id="minimap-canvas"></canvas></div>
        <div id="hp-ui" class="hud">HP<div style="background:#333; margin-top:4px;"><div id="hp-fill"></div></div></div>
        <div id="stats-ui" class="hud">
            ELIMS: <span id="score">0</span><br>
            LIVE ENEMIES: <span id="count">0</span>
        </div>
        <div id="crosshair"></div>
        <div id="joystick-base"><div id="joystick-knob"></div></div>
        <div id="left-zone" class="touch-zone"></div>
        <div id="right-zone" class="touch-zone"></div>
        <div id="action-btns">
            <div id="jump-btn" class="btn">JUMP</div>
            <div id="shoot-btn" class="btn">FIRE</div>
        </div>
    </div>

<script>
    // CONFIG UPDATED: Slower speed (0.12) and Bullet Speed (0.6)
    const CONFIG = { speed: 0.12, jump: 0.45, gravity: 0.02, bulletSpeed: 0.6, spawnRate: 0.012, enemyFireRate: 85, hitBox: 2.2 };
    let STATE = { hp: 100, score: 0, yaw: 0, targetYaw: 0, move: {x:0, y:0}, pBullets: [], eBullets: [], enemies: [] };
    
    let scene, camera, renderer, player, mapCtx, mapCanvas;
    const joyBase = document.getElementById('joystick-base'), joyKnob = document.getElementById('joystick-knob');

    function createHumanoid(color) {
        const group = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({ color });
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.35), mat);
        body.position.y = 1.1; group.add(body);
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshStandardMaterial({color: 0xffdbac}));
        head.position.y = 1.7; group.add(head);
        const limb = new THREE.BoxGeometry(0.2, 0.7, 0.2);
        const lA = new THREE.Mesh(limb, mat); lA.position.set(-0.45, 1.1, 0); group.add(lA);
        const rA = new THREE.Mesh(limb, mat); rA.position.set(0.45, 1.1, 0); group.add(rA);
        const lL = new THREE.Mesh(limb, mat); lL.position.set(-0.2, 0.35, 0); group.add(lL);
        const rL = new THREE.Mesh(limb, mat); rL.position.set(0.2, 0.35, 0); group.add(rL);
        const gun = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.15, 0.8), new THREE.MeshStandardMaterial({color: 0x000000}));
        gun.position.set(0.45, 1.0, -0.4); group.add(gun);
        group.userData = { parts: {lA, rA, lL, rL, gun}, velY: 0, hp: 3, fireTimer: Math.random() * 50 };
        return group;
    }

    function init() {
        scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB);
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-container').appendChild(renderer.domElement);
        
        mapCanvas = document.getElementById('minimap-canvas');
        mapCtx = mapCanvas.getContext('2d');
        mapCanvas.width = 110; mapCanvas.height = 110;

        scene.add(new THREE.AmbientLight(0xffffff, 0.85));
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({color: 0x224411}));
        ground.rotation.x = -Math.PI/2; scene.add(ground);

        for(let i=0; i<45; i++) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 3), new THREE.MeshStandardMaterial({color: 0x3d2006}));
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(2, 5.5, 8), new THREE.MeshStandardMaterial({color: 0x0d2d04}));
            trunk.position.y = 1.5; leaves.position.y = 4.5;
            tree.add(trunk, leaves);
            tree.position.set((Math.random()-0.5)*200, 0, (Math.random()-0.5)*200);
            scene.add(tree);
        }

        player = createHumanoid(0x0044ff); scene.add(player);

        let lId = null, rId = null, lO = {x:0, y:0}, lastRx = 0;
        
        window.addEventListener('touchstart', e => {
            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth/2 && lId === null) {
                    lId = t.identifier; lO = {x:t.clientX, y:t.clientY};
                    joyBase.style.display = 'block';
                    joyBase.style.left = (lO.x - 40) + 'px'; joyBase.style.top = (lO.y - 40) + 'px';
                } else if (t.clientX >= window.innerWidth/2 && rId === null) {
                    rId = t.identifier; lastRx = t.clientX;
                }
            }
            e.preventDefault();
        }, {passive: false});

        window.addEventListener('touchmove', e => {
            for (let t of e.touches) {
                if (t.identifier === lId) {
                    const dx = t.clientX - lO.x, dy = t.clientY - lO.y;
                    const dist = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
                    const ang = Math.atan2(dy, dx);
                    STATE.move = { x: (Math.cos(ang)*dist)/40, y: (Math.sin(ang)*dist)/40 };
                    joyKnob.style.transform = `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist}px)`;
                }
                if (t.identifier === rId) {
                    STATE.targetYaw -= (t.clientX - lastRx) * 0.008;
                    lastRx = t.clientX;
                }
            }
        }, {passive: false});

        window.addEventListener('touchend', e => {
            for (let t of e.changedTouches) {
                if (t.identifier === lId) { lId = null; STATE.move = {x:0, y:0}; joyBase.style.display = 'none'; }
                if (t.identifier === rId) { rId = null; }
            }
        });

        document.getElementById('jump-btn').addEventListener('touchstart', e => { if(player.position.y < 0.1) player.userData.velY = CONFIG.jump; e.preventDefault(); });
        document.getElementById('shoot-btn').addEventListener('touchstart', e => { fire(true); e.preventDefault(); });

        animate();
    }

    function fire(isPlayer, originGroup = player) {
        const b = new THREE.Mesh(new THREE.SphereGeometry(0.18), new THREE.MeshBasicMaterial({color: isPlayer ? 0x00ffff : 0xff2200}));
        let dir;
        if (isPlayer) {
            dir = new THREE.Vector3(0, 0, -1).applyQuaternion(originGroup.quaternion);
        } else {
            const targetPos = player.position.clone().add(new THREE.Vector3(0, 1.2, 0));
            const spawnPos = originGroup.position.clone().add(new THREE.Vector3(0, 1.4, 0));
            dir = new THREE.Vector3().subVectors(targetPos, spawnPos).normalize();
        }
        b.position.copy(originGroup.position).setY(1.4).add(dir.clone().multiplyScalar(0.9));
        b.userData = { vel: dir.multiplyScalar(CONFIG.bulletSpeed), life: 100 };
        scene.add(b);
        if(isPlayer) STATE.pBullets.push(b); else STATE.eBullets.push(b);
    }

    function updateHealthUI() {
        const fill = document.getElementById('hp-fill');
        fill.style.width = STATE.hp + '%';
        const hue = (STATE.hp / 100) * 120;
        fill.style.backgroundColor = `hsl(${hue}, 100%, 50%)`;
    }

    function resetGame() {
        STATE.hp = 100; STATE.score = 0;
        player.position.set(0, 0, 0);
        STATE.enemies.forEach(e => scene.remove(e)); STATE.enemies = [];
        STATE.pBullets.forEach(b => scene.remove(b)); STATE.pBullets = [];
        STATE.eBullets.forEach(b => scene.remove(b)); STATE.eBullets = [];
        updateHealthUI();
    }

    function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.001;
        STATE.yaw += (STATE.targetYaw - STATE.yaw) * 0.15;
        player.rotation.y = STATE.yaw; 

        const fwd = new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), STATE.yaw);
        const rgt = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), STATE.yaw);
        const moveV = fwd.multiplyScalar(-STATE.move.y).add(rgt.multiplyScalar(STATE.move.x)).multiplyScalar(CONFIG.speed);
        player.position.add(moveV);

        player.userData.velY -= CONFIG.gravity;
        player.position.y += player.userData.velY;
        if(player.position.y < 0) { player.position.y = 0; player.userData.velY = 0; }

        camera.position.lerp(player.position.clone().add(new THREE.Vector3(0, 3, 7).applyAxisAngle(new THREE.Vector3(0, 1, 0), STATE.yaw)), 0.1);
        camera.lookAt(player.position.clone().setY(1.5));

        [player, ...STATE.enemies].forEach(m => {
            const p = m.userData.parts;
            const isMoving = (m === player) ? moveV.length() > 0.01 : true;
            if(isMoving && m.position.y < 0.1) {
                const s = Math.sin(time * 10) * 0.4;
                p.lL.rotation.x = s; p.rL.rotation.x = -s;
                p.lA.rotation.x = -s; p.rA.rotation.x = s;
            } else { p.lL.rotation.x = p.rL.rotation.x = p.lA.rotation.x = p.rA.rotation.x = 0; }
        });

        if(Math.random() < CONFIG.spawnRate) {
            const e = createHumanoid(0xdd0000);
            const a = Math.random()*6.28;
            e.position.set(player.position.x + Math.cos(a)*50, 0, player.position.z + Math.sin(a)*50);
            scene.add(e); STATE.enemies.push(e);
        }

        STATE.pBullets.forEach((b, i) => {
            b.position.add(b.userData.vel);
            STATE.enemies.forEach((e, ei) => {
                if(b.position.distanceTo(e.position.clone().add(new THREE.Vector3(0, 1, 0))) < CONFIG.hitBox) {
                    e.userData.hp--; scene.remove(b); STATE.pBullets.splice(i, 1);
                    if(e.userData.hp <= 0) { scene.remove(e); STATE.enemies.splice(ei, 1); STATE.score++; }
                }
            });
            if(b.userData.life-- < 0) { scene.remove(b); STATE.pBullets.splice(i, 1); }
        });

        STATE.eBullets.forEach((b, i) => {
            b.position.add(b.userData.vel);
            if(b.position.distanceTo(player.position.clone().add(new THREE.Vector3(0,1,0))) < 1.3) {
                STATE.hp -= 10; scene.remove(b); STATE.eBullets.splice(i, 1);
                updateHealthUI();
            }
            if(b.userData.life-- < 0) { scene.remove(b); STATE.eBullets.splice(i, 1); }
        });

        STATE.enemies.forEach(e => {
            const dir = new THREE.Vector3().subVectors(player.position, e.position).normalize();
            e.rotation.y = Math.atan2(dir.x, dir.z) + Math.PI;
            e.position.x += dir.x * 0.06; e.position.z += dir.z * 0.06; e.position.y = 0; 
            e.userData.fireTimer++;
            if(e.userData.fireTimer > CONFIG.enemyFireRate) { fire(false, e); e.userData.fireTimer = 0; }
        });

        document.getElementById('score').innerText = STATE.score;
        document.getElementById('count').innerText = STATE.enemies.length;

        mapCtx.fillStyle = '#000'; mapCtx.fillRect(0,0,110,110);
        mapCtx.save(); mapCtx.translate(55, 55); mapCtx.rotate(-STATE.yaw);
        mapCtx.fillStyle = 'rgba(255, 255, 255, 0.2)';
        mapCtx.beginPath(); mapCtx.moveTo(0,0); mapCtx.arc(0,0,40, -Math.PI/4-Math.PI/2, Math.PI/4-Math.PI/2); mapCtx.fill();
        mapCtx.restore();
        mapCtx.fillStyle = '#0f0'; mapCtx.fillRect(53,53,4,4);
        STATE.enemies.forEach(e => {
            const dx = (e.position.x - player.position.x) / 4 + 55;
            const dy = (e.position.z - player.position.z) / 4 + 55;
            if(dx>0 && dx<110 && dy>0 && dy<110) { mapCtx.fillStyle = '#f00'; mapCtx.fillRect(dx, dy, 3, 3); }
        });

        if(STATE.hp <= 0) { resetGame(); }
        renderer.render(scene, camera);
    }
    init();
</script>
</body>
</html>
